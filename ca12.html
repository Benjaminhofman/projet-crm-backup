<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi CA12</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

/* bouton retour harmonisé */
.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
}

/* compteur */
.counter {
    margin-bottom: 10px;
    font-weight: bold;
}

/* filtres */
.filters-top {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.filter-box input {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #e8f0fe;
}

.name {
    font-weight: bold;
}

/* INPUT */
input {
    width: 90%;
    padding: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="header">
    <a href="declaratif.html" class="back">⬅ Retour</a>
    <h2>📊 Suivi CA12</h2>
</div>

<div class="counter" id="counter"></div>

<!-- FILTRES -->
<div class="filters-top">
    <div class="filter-box">
        <input id="filter-assistant" placeholder="Assistant...">
    </div>
    <div class="filter-box">
        <input id="filter-collab" placeholder="Collaborateur...">
    </div>
    <div class="filter-box">
        <input id="filter-annee" placeholder="Année...">
    </div>
    <div class="filter-box">
        <input id="filter-cloture" placeholder="Clôture...">
    </div>
</div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Année</th>
<th>Clôture</th>
<th>Juillet CA12</th>
<th>Décembre CA12</th>
<th>Mai CA12</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script src="utils.js"></script>
<script>


// 🔥 UPDATE


// 🔥 affichage
function display(data) {

    const table = document.getElementById("table");
    table.innerHTML = "";

    // compteur
    document.getElementById("counter").innerText =
        "Nombre de dossiers : " + data.length;

    data.forEach(c => {

        table.innerHTML += `
        <tr>

            <td>${c["code client"] || ""}</td>
            <td class="name">${c["nom client"] || ""}</td>
            <td>${c["assistant"] || ""}</td>
            <td>${c["collaborateur"] || ""}</td>
            <td>${c["année"] || ""}</td>
            <td>${c["date de cloture"] || ""}</td>

            <td>
                <input 
                value="${c["juillet ca12"] || ""}"
                onchange="updateField('${c.id}','juillet ca12', this.value, this)">
            </td>

            <td>
                <input 
                value="${c["decembre ca12"] || ""}"
                onchange="updateField('${c.id}','decembre ca12', this.value, this)">
            </td>

            <td>
                <input 
                value="${c["mai ca12"] || ""}"
                onchange="updateField('${c.id}','mai ca12', this.value, this)">
            </td>

        </tr>`;
    });
}


// 🔥 filtrage (copie logique déclaratif)
function applyFilters() {

    const assistant = document.getElementById("filter-assistant").value.toLowerCase();
    const collab = document.getElementById("filter-collab").value.toLowerCase();
    const annee = document.getElementById("filter-annee").value.toLowerCase();
    const cloture = document.getElementById("filter-cloture").value.toLowerCase();

    const filtered = dataGlobal.filter(c => {

        if (assistant && !(c["assistant"] || "").toLowerCase().includes(assistant)) return false;
        if (collab && !(c["collaborateur"] || "").toLowerCase().includes(collab)) return false;
        if (annee && !(String(c["année"])).includes(annee)) return false;
        if (cloture && !(c["date de cloture"] || "").toLowerCase().includes(cloture)) return false;

        return true;
    });

    display(filtered);
}


// 🔥 load
async function load() {

    const data = await fetchClients();

    // filtre CA12 uniquement
    dataGlobal = data.filter(c => c["CA12"] === true);

    display(dataGlobal);

    bindFilterInputs(".filters-top input");
}

load();
</script>

</body>
</html>
