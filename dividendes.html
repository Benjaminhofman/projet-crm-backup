<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi Dividendes</title>
<link rel="stylesheet" href="decl-shared.css">
</head>
<body>

<div class="header">
    <a href="declaratif.html" class="back">⬅ Retour</a>
    <h2 id="page-title"></h2>
    <button class="btn-export" onclick="exportCurrentCSV()">⬇ Export CSV</button>
</div>

<div class="counter" id="counter"></div>

<div class="filters-top">
    <input id="filter-assistant" placeholder="Assistant...">
    <input id="filter-collab" placeholder="Collaborateur...">
    <input id="filter-annee" placeholder="Année...">
    <input id="filter-cloture" placeholder="Clôture...">
</div>

<table>
<thead><tr id="table-head">
    <th>Code</th><th>Nom</th><th>Assistant</th><th>Collaborateur</th><th>Année</th><th>Clôture</th>
</tr></thead>
<tbody id="table"></tbody>
</table>

<script src="utils.js"></script>
<script src="decl-engine.js"></script>
<script>
initDeclaratifPage({
    titre: "Suivi Dividendes",
    emoji: "💰",
    // Pas de filterField : on charge tous les clients,
    // requireFn restreint l'affichage aux dossiers avec dividendes
    requireFn: c => parseFloat(c["dividendes"]) > 0,
    columns: [
        { header: "Dividendes", field: "dividendes" },
        { header: "Date 2777",  field: "date 2777 dividendes", type: "date" },
        { header: "2777",       field: "dividendes 2777",       type: "checkbox" },
        { header: "2561",       field: "dividendes 2561",       type: "checkbox" }
    ]
});
</script>

</body>
</html>
