<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rendement</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

.filters-top {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.filters-top input {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
    font-size: 13px;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

input {
    width: 80px;
    padding: 4px;
    text-align: center;
}

.result {
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>📈 Rendement</h2>
</div>

<!-- FILTRES -->
<div class="filters-top">
    <input id="search" placeholder="🔍 Nom client...">
    <input id="filter-assistant" placeholder="Assistant...">
    <input id="filter-collab" placeholder="Collaborateur...">
    <input id="filter-annee" placeholder="Année...">
    <input id="filter-cloture" placeholder="Clôture...">
</div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Année</th>
<th>Clôture</th>
<th>CA</th>
<th>Résultat</th>
<th>Ancienneté</th>
<th>Temps</th>
<th>Honoraires</th>
<th>€/h</th>
<th>€/h</th>
<th>Rendement</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script src="utils.js"></script>

<script>
(function(){

let dataGlobal;

/* LOAD DATA */
async function load() {

    const res = await fetch(API_URL + "/clients");
    const data = await res.json();

    dataGlobal = data;

    display(dataGlobal);
    bindFilters();
}

/* CALCUL */
function calculerLigne(row) {

    const temps = parseFloat(row.querySelector(".temps").value) || 0;
    const honos = parseFloat(row.querySelector(".honos").value) || 0;

    const resultCell = row.querySelector(".result");

    if (temps === 0) {
        resultCell.innerText = "-";
        return;
    }

    const taux = honos / temps;

    let color = "#27ae60";
    if (taux < 50) color = "#e74c3c";
    else if (taux < 80) color = "#f39c12";

    resultCell.innerHTML = `<span style="color:${color}">${taux.toFixed(2)}</span>`;
}

/* DISPLAY */
function display(data) {

    const table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(c => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
        <td>${c["code client"] || ""}</td>
        <td><b>${c["nom client"] || ""}</b></td>
        <td>${c["assistant"] || ""}</td>
        <td>${c["collaborateur"] || ""}</td>
        <td>${c["année"] || ""}</td>
        <td>${c["date de cloture"] || ""}</td>
        <td>${c["CA R"] || ""}</td>
        <td>${c["resultat R"] || ""}</td>
        <td>${c["ancienneté"] || ""}</td>

        <td>
            <input class="temps" value="${c["temps passé"] || ""}">
        </td>

        <td>
            <input class="honos" value="${c["honoraires cpta"] || ""}">
        </td>

        <td class="result">-</td>

        <td class="rendement-airtable" style="font-weight:bold;">
            ${c["rentabilite"] || ""}
        </td>
        `;

        const tempsInput = tr.querySelector(".temps");
        const honosInput = tr.querySelector(".honos");

        /* CALCUL LIVE */
        tempsInput.addEventListener("input", () => calculerLigne(tr));
        honosInput.addEventListener("input", () => calculerLigne(tr));

        /* SAVE */
        tempsInput.addEventListener("change", (e) => {
            updateField(c.id, "temps passé", e.target.value, e.target);
        });

        honosInput.addEventListener("change", (e) => {
            updateField(c.id, "honoraires cpta", e.target.value, e.target);
        });

        calculerLigne(tr);

        table.appendChild(tr);
    });
}

/* FILTRES */
function applyFilters() {

    const search = document.getElementById("search").value.toLowerCase();
    const assistant = document.getElementById("filter-assistant").value.toLowerCase();
    const collab = document.getElementById("filter-collab").value.toLowerCase();
    const annee = document.getElementById("filter-annee").value.toLowerCase();
    const cloture = document.getElementById("filter-cloture").value.toLowerCase();

    const filtered = dataGlobal.filter(c => {

        if (search && !(c["nom client"] || "").toLowerCase().includes(search)) return false;
        if (assistant && !(c["assistant"] || "").toLowerCase().includes(assistant)) return false;
        if (collab && !(c["collaborateur"] || "").toLowerCase().includes(collab)) return false;
        if (annee && !(String(c["année"] || "")).includes(annee)) return false;
        if (cloture && !(c["date de cloture"] || "").toLowerCase().includes(cloture)) return false;

        return true;
    });

    display(filtered);
}

/* BIND FILTERS */
function bindFilters() {
    document.querySelectorAll(".filters-top input").forEach(input => {
        input.addEventListener("input", applyFilters);
    });
}

/* INIT */
load();

})();
</script>

</body>
</html>
