<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rendement Client</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
}

.header {
    background: #c0392b;
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.container {
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th {
    background: #273c75;
    color: white;
    padding: 10px;
    text-align: center;
}

td {
    padding: 8px;
    text-align: center;
}

input {
    width: 100%;
    padding: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
    text-align: center;
}

.result {
    font-weight: bold;
    font-size: 18px;
}

.btn-retour {
    background: #34495e;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="btn-retour">⬅ Retour</a>
    <h2>📈 Rendement Client</h2>
</div>

<div class="container">

<table>
<thead>
<tr>
    <th>Code</th>
    <th>Nom</th>
    <th>Assistant</th>
    <th>Collaborateur</th>
    <th>Année</th>
    <th>Clôture</th>
    <th>CA</th>
    <th>Résultat</th>
    <th>Ancienneté</th>
    <th>Temps passé</th>
    <th>Honoraires</th>
    <th>€/h</th>
</tr>
</thead>

<tbody>
<tr>

<td><input id="code" disabled></td>
<td><input id="nom" disabled></td>
<td><input id="assistant" disabled></td>
<td><input id="collaborateur" disabled></td>

<td><input id="annee"></td>
<td><input id="cloture" disabled></td>

<td><input id="ca" disabled></td>
<td><input id="resultat" disabled></td>
<td><input id="anciennete" disabled></td>

<td><input id="temps"></td>
<td><input id="honos"></td>

<td class="result" id="rendement">-</td>

</tr>
</tbody>
</table>

</div>

<script src="utils.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const clientId = params.get("id");

/* LOAD CLIENT */
async function loadClient() {

    if (!clientId) return;

    const res = await fetch(API_URL + "/clients");
    const data = await res.json();

    const c = data.find(x => x.id === clientId);
    if (!c) return;

    document.getElementById("code").value = c["code client"] || "";
    document.getElementById("nom").value = c["nom client"] || "";
    document.getElementById("assistant").value = c["assistant"] || "";
    document.getElementById("collaborateur").value = c["collaborateur"] || "";
    document.getElementById("annee").value = new Date().getFullYear();
    document.getElementById("cloture").value = c["date de cloture"] || "";
    document.getElementById("ca").value = c["CA R"] || "";
    document.getElementById("resultat").value = c["resultat R"] || "";
    document.getElementById("anciennete").value = c["ancienneté"] || "";
    document.getElementById("honos").value = c["honoraires cpta"] || "";

    calculer();
}

loadClient();

/* CALCUL AUTO */
function calculer() {

    const temps = parseFloat(document.getElementById("temps").value) || 0;
    const honos = parseFloat(document.getElementById("honos").value) || 0;

    if (temps === 0) {
        document.getElementById("rendement").innerText = "-";
        return;
    }

    const taux = honos / temps;

    let color = "#27ae60";
    if (taux < 50) color = "#e74c3c";
    else if (taux < 80) color = "#f39c12";

    const el = document.getElementById("rendement");
    el.innerHTML = `<span style="color:${color}">${taux.toFixed(2)}</span>`;
}

/* EVENTS */
document.getElementById("temps").addEventListener("input", calculer);
document.getElementById("honos").addEventListener("input", calculer);

/* SAVE */
document.getElementById("temps").addEventListener("change", function(e) {
    updateField(clientId, "temps passe", e.target.value, e.target);
});

document.getElementById("honos").addEventListener("change", function(e) {
    updateField(clientId, "honoraires cpta", e.target.value, e.target);
});
</script>

</body>
</html>
