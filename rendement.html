<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rendement</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
    font-size: 13px;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

input {
    width: 80px;
    padding: 4px;
    text-align: center;
}

.result {
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>📈 Rendement</h2>
</div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Année</th>
<th>Clôture</th>
<th>CA</th>
<th>Résultat</th>
<th>Ancienneté</th>
<th>Temps</th>
<th>Honoraires</th>
<th>€/h</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script src="utils.js"></script>

<script>
(function(){

/* LOAD DATA */
async function load() {

    const res = await fetch(API_URL + "/clients");
    const data = await res.json();

    console.log("DATA LOADED:", data);

    display(data);
}

/* CALCUL */
function calculerLigne(row) {

    const temps = parseFloat(row.querySelector(".temps").value) || 0;
    const honos = parseFloat(row.querySelector(".honos").value) || 0;

    const resultCell = row.querySelector(".result");

    if (temps === 0) {
        resultCell.innerText = "-";
        return;
    }

    const taux = honos / temps;

    let color = "#27ae60";
    if (taux < 50) color = "#e74c3c";
    else if (taux < 80) color = "#f39c12";

    resultCell.innerHTML = `<span style="color:${color}">${taux.toFixed(2)}</span>`;
}

/* DISPLAY */
function display(data) {

    const table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(c => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
        <td>${c["code client"] || ""}</td>
        <td><b>${c["nom client"] || ""}</b></td>
        <td>${c["assistant"] || ""}</td>
        <td>${c["collaborateur"] || ""}</td>
        <td>${c["année"] || ""}</td>
        <td>${c["date de cloture"] || ""}</td>
        <td>${c["CA R"] || ""}</td>
        <td>${c["resultat R"] || ""}</td>
        <td>${c["ancienneté"] || ""}</td>

        <td>
            <input class="temps" value="${c["temps passé"] || ""}">
        </td>

        <td>
            <input class="honos" value="${c["honoraires cpta"] || ""}">
        </td>

        <td class="result">-</td>
        `;

        const tempsInput = tr.querySelector(".temps");
        const honosInput = tr.querySelector(".honos");

        /* CALCUL LIVE */
        tempsInput.addEventListener("input", () => calculerLigne(tr));
        honosInput.addEventListener("input", () => calculerLigne(tr));

        /* SAVE */
        tempsInput.addEventListener("change", (e) => {
            updateField(c.id, "temps passé", e.target.value, e.target);
        });

        honosInput.addEventListener("change", (e) => {
            updateField(c.id, "honoraires cpta", e.target.value, e.target);
        });

        /* CALCUL INIT */
        calculerLigne(tr);

        table.appendChild(tr);
    });
}

/* INIT */
load();

})();
</script>

</body>
</html>
