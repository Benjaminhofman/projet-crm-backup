<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi Opportunités</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

.counter {
    font-weight: bold;
    margin-bottom: 10px;
}

.filters {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.filters input {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #dfe6ff;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>🎯 Suivi Opportunités</h2>
</div>

<div class="counter" id="counter"></div>

<div class="filters">
    <input id="f-assistant" placeholder="Assistant">
    <input id="f-collab" placeholder="Collaborateur">
    <input id="f-annee" placeholder="Année">
    <input id="f-cloture" placeholder="Clôture">
</div>

<table>
<thead>

<tr>
<th>Code</th>
<th>Année</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Clôture</th>

<th>Retraite</th>
<th>Patrimoniale</th>
<th>Placement</th>
<th>Franchise TVA prest</th>
<th>Franchise TVA achat/revente</th>
<th>Prévoyance</th>
<th>Arbitrage rémunération</th>
</tr>

<tr id="filters-opportunites">
<td colspan="6"></td>

<td><input type="checkbox" data-field="mission retraite"></td>
<td><input type="checkbox" data-field="mission patrimoniale"></td>
<td><input type="checkbox" data-field="mission placement"></td>
<td><input type="checkbox" data-field="franchise TVA prest"></td>
<td><input type="checkbox" data-field="franchise TVA achrevente"></td>
<td><input type="checkbox" data-field="op Prevoyance"></td>
<td><input type="checkbox" data-field="arbitrage rémunération dirigeant"></td>

</tr>

</thead>

<tbody id="table"></tbody>
</table>

<!-- 🔥 TOOLTIP -->
<div id="tooltip-client" style="
    position:absolute;
    display:none;
    background:white;
    border:1px solid #ccc;
    border-radius:8px;
    padding:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    font-size:12px;
    z-index:999;
    max-width:250px;
"></div>

<script src="utils.js"></script>
<script>


// affichage
function display(data) {

    const table = document.getElementById("table");
    table.innerHTML = "";

    document.getElementById("counter").innerText =
        "Nombre de dossiers : " + data.length;

    data.forEach(c => {

        table.innerHTML += `
        <tr 
            onmouseenter="showTooltip(event, ${JSON.stringify(c).replace(/"/g, '&quot;')})"
            onmouseleave="hideTooltip()"
            onclick="window.location.href='client.html?id=${c.id}'"
        >

            <td>${c["code client"] || ""}</td>
            <td>${c["année"] || ""}</td>
            <td>${c["nom client"] || ""}</td>
            <td>${c["assistant"] || ""}</td>
            <td>${c["collaborateur"] || ""}</td>
            <td>${c["date de cloture"] || ""}</td>

            ${buildCheckbox(c, "mission retraite")}
            ${buildCheckbox(c, "mission patrimoniale")}
            ${buildCheckbox(c, "mission placement")}
            ${buildCheckbox(c, "franchise TVA prest")}
            ${buildCheckbox(c, "franchise TVA achrevente")}
            ${buildCheckbox(c, "op Prevoyance")}
            ${buildCheckbox(c, "arbitrage rémunération dirigeant")}

        </tr>`;
    });
}

// checkbox dynamique
function buildCheckbox(c, field) {
    return `
    <td>
        <input type="checkbox"
            ${c[field] ? "checked" : ""}
            onchange="updateField('${c.id}', '${field}', this.checked)">
    </td>`;
}

// update airtable

// tooltip
function showTooltip(event, client) {

    const tooltip = document.getElementById("tooltip-client");

    tooltip.innerHTML = `
        <strong>${client["nom client"] || ""}</strong><br>
        Code : ${client["code client"] || ""}<br>
        Assistant : ${client["assistant"] || ""}<br>
        Collaborateur : ${client["collaborateur"] || ""}<br>
        Clôture : ${client["date de cloture"] || ""}<br>
        CA : ${client["CA R"] || ""}<br>
        Résultat : ${client["resultat R"] || ""}
    `;

    tooltip.style.display = "block";
    tooltip.style.left = event.pageX + 15 + "px";
    tooltip.style.top = event.pageY + 15 + "px";
}

function hideTooltip() {
    document.getElementById("tooltip-client").style.display = "none";
}

// filtres
function applyFilters() {

    const assistant = document.getElementById("f-assistant").value.toLowerCase();
    const collab = document.getElementById("f-collab").value.toLowerCase();
    const annee = document.getElementById("f-annee").value.toLowerCase();
    const cloture = document.getElementById("f-cloture").value.toLowerCase();

    const checkedFields = Array.from(
        document.querySelectorAll("#filters-opportunites input:checked")
    ).map(cb => cb.dataset.field);

    const filtered = dataGlobal.filter(c => {

        if (assistant && !(c["assistant"] || "").toLowerCase().includes(assistant)) return false;
        if (collab && !(c["collaborateur"] || "").toLowerCase().includes(collab)) return false;
        if (annee && !(String(c["année"])).includes(annee)) return false;
        if (cloture && !(c["date de cloture"] || "").toLowerCase().includes(cloture)) return false;

        return checkedFields.every(f => Boolean(c[f]) === true);
    });

    display(filtered);
}

// load
async function load() {
    dataGlobal = await fetchClients();

    applyFilters();

    bindFilterInputs(".filters input");
    bindFilterInputs("#filters-opportunites input", "change");
}

load();
</script>

</body>
</html>
