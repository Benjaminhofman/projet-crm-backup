<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calendrier Anniversaires</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

#calendar {
    margin-top: 20px;
    background: white;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>🎂 Calendrier des anniversaires</h2>
</div>

<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script>
const API_URL = "https://projet-crm-m0o3.onrender.com";

async function loadCalendar() {

    const res = await fetch(API_URL + "/clients");
    const data = await res.json();

    const currentYear = new Date().getFullYear(); // 🔥 dynamique

    // 🔥 transformation des anniversaires en events
    const events = data
        .filter(c => c["anniversaire"])
        .map(c => {

            const date = new Date(c["anniversaire"]);

            const month = String(date.getMonth() + 1).padStart(2,'0');
            const day = String(date.getDate()).padStart(2,'0');

            // 🔥 utilisation du champ AGE Airtable
            const age = c["age"] ? ` (${c["age"]} ans)` : "";

            return {
                title: `${c["nom client"]} 🎂${age}`,
                start: `${currentYear}-${month}-${day}`, // 🔥 clé du système
                allDay: true
            };
        });

    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        locale: 'fr',
        height: "auto",
        events: events
    });

    calendar.render();
}

loadCalendar();
</script>

</body>
</html>
