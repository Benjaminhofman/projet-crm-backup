<!DOCTYPE html>
<html>
<head>
<title>Détail client</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    padding: 20px;
    font-size: 15px;
}

/* HEADER */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.actions {
    display: flex;
    gap: 10px;
}

/* BOUTONS */
.btn {
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    transition: 0.2s;
}

.btn-create {
    background: #27ae60;
    color: white;
}

.btn-create:hover {
    background: #2ecc71;
    transform: translateY(-1px);
}

.btn-edit {
    background: #2980b9;
    color: white;
}

.btn-edit:hover {
    background: #3498db;
    transform: translateY(-1px);
}

.btn.disabled {
    background: #ccc;
    cursor: not-allowed;
    pointer-events: none;
}

.back {
    text-decoration: none;
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
}

.back:hover {
    background: #40739e;
}

h1 {
    color: #2f3640;
    margin-bottom: 15px;
}

/* CARDS */
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0px 3px 12px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

/* FIELD */
.field {
    padding: 10px;
    background: #f1f2f6;
    border-radius: 6px;
}

.label {
    font-weight: 600;
    font-size: 13px;
    color: #666;
}

.value {
    font-size: 15px;
    color: #2f3640;
}

/* TITRES BLOCS */
h3 {
    margin-bottom: 10px;
    color: #273c75;
}

/* HIGHLIGHT */
.highlight {
    background: #e8f7ff !important;
    border-left: 5px solid #0984e3;
}

.highlight .value {
    font-size: 17px;
    font-weight: bold;
    color: #2c3e50;
}

/* KPI */
.kpi-ca {
    border-left: 5px solid #27ae60;
    background: #eafaf1;
}

.kpi-resultat {
    border-left: 5px solid #e74c3c;
    background: #fdecea;
}

.kpi-ca .value {
    font-weight: bold;
    color: #27ae60;
}

.kpi-resultat .value {
    font-weight: bold;
    color: #e74c3c;
}

/* 🔥 NOUVEAU KPI TAUX */
.kpi-taux {
    border-left: 5px solid #f39c12;
    background: #fff6e5;
}

.kpi-taux .value {
    font-weight: bold;
    color: #d35400;
}
</style>
</head>

<body>

<div class="top-bar">

    <a href="index.html" class="back">⬅ Retour</a>

    <div class="actions">
        <a id="create-link" href="#" target="_blank" class="btn btn-create">
            ➕ Créer client
        </a>

        <a id="edit-link" href="#" target="_blank" class="btn btn-edit">
            ✏️ Modifier
        </a>
    </div>

</div>

<h1>📄 Fiche client</h1>

<div id="client-details"></div>

<script>
const API_URL = "https://projet-crm-m0o3.onrender.com";

function getId() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
}

function field(label, value, type = "") {
    if (!value && value !== 0) return "";
    return `
        <div class="field ${type}">
            <div class="label">${label}</div>
            <div class="value">${value}</div>
        </div>
    `;
}

function block(title, content) {
    return `
        <div class="card">
            <h3>${title}</h3>
            <div class="grid">${content}</div>
        </div>
    `;
}

async function loadClient() {
    const id = getId();
    const res = await fetch(API_URL + "/client/" + id);
    const data = await res.json();

    const createLink = data["Créer client"];
    const editLink = data["Lien modification"];

    const createBtn = document.getElementById("create-link");
    const editBtn = document.getElementById("edit-link");

    if (createLink) createBtn.href = createLink;
    else createBtn.classList.add("disabled");

    if (editLink) editBtn.href = editLink;
    else editBtn.classList.add("disabled");

    // 🔥 CALCULS
    const tempsPasse = parseFloat(data["temps passé"]) || 0;
    const honoraires = parseFloat(data["honoraires cpta"]) || 0;
    const tauxHoraire = tempsPasse > 0 ? (honoraires / tempsPasse) : 0;

    let html = "";

    html += block("🧾 Identification client",
        field("Nom client", data["nom client"], "highlight") +
        field("Activité", data["activite R"], "highlight") +
        field("Code client", data["code client"]) +
        field("Année", data["année"]) +
        field("Date de clôture", data["date de cloture"]) +
        field("Date entrée", data["date entrée"]) +
        field("Anniversaire", data["anniversaire"]) +
        field("Structure", data["structure"]) +
        field("Age", data["age"]) +
        field("Ancienneté", data["ancienneté"]) +
        field("Mode d'entrée", data["mode d'entrée"]) +
        field("Assistant", data["assistant"]) +
        field("Collaborateur", data["collaborateur"]) +
        field("Honoraires", honoraires) +

        // 🔥 AJOUTS PROPRES
        field("IR", data["mai IR"]) +
        field("Temps passé (h)", tempsPasse, "kpi-taux") +
        field("Taux horaire (€ / h)", tauxHoraire.toFixed(2), "kpi-taux") +

        field("Prestation", data["prestation"]) +
        field("Achat revente", data["achat revente"]) +
        field("Prevoyance", data["prevoyance"]) +
        field("Exo entreprise nouvelle", data["exo entre nouvelle"]) +
        field("Souhait anniversaire", data["souhait anniversaire"])
    );

    html += block("📝 Commentaire",
        field("Commentaire", data["commentaire"])
    );

    html += block("📞 Contact client",
        field("Contact", data["contact"]) +
        field("Téléphone", data["tel"]) +
        field("Email", data["e mail"])
    );

    html += block("📊 Déclarations",
        field("CA12", data["CA12"]) +
        field("TVS", data["TVS"]) +
        field("CVAE", data["CVAE"]) +
        field("IR", data["impot sur le revenu"]) +
        field("IS", data["IS"]) +
        field("Liasse", data["liasse"]) +
        field("CFE", data["Cotisation foncière des entreprises"])
    );

    html += block("🚀 Missions exceptionnelles",
        field("Juridique", data["juridique exceptionnel"]) +
        field("Prévisionnel", data["previsionnel"]) +
        field("Eval", data["eval"]) +
        field("Prévoyance S", data["prevoyance S"]) +
        field("Patrimoniale", data["patrimoniale"]) +
        field("Placement", data["placement"])
    );

    html += block("⚙️ Missions de gestion",
        field("Situation", data["situation"]) +
        field("TBB", data["tbb"])
    );

    html += block("💰 Chiffres clés",
        field("CA", data["CA R"], "kpi-ca") +
        field("Résultat", data["resultat R"], "kpi-resultat") +
        field("Assurance", data["assurance R"]) +
        field("Déplacement", data["deplacement R"]) +
        field("Loyer", data["loyer R"]) +
        field("CFE", data["CFE R"]) +
        field("Publicité", data["publicite R"]) +
        field("Honoraires", data["honoraires R"]) +
        field("Banque", data["banque R"]) +
        field("Emprunt", data["emprunt R"]) +
        field("Masse salariale", data["m_salariale R"]) +
        field("Produits", data["produit R"]) +
        field("Charges", data["charge R"]) +
        field("Trésorerie", data["tresorerie R"]) +
        field("Code NAF", data["code naf R"])
    );

    document.getElementById("client-details").innerHTML = html;
}

loadClient();
</script>

</body>
</html>
