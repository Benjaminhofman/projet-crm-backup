<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi missions exceptionnelles</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

.filters {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.filters input {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
}

textarea {
    width: 100%;
    height: 60px;
    border-radius: 6px;
    border: 1px solid #ccc;
    padding: 5px;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>🚀 Suivi missions exceptionnelles</h2>
</div>

<div class="filters">
    <input id="f-assistant" placeholder="Assistant">
    <input id="f-collab" placeholder="Collaborateur">
    <input id="f-annee" placeholder="Année">
    <input id="f-cloture" placeholder="Clôture">
</div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Année</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Clôture</th>

<th>Juridique exceptionnel</th>
<th>Prévisionnel</th>
<th>Eval</th>
<th>Prévoyance S</th>
<th>Patrimoniale</th>
<th>Placement</th>

</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>
const API_URL = "https://projet-crm-m0o3.onrender.com";

let dataGlobal = [];

// 🔥 affichage
function display(data) {

    const table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(c => {

        table.innerHTML += `
        <tr>

            <td>${c["code client"] || ""}</td>
            <td>${c["année"] || ""}</td>
            <td>${c["nom client"] || ""}</td>
            <td>${c["assistant"] || ""}</td>
            <td>${c["collaborateur"] || ""}</td>
            <td>${c["date de cloture"] || ""}</td>

            ${buildTextarea(c, "juridique exceptionnel")}
            ${buildTextarea(c, "previsionnel")}
            ${buildTextarea(c, "eval")}
            ${buildTextarea(c, "prevoyance S")}
            ${buildTextarea(c, "patrimoniale")}
            ${buildTextarea(c, "placement")}

        </tr>`;
    });
}

// 🔥 génération textarea
function buildTextarea(c, field) {
    return `
    <td>
        <textarea
            onchange="updateField('${c.id}', '${field}', this.value)"
        >${c[field] || ""}</textarea>
    </td>`;
}

// 🔥 update Airtable
async function updateField(id, field, value) {

    await fetch(API_URL + "/update-airtable", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id: id,
            field: field,
            value: value
        })
    });
}

// 🔥 filtres
function applyFilters() {

    const assistant = document.getElementById("f-assistant").value.toLowerCase();
    const collab = document.getElementById("f-collab").value.toLowerCase();
    const annee = document.getElementById("f-annee").value.toLowerCase();
    const cloture = document.getElementById("f-cloture").value.toLowerCase();

    const filtered = dataGlobal.filter(c => {

        if (assistant && !(c["assistant"] || "").toLowerCase().includes(assistant)) return false;
        if (collab && !(c["collaborateur"] || "").toLowerCase().includes(collab)) return false;
        if (annee && !(String(c["année"])).includes(annee)) return false;
        if (cloture && !(c["date de cloture"] || "").toLowerCase().includes(cloture)) return false;

        return true;
    });

    display(filtered);
}

// 🔥 load
async function load() {

    const res = await fetch(API_URL + "/clients");
    dataGlobal = await res.json();

    applyFilters();

    document.querySelectorAll(".filters input").forEach(i =>
        i.addEventListener("input", applyFilters)
    );
}

load();
</script>

</body>
</html>
