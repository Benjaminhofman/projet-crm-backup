<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CRM Clients</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
}

.header {
    background: #273c75;
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    width: 250px;
}

.container {
    padding: 20px;
}

.dashboard {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    min-width: 180px;
    text-align: center;
}

.filters-container {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
    margin-bottom: 20px;
}

.filter-group {
    background: white;
    padding: 10px;
    border-radius: 8px;
}

.checkbox-list {
    height: 120px;
    overflow-y: auto;
    background: #f1f2f6;
    padding: 5px;
    border-radius: 5px;
}

.checkbox-list label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    padding: 4px;
}

.sortable {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.sortable .arrow {
    font-size: 12px;
}

table {
    border-collapse: collapse;
    width: 100%;
    background: white;
}

th {
    background: #273c75;
    color: white;
    padding: 10px;
    cursor: pointer;
}

td {
    padding: 10px;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #e8f0fe;
    cursor: pointer;
}

.btn {
    background: #44bd32;
    border: none;
    padding: 6px 10px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.btn:hover {
    background: #2ecc71;
}

.alert {
    color: #e74c3c;
    font-weight: bold;
    margin-left: 5px;
}

.alert-badge {
    background: #ffeaea;
    color: #e74c3c;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 11px;
    margin-left: 5px;
}
</style>
</head>

<body>

<div class="header">
    <h2>📊 CRM Clients</h2>

    <div style="display:flex; gap:10px;">
        <a href="declaratif.html" class="btn" style="background:#e67e22;">
            📑 Déclaratif
        </a>
        <input type="text" id="search" placeholder="🔍 Rechercher un client...">
    </div>
</div>

<div class="container">

<div class="dashboard">
    <div class="card">
        <h4>👥 Clients</h4>
        <p id="total-clients">0</p>
    </div>

    <div class="card">
        <h4>💰 Honos moyen</h4>
        <p id="avg-honos">0 €</p>
    </div>

    <div class="card">
        <button class="btn" onclick="sortByHonos()">📊 Top honoraires</button>
    </div>
</div>

<div class="filters-container" id="filters"></div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Nom</th>
<th>Clôture</th>
<th>Structure</th>
<th>Ancienneté</th>
<th>Honos</th>
<th>Collab</th>
<th>Assistant</th>
<th onclick="sortByCA()">CA 🔽</th>

<th onclick="sortByResultat()" class="sortable">
    <span>Résultat</span>
    <span class="arrow">🔽</span>
</th>

<th>Activité</th>
<th>Action</th>
</tr>
</thead>

<tbody id="clients-table"></tbody>
</table>

</div>

<script>
const API_URL = "https://projet-crm-m0o3.onrender.com";

let clientsData = [];

let filtersConfig = [
    { field: "collaborateur", label: "Collaborateur" },
    { field: "structure", label: "Structure" },
    { field: "activite R", label: "Activité" },
    { field: "assistant", label: "Assistant" },
    { field: "date de cloture", label: "Date de clôture" }
];

async function loadClients() {
    const res = await fetch(API_URL + "/clients");
    clientsData = await res.json();

    buildFilters();
    displayClients(clientsData);
}

function updateDashboard(data) {
    const total = data.length;

    const totalHonos = data.reduce((sum, c) => {
        return sum + (parseFloat(c["honoraires cpta"]) || 0);
    }, 0);

    const avg = total ? totalHonos / total : 0;

    document.getElementById("total-clients").innerText = total;

    document.getElementById("avg-honos").innerText =
        new Intl.NumberFormat('fr-FR', {
            style: 'currency',
            currency: 'EUR'
        }).format(avg);
}

function buildFilters() {
    const container = document.getElementById("filters");
    container.innerHTML = "";

    filtersConfig.forEach(f => {
        const values = [...new Set(clientsData.map(c => c[f.field]).filter(Boolean))].sort();

        const group = document.createElement("div");
        group.className = "filter-group";

        group.innerHTML = `
            <strong>${f.label}</strong>
            <input type="text" placeholder="Rechercher..." data-field="${f.field}">
            <div class="checkbox-list" id="list-${f.field}"></div>
        `;

        container.appendChild(group);

        renderCheckboxList(f.field, values);

        group.querySelector("input").addEventListener("input", (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = values.filter(v => v.toLowerCase().includes(val));
            renderCheckboxList(f.field, filtered);
        });
    });
}

function renderCheckboxList(field, values) {
    const container = document.getElementById("list-" + field);
    container.innerHTML = "";

    values.forEach(val => {
        container.innerHTML += `
            <label>
                <input type="checkbox" value="${val}" data-field="${field}">
                ${val}
            </label>
        `;
    });

    container.querySelectorAll("input").forEach(cb => {
        cb.addEventListener("change", applyFilters);
    });
}

function applyFilters() {
    const checkboxes = document.querySelectorAll("input[type=checkbox]:checked");

    const filters = {};
    checkboxes.forEach(cb => {
        if (!filters[cb.dataset.field]) filters[cb.dataset.field] = [];
        filters[cb.dataset.field].push(cb.value);
    });

    const filtered = clientsData.filter(c =>
        Object.keys(filters).every(field =>
            filters[field].includes(c[field])
        )
    );

    displayClients(filtered);
}

document.getElementById("search").addEventListener("input", function(e) {
    const value = e.target.value.toLowerCase();

    const filtered = clientsData.filter(c =>
        (c["nom client"] || "").toLowerCase().includes(value)
    );

    displayClients(filtered);
});

function sortByHonos() {
    const sorted = [...clientsData].sort((a, b) =>
        (parseFloat(b["honoraires cpta"]) || 0) -
        (parseFloat(a["honoraires cpta"]) || 0)
    );
    displayClients(sorted);
}

function sortByCA() {
    const sorted = [...clientsData].sort((a, b) =>
        (parseFloat(b["CA R"]) || 0) -
        (parseFloat(a["CA R"]) || 0)
    );
    displayClients(sorted);
}

function sortByResultat() {
    const sorted = [...clientsData].sort((a, b) =>
        (parseFloat(b["resultat R"]) || 0) -
        (parseFloat(a["resultat R"]) || 0)
    );
    displayClients(sorted);
}

function viewClient(id) {
    window.location.href = "client.html?id=" + id;
}

function displayClients(data) {

    updateDashboard(data);

    const table = document.getElementById("clients-table");
    table.innerHTML = "";

    if (!data.length) {
        table.innerHTML = "<tr><td colspan='12'>Aucun résultat</td></tr>";
        return;
    }

    data.forEach(c => {

        const anciennete = parseFloat(c["ancienneté"]) || 0;

        table.innerHTML += `
        <tr onclick="viewClient('${c.id}')">

            <td>${c["code client"] || ""}</td>
            <td><strong>${c["nom client"] || ""}</strong></td>
            <td>${c["date de cloture"] || ""}</td>
            <td>${c["structure"] || ""}</td>

            <td>
                ${anciennete}
                ${anciennete < 1 ? '<span class="alert">⚠️</span><span class="alert-badge">Nouveau</span>' : ''}
            </td>

            <td>${c["honoraires cpta"] || ""}</td>
            <td>${c["collaborateur"] || ""}</td>
            <td>${c["assistant"] || ""}</td>

            <td>${c["CA R"] || ""}</td>
            <td>${c["resultat R"] || ""}</td>
            <td>${c["activite R"] || ""}</td>

            <td>
                <button class="btn" onclick="event.stopPropagation(); viewClient('${c.id}')">
                    Voir
                </button>
            </td>

        </tr>`;
    });
}

loadClients();
</script>

</body>
</html>
