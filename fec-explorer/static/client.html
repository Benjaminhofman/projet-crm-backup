<!DOCTYPE html>
<html>
<head>
<title>Détail client</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    padding: 20px;
    font-size: 15px;
}

/* HEADER */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.actions {
    display: flex;
    gap: 10px;
}

/* BOUTONS */
.btn {
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 14px;
    transition: 0.2s;
}

.btn-create {
    background: #27ae60;
    color: white;
}

.btn-create:hover {
    background: #2ecc71;
    transform: translateY(-1px);
}

.btn-edit {
    background: #2980b9;
    color: white;
}

.btn-edit:hover {
    background: #3498db;
    transform: translateY(-1px);
}

.btn.disabled {
    background: #ccc;
    cursor: not-allowed;
    pointer-events: none;
}

.back {
    text-decoration: none;
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
}

.back:hover {
    background: #40739e;
}

h1 {
    color: #2f3640;
    margin-bottom: 15px;
}

/* CARDS */
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0px 3px 12px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

/* FIELD */
.field {
    padding: 10px;
    background: #f1f2f6;
    border-radius: 6px;
}

.label {
    font-weight: 600;
    font-size: 13px;
    color: #666;
}

.value {
    font-size: 15px;
    color: #2f3640;
}

/* TITRES BLOCS */
h3 {
    margin-bottom: 10px;
    color: #273c75;
}

/* HIGHLIGHT */
.highlight {
    background: #e8f7ff !important;
    border-left: 5px solid #0984e3;
}

.highlight .value {
    font-size: 17px;
    font-weight: bold;
    color: #2c3e50;
}

/* KPI */
.kpi-ca {
    border-left: 5px solid #27ae60;
    background: #eafaf1;
}

.kpi-resultat {
    border-left: 5px solid #e74c3c;
    background: #fdecea;
}

.kpi-ca .value {
    font-weight: bold;
    color: #27ae60;
}

.kpi-resultat .value {
    font-weight: bold;
    color: #e74c3c;
}

/* 🔥 NOUVEAU KPI TAUX */
.kpi-taux {
    border-left: 5px solid #f39c12;
    background: #fff6e5;
}

.kpi-taux .value {
    font-weight: bold;
    color: #d35400;
}

.field-wide {
    grid-column: 1 / -1;
    white-space: pre-wrap;
    word-break: break-word;
}
</style>
</head>

<body>

<div class="top-bar">

    <a href="index.html" class="back">⬅ Retour</a>

    <div class="actions">
        <a id="create-link" href="#" target="_blank" class="btn btn-create">
            ➕ Créer client
        </a>

        <a id="edit-link" href="#" target="_blank" class="btn btn-edit">
            ✏️ Modifier
        </a>
    </div>

</div>

<h1>📄 Fiche client</h1>

<div id="client-details"></div>

<script>
const API_URL = "/api";

// Variable globale partagée entre toutes les pages déclaratives
let dataGlobal = [];

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}

// Score de rentabilité (retourne la valeur numérique brute)
function getRentabiliteScore(val) {
    return parseFloat(val) || 0;
}

// Chargement des clients depuis l'API avec gestion d'erreur
async function fetchClients() {
    try {
        const res = await fetch(API_URL + "/clients");
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        return await res.json();
    } catch (err) {
        console.error("Erreur fetchClients:", err);
        return [];
    }
}

// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
<script>

function getSiret() {
    const params = new URLSearchParams(window.location.search);
    return params.get("siret");
}

function field(label, value, type = "") {
    if (!value) return "";
    return `
        <div class="field ${type}">
            <div class="label">${label}</div>
            <div class="value">${esc(value)}</div>
        </div>
    `;
}

function block(title, content) {
    return `
        <div class="card">
            <h3>${title}</h3>
            <div class="grid">${content}</div>
        </div>
    `;
}

async function loadClient() {
    const siret = getSiret();
    const res = await fetch(API_URL + "/client/" + siret);
    const data = await res.json();

    const createLink = data.creer_client;
    const editLink = data.lien_modification;

    const createBtn = document.getElementById("create-link");
    const editBtn = document.getElementById("edit-link");

    if (createLink) createBtn.href = createLink;
    else createBtn.classList.add("disabled");

    if (editLink) editBtn.href = editLink;
    else editBtn.classList.add("disabled");

    // 🔥 CALCULS
    const tempsPasse = parseFloat(data.temps_passe) || 0;
    const honoraires = parseFloat(data.honoraires_cpta) || 0;
    const tauxHoraire = tempsPasse > 0 ? (honoraires / tempsPasse) : 0;

    let html = "";

    html += block("🧾 Identification client",
        field("Nom client", data.nom_client, "highlight") +
        field("Activité", data.activite_r, "highlight") +
        field("Code client", data.code_client) +
        field("Année", data.annee) +
        field("Date de clôture", data.date_de_cloture) +
        field("Date entrée", data.date_entree) +
        field("Anniversaire", data["anniversaire"]) +
        field("Structure", data.structure) +
        field("Age", data.age) +
        field("Ancienneté", data["ancienneté"]) +
        field("Mode d'entrée", data.mode_dentree) +
        field("Assistant", data.assistant) +
        field("Collaborateur", data.collaborateur) +
        field("Honoraires", honoraires) +

        // 🔥 AJOUTS PROPRES
        field("IR", data.mai_ir) +
        field("Temps passé (h)", tempsPasse, "kpi-taux") +
        field("Taux horaire (€ / h)", tauxHoraire.toFixed(2), "kpi-taux") +

        field("Prestation", data.prestation) +
        field("Achat revente", data.achat_revente) +
        field("Prevoyance", data.prevoyance) +
        field("Exo entreprise nouvelle", data.exo_entre_nouvelle) +
        field("Souhait anniversaire", data.souhait_anniversaire)
    );


    html += block("📞 Contact client",
        field("Contact", data.contact) +
        field("Téléphone", data.tel) +
        field("Email", data.e_mail)
    );

    html += block("📊 Déclarations",
        field("CA12", data.ca12) +
        field("TVS", data.tvs) +
        field("CVAE", data.cvae) +
        field("IR", data.impot_sur_le_revenu) +
        field("IS", data.is) +
        field("Liasse", data.liasse) +
        field("CFE", data.cotisation_fonciere_des_entreprises)
    );

    html += block("🚀 Missions exceptionnelles",
        field("Juridique", data.juridique_exceptionnel) +
        field("Prévisionnel", data.previsionnel) +
        field("Eval", data.eval) +
        field("Prévoyance S", data.prevoyance_s) +
        field("Patrimoniale", data.patrimoniale) +
        field("Placement", data.placement)
    );

    html += block("⚙️ Missions de gestion",
        field("Situation", data.situation) +
        field("TBB", data.tbb)
    );

    html += block("💰 Chiffres clés",
        field("CA", data.ca_r, "kpi-ca") +
        field("Résultat", data.resultat, "kpi-resultat") +
        field("Assurance", data.assurance_r) +
        field("Déplacement", data.deplacement_r) +
        field("Loyer", data.loyer_r) +
        field("CFE", data.cfe_r) +
        field("Publicité", data.publicite_r) +
        field("Honoraires", data.honoraires_r) +
        field("Banque", data.banque_r) +
        field("Emprunt", data.emprunt_r) +
        field("Masse salariale", data.m_salariale_r) +
        field("Produits", data.produit_r) +
        field("Charges", data.charge_r) +
        field("Trésorerie", data.tresorerie_r) +
        field("Code NAF", data.code_naf_r)
    );

    if (data.commentaires) {
        html += `
        <div class="card">
            <h3>💬 Commentaires</h3>
            <div class="grid">
                <div class="field field-wide">
                    <div class="label">Commentaires</div>
                    <div class="value">${esc(data.commentaires)}</div>
                </div>
            </div>
        </div>`;
    }

    document.getElementById("client-details").innerHTML = html;
}

loadClient();
</script>

</body>
</html>
