<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi CVAE</title>
<link rel="stylesheet" href="decl-shared.css">
</head>
<body>

<div class="header">
    <a href="declaratif.html" class="back">⬅ Retour</a>
    <h2 id="page-title"></h2>
    <button class="btn-export" onclick="exportCurrentCSV()">⬇ Export CSV</button>
</div>

<div class="counter" id="counter"></div>

<div class="filters-top">
    <input type="text" id="filter-assistant" list="dl-assistant" placeholder="— Assistant —" autocomplete="off">
    <datalist id="dl-assistant"></datalist>
    <input type="text" id="filter-collab" list="dl-collab" placeholder="— Collaborateur —" autocomplete="off">
    <datalist id="dl-collab"></datalist>
    <input type="text" id="filter-annee" list="dl-annee" placeholder="— Année —" autocomplete="off">
    <datalist id="dl-annee"></datalist>
    <input type="text" id="filter-cloture" list="dl-cloture" placeholder="— Clôture —" autocomplete="off">
    <datalist id="dl-cloture"></datalist>
</div>

<table>
<thead><tr id="table-head">
    <th>Code</th><th>Nom</th><th>Assistant</th><th>Collaborateur</th><th>Année</th><th>Clôture</th>
</tr></thead>
<tbody id="table"></tbody>
</table>

<script>
const API_URL = "/api";

// Variable globale partagée entre toutes les pages déclaratives
let dataGlobal = [];

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}

// Score de rentabilité (retourne la valeur numérique brute)
function getRentabiliteScore(val) {
    return parseFloat(val) || 0;
}

// Chargement des clients depuis l'API avec gestion d'erreur
async function fetchClients() {
    try {
        const res = await fetch(API_URL + "/clients");
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        return await res.json();
    } catch (err) {
        console.error("Erreur fetchClients:", err);
        return [];
    }
}

// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
<script src="decl-engine.js"></script>
<script>
const _fmtCA = (v, c) => {
    if (v == null || v === '') return '—';
    return Number(v).toLocaleString('fr-FR') + ' €';
};
const _tooltipCA = c => {
    if (c.ca_r == null || c.ca_r === '') return 'CA non renseigné — seuil CVAE : 500 000 €';
    return 'CA : ' + Number(c.ca_r).toLocaleString('fr-FR') + ' € — seuil CVAE : 500 000 €';
};
const _disabledCVAE = c => c.ca_r != null && c.ca_r !== '' && parseFloat(c.ca_r) <= 500000;

initDeclaratifPage({
    titre: "Suivi CVAE",
    emoji: "📊",
    filterField: "cvae",
    columns: [
        { header: "CA",               field: "ca_r",                  type: 'readonly', formatFn: _fmtCA },
        { header: "Mai CVAE",         field: "mai_cvae",              disabledFn: _disabledCVAE, tooltipFn: _tooltipCA },
        { header: "Acompte Juin",     field: "acompte_cvae_juin",     disabledFn: _disabledCVAE, tooltipFn: _tooltipCA },
        { header: "Acompte Septembre",field: "acompte_cvae_septembre",disabledFn: _disabledCVAE, tooltipFn: _tooltipCA }
    ]
});
</script>

</body>
