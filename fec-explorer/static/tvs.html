<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi TVS</title>
<link rel="stylesheet" href="decl-shared.css">
<style>
/* Wrapper tableau */
.table-scroll {
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
/* En-tête collant */
.table-scroll table thead th {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #1e3a5f;
}
/* Le tableau s'étend librement — override decl-shared.css */
.table-scroll table {
    overflow: visible;
    border-radius: 0;
    box-shadow: none;
    min-width: max-content;
    table-layout: auto;
}
/* Colonnes mois (7e colonne et au-delà) : 100px minimum */
.table-scroll table th:nth-child(n+7),
.table-scroll table td:nth-child(n+7) {
    min-width: 100px;
}
.table-scroll table td:nth-child(n+7) input {
    width: 74px;
}
/* 6 colonnes fixes : sticky left */
.table-scroll table th:nth-child(1), .table-scroll table td:nth-child(1) { position: sticky; left: 0px;   min-width: 65px;  z-index: 2; }
.table-scroll table th:nth-child(2), .table-scroll table td:nth-child(2) { position: sticky; left: 65px;  min-width: 160px; z-index: 2; }
.table-scroll table th:nth-child(3), .table-scroll table td:nth-child(3) { position: sticky; left: 225px; min-width: 110px; z-index: 2; }
.table-scroll table th:nth-child(4), .table-scroll table td:nth-child(4) { position: sticky; left: 335px; min-width: 120px; z-index: 2; }
.table-scroll table th:nth-child(5), .table-scroll table td:nth-child(5) { position: sticky; left: 455px; min-width: 58px;  z-index: 2; }
.table-scroll table th:nth-child(6), .table-scroll table td:nth-child(6) { position: sticky; left: 513px; min-width: 60px;  z-index: 2; border-right: 2px solid #c0c8e8; }
/* Backgrounds explicites pour les sticky (évite la transparence) */
.table-scroll table th:nth-child(-n+6) { background: #273c75; z-index: 3; }
.table-scroll table td:nth-child(-n+6) { background: #fff; }
.table-scroll table tr:nth-child(even) td:nth-child(-n+6) { background: #f8f9fc; }
.table-scroll table tr:hover td:nth-child(-n+6) { background: #e8f0fe; }
</style>
</head>
<body>

    <a href="declaratif.html" class="back">⬅ Retour</a>
    <h2 id="page-title"></h2>
    <button class="btn-export" onclick="exportCurrentCSV()">⬇ Export CSV</button>
</div>

<div class="counter" id="counter"></div>

<div class="filters-top">

<table>
<thead><tr id="table-head">
    <th>Code</th><th>Nom</th><th>Assistant</th><th>Collaborateur</th><th>Année</th><th>Clôture</th>
</tr></thead>
<tbody id="table"></tbody>
</table>
</div>
</div>

<script>
const API_URL = "/api";

// Variable globale partagée entre toutes les pages déclaratives
let dataGlobal = [];

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}

// Score de rentabilité (retourne la valeur numérique brute)
function getRentabiliteScore(val) {
    return parseFloat(val) || 0;
}

// Chargement des clients depuis l'API avec gestion d'erreur
async function fetchClients() {
    try {
        const res = await fetch(API_URL + "/clients");
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        return await res.json();
    } catch (err) {
        console.error("Erreur fetchClients:", err);
        return [];
    }
}

// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
<script src="/espace.js?v=6"></script>
<script src="decl-engine.js?v=3"></script>
<script>
const TVS_COLS = [
    { header: "Janv", field: "janvier_tvs"   },
    { header: "Févr", field: "fevrier_tvs"   },
    { header: "Mars", field: "mars_tvs"      },
    { header: "Avr",  field: "avril_tvs"     },
    { header: "Mai",  field: "mai_tvs"       },
    { header: "Juin", field: "juin_tvs"      },
    { header: "Juil", field: "juillet_tvs"   },
    { header: "Août", field: "aout_tvs"      },
    { header: "Sept", field: "septembre_tvs" },
    { header: "Oct",  field: "octobre_tvs"   },
    { header: "Nov",  field: "novembre_tvs"  },
    { header: "Déc",  field: "decembre_tvs"  }
];

// Retourne l'index 0-based du mois actif TVS pour un client
function getMoisActif(c) {
    const isTruthy = v => v === true || v === 'true' || v === 't';
    if (!isTruthy(c.ca12) || !c.date_de_cloture) return 0; // janvier
    const moisClo = parseInt(c.date_de_cloture.split('-')[1]);
    if (moisClo === 12) return 4; // mai
    let m = moisClo + 3;
    if (m > 12) m -= 12;
    return m - 1; // index 0-based
}

async function saveTvsMois(siret, field, value, el) {
    el.style.background = '#fff3cd';
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ [field]: value === '' ? null : parseFloat(value) })
        });
        if (!res.ok) throw new Error();
        el.style.background = '#d4edda';
        setTimeout(() => { el.style.background = '#fff'; }, 1800);
    } catch {
        el.style.background = '#f8d7da';
    }
}

// Surcharge display() de decl-engine.js pour le rendu TVS spécifique
display = function(data) {
    _currentData = data;
    const table = document.getElementById('table');

    if (!data.length) {
        table.innerHTML = `<tr class="loading-row"><td colspan="18">Aucun résultat</td></tr>`;
        return;
    }

    const frag = document.createDocumentFragment();
    data.forEach(c => {
        const tr = document.createElement('tr');
        const actifIdx = getMoisActif(c);

        tr.innerHTML = `
            <td>${esc(c.code_client)}</td>
            <td class="name"><a href="client.html?siret=${c.siret}" class="client-link">${esc(c.nom_client)}</a></td>
            <td>${esc(c.assistant)}</td>
            <td>${esc(c.collaborateur)}</td>
            <td>${esc(c.annee)}</td>
            <td>${c.date_de_cloture ? c.date_de_cloture.slice(8,10) + '/' + c.date_de_cloture.slice(5,7) : ''}</td>
        `;

        TVS_COLS.forEach((col, idx) => {
            const td = document.createElement('td');
            const inp = document.createElement('input');
            inp.type  = 'text';
            inp.value = c[col.field] != null ? c[col.field] : '';

            if (idx === actifIdx) {
                inp.style.background = '#fff';
                inp.onchange = function () { saveTvsMois(c.siret, col.field, this.value, this); };
            } else {
                inp.disabled = true;
                inp.style.background = '#f0f0f0';
                inp.style.color      = '#aaa';
                inp.style.cursor     = 'not-allowed';
            }

            td.appendChild(inp);
            tr.appendChild(td);
        });

        frag.appendChild(tr);
    });

    table.innerHTML = '';
    table.appendChild(frag);
};



initDeclaratifPage({
    titre: "Suivi TVS",
    emoji: "🚗",
    filterField: "tvs",
    columns: TVS_COLS
});
</script>
