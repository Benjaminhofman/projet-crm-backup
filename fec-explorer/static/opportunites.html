<td><input type="checkbox" data-field="franchise_tva_prest"></td>
<td><input type="checkbox" data-field="franchise_tva_achrevente"></td>

<!-- 🔥 TOOLTIP -->
<div id="tooltip-client" style="
    position:absolute;
    display:none;
    background:white;
    border:1px solid #ccc;
    border-radius:8px;
    padding:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    font-size:12px;
    z-index:999;
    max-width:250px;
"></div>

<script>
const API_URL = "/api";

// Variable globale partagée entre toutes les pages déclaratives
let dataGlobal = [];

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}

// Formatage date ISO → JJ/MM pour l'affichage
function fmtDate(d) {
    if (!d) return "";
    const p = String(d).split("-");
    return p.length >= 3 ? p[2].substring(0, 2) + "/" + p[1] : d;
}

// Score de rentabilité (retourne la valeur numérique brute)
function getRentabiliteScore(val) {
    return parseFloat(val) || 0;
}

// Chargement des clients depuis l'API avec gestion d'erreur
async function fetchClients() {
    try {
        const res = await fetch(API_URL + "/clients");
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        return await res.json();
    } catch (err) {
        console.error("Erreur fetchClients:", err);
        return [];
    }
}

// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
<script>

let _currentPage = 1;
const _LIMIT = 50;

// affichage
function display(data) {

    const table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(c => {

        table.innerHTML += `
        <tr 
            onmouseenter="showTooltip(event, ${JSON.stringify(c).replace(/"/g, '&quot;')})"
            onmouseleave="hideTooltip()"
            onclick="window.location.href='client.html?siret=${c.siret}'"
        >

            <td>${c.code_client || ""}</td>
            <td>${c.annee || ""}</td>
            <td>${c.nom_client || ""}</td>
            <td>${c.assistant || ""}</td>
            <td>${c.collaborateur || ""}</td>
            <td>${fmtDate(c.date_de_cloture)}</td>

            ${buildIndicator(c, "mission_retraite")}
            ${buildIndicator(c, "mission_patrimoniale")}
            ${buildIndicator(c, "mission_placement")}
            ${buildIndicator(c, "franchise_tva_prest")}
            ${buildIndicator(c, "franchise_tva_achrevente")}
            ${buildIndicator(c, "op_prevoyance")}
            ${buildIndicator(c, "arbitrage_remuneration_dirigeant")}

        </tr>`;
    });
}

// Indicateur lecture seule — reflète un trigger PostgreSQL, jamais cliquable
function isActive(c, field) {
    if (field === 'mission_placement')
        return c[field] === 'OPPORTUNITÉ FORTE' || c[field] === 'OPPORTUNITÉ MOYENNE';
    return c[field] === 'OUI';
}

function buildIndicator(c, field) {
    const active = isActive(c, field);
    const cj = JSON.stringify(c).replace(/"/g, '&quot;');
    return `
    <td
        onmouseenter="showIndicatorTooltip(event, ${cj}, '${field}')"
        onmouseleave="hideTooltip()"
    >
        <input type="checkbox"
            ${active ? "checked" : ""}
            disabled
            style="pointer-events:none;">
    </td>`;
}

// tooltip survol ligne
function showTooltip(event, client) {
    const tooltip = document.getElementById("tooltip-client");
    tooltip.innerHTML = `
        <strong>${client.nom_client || ""}</strong><br>
        Code : ${client.code_client || ""}<br>
        Assistant : ${client.assistant || ""}<br>
        Collaborateur : ${client.collaborateur || ""}<br>
        Clôture : ${fmtDate(client.date_de_cloture)}<br>
        CA : ${client.ca_r || ""}<br>
        Résultat : ${client.resultat_r || ""}
    `;
    tooltip.style.display = "block";
    tooltip.style.left = event.pageX + 15 + "px";
    tooltip.style.top = event.pageY + 15 + "px";
}

function hideTooltip() {
    document.getElementById("tooltip-client").style.display = "none";
}

// tooltip survol indicateur — affiche les données constitutives du trigger
function showIndicatorTooltip(event, c, field) {
    const tooltip = document.getElementById("tooltip-client");

    const eur = v => (v !== null && v !== undefined && v !== '')
        ? Number(v).toLocaleString('fr-FR') + ' €'
        : '<em style="color:#aaa">Données manquantes</em>';
    const val = v => (v !== null && v !== undefined && v !== '')
        ? v : '<em style="color:#aaa">Données manquantes</em>';
    const fmtFull = d => {
        if (!d) return '<em style="color:#aaa">Données manquantes</em>';
        const p = String(d).split('-');
        return p.length >= 3 ? p[2].substring(0, 2) + '/' + p[1] + '/' + p[0] : d;
    };

    let html = '';
    if (field === 'mission_retraite') {
        html = `<strong>Retraite</strong><br>Âge : ${val(c.age)}<br>Anniversaire : ${fmtFull(c.anniversaire)}`;
    } else if (field === 'mission_patrimoniale') {
        html = `<strong>Patrimoniale</strong><br>MAI IR : ${eur(c.mai_ir)}`;
    } else if (field === 'mission_placement') {
        const ratio = (c.ca_r && c.tresorerie_r)
            ? (c.tresorerie_r * 100 / c.ca_r).toFixed(1) + ' %'
            : '<em style="color:#aaa">Données manquantes</em>';
        html = `<strong>Placement</strong><br>CA : ${eur(c.ca_r)}<br>Trésorerie : ${eur(c.tresorerie_r)}<br>Ratio tréso/CA : ${ratio}`;
    } else if (field === 'franchise_tva_prest') {
        html = `<strong>Franchise TVA prestataires</strong><br>CA : ${eur(c.ca_r)}<br>Achat/revente : ${val(c.achat_revente)}`;
    } else if (field === 'franchise_tva_achrevente') {
        html = `<strong>Franchise TVA achat/revente</strong><br>CA : ${eur(c.ca_r)}<br>Achat/revente : ${val(c.achat_revente)}`;
    } else if (field === 'op_prevoyance') {
        html = `<strong>Prévoyance</strong><br>Prévoyance souscrite : ${val(c.prevoyance)}<br>Structure : ${val(c.structure)}`;
    } else if (field === 'arbitrage_remuneration_dirigeant') {
        html = `<strong>Arbitrage rémunération</strong><br>Résultat : ${eur(c.resultat_r)}`;
    }

    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    tooltip.style.left = (event.pageX + 15) + 'px';
    tooltip.style.top  = (event.pageY + 15) + 'px';
}

function renderPagination(page, pages, total) {
    let pag = document.getElementById('pagination');
    if (!pag) {
        pag = document.createElement('div');
        pag.id = 'pagination';
        pag.style.cssText = 'display:flex;align-items:center;gap:12px;margin-top:10px;font-size:14px;';
        document.querySelector('table').after(pag);
    }
    document.getElementById("counter").innerText = '';
    pag.innerHTML = `
        <button onclick="loadPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}
            style="padding:5px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:white;">
            ◀ Précédent
        </button>
        <span>Page ${page}/${pages} — ${total} dossier${total > 1 ? 's' : ''}</span>
        <button onclick="loadPage(${page + 1})" ${page >= pages ? 'disabled' : ''}
            style="padding:5px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:white;">
            Suivant ▶
        </button>
    `;
}

async function loadPage(page = 1) {
    _currentPage = page;

    const siretParam = new URLSearchParams(location.search).get('siret');

    if (siretParam) {
        try {
            const res = await fetch(`/api/client/${siretParam}`);
            if (!res.ok) throw new Error("Erreur HTTP " + res.status);
            const data = await res.json();
            display([data]);
            document.getElementById("counter").innerText = "1 dossier";
        } catch (err) {
            console.error("Erreur loadPage siret:", err);
        }
        return;
    }

    const get = id => (document.getElementById(id) || { value: "" }).value.trim();
    const params = new URLSearchParams({ page, limit: _LIMIT });
    const assistant     = get("f-assistant");
    const collaborateur = get("f-collab");
    const annee         = get("f-annee");
    const cloture       = get("f-cloture");
    if (assistant)     params.set("assistant", assistant);
    if (collaborateur) params.set("collaborateur", collaborateur);
    if (annee)         params.set("annee", annee);
    if (cloture)       params.set("cloture", cloture);

    try {
        const res = await fetch(`/api/clients?${params}`);
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        const response = await res.json();
        display(response.data ?? []);
        renderPagination(response.page, response.pages, response.total);
    } catch (err) {
        console.error("Erreur loadPage:", err);
        document.getElementById("table").innerHTML =
            `<tr><td colspan="13" style="color:#e74c3c;padding:20px;">Erreur de chargement</td></tr>`;
    }
}

function applyFilters() {
    loadPage(1);
}

loadPage(1);
bindFilterInputs(".filters input");
document.querySelectorAll("#filters-opportunites input").forEach(el => {
    el.addEventListener("change", applyFilters);
});
</script>
