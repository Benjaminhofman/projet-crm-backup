<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi Opportunités</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

.counter {
    font-weight: bold;
    margin-bottom: 10px;
}

.filters {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.filters input {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #dfe6ff;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>🎯 Suivi Opportunités</h2>
</div>

<div class="counter" id="counter"></div>

<div class="filters">
    <input id="f-assistant" placeholder="Assistant">
    <input id="f-collab" placeholder="Collaborateur">
    <input id="f-annee" placeholder="Année">
    <input id="f-cloture" placeholder="Clôture">
</div>

<table>
<thead>

<tr>
<th>Code</th>
<th>Année</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Clôture</th>

<th>Retraite</th>
<th>Patrimoniale</th>
<th>Placement</th>
<th>Franchise TVA prest</th>
<th>Franchise TVA achat/revente</th>
<th>Prévoyance</th>
<th>Arbitrage rémunération</th>
</tr>

<tr id="filters-opportunites">
<td colspan="6"></td>

<td><input type="checkbox" data-field="mission_retraite"></td>
<td><input type="checkbox" data-field="mission_patrimoniale"></td>
<td><input type="checkbox" data-field="mission_placement"></td>
<td><input type="checkbox" data-field="franchise_tva_prest"></td>
<td><input type="checkbox" data-field="franchise_tva_achrevente"></td>
<td><input type="checkbox" data-field="op_prevoyance"></td>
<td><input type="checkbox" data-field="arbitrage_remuneration_dirigeant"></td>

</tr>

</thead>

<tbody id="table"></tbody>
</table>

<!-- 🔥 TOOLTIP -->
<div id="tooltip-client" style="
    position:absolute;
    display:none;
    background:white;
    border:1px solid #ccc;
    border-radius:8px;
    padding:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    font-size:12px;
    z-index:999;
    max-width:250px;
"></div>

<script>
const API_URL = "/api";

// Variable globale partagée entre toutes les pages déclaratives
let dataGlobal = [];

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}
function fmtDate(d){if(!d)return"";const p=String(d).split("-");return p.length>=3?p[2].substring(0,2)+"/"+p[1]:d;}

// Score de rentabilité (retourne la valeur numérique brute)
function getRentabiliteScore(val) {
    return parseFloat(val) || 0;
}

// Chargement des clients depuis l'API avec gestion d'erreur
async function fetchClients() {
    try {
        const res = await fetch(API_URL + "/clients");
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        return await res.json();
    } catch (err) {
        console.error("Erreur fetchClients:", err);
        return [];
    }
}

// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
<script>


// affichage
function display(data) {

    const table = document.getElementById("table");
    table.innerHTML = "";

    document.getElementById("counter").innerText =
        "Nombre de dossiers : " + data.length;

    data.forEach(c => {

        table.innerHTML += `
        <tr
            onmouseleave="hideTooltip()"
            onclick="window.location.href='client.html?siret=${c.siret}'"
        >

            <td>${c.code_client || ""}</td>
            <td>${c.annee || ""}</td>
            <td>${c.nom_client || ""}</td>
            <td>${c.assistant || ""}</td>
            <td>${c.collaborateur || ""}</td>
            <td>${fmtDate(c.date_de_cloture)}</td>

            ${buildIndicator(c.mission_retraite === 'OUI', c.siret, 'retraite')}
            ${buildIndicator(c.mission_patrimoniale === 'OUI', c.siret, 'patrimoniale')}
            ${buildIndicator(['OPPORTUNITÉ FORTE','OPPORTUNITÉ MOYENNE'].includes(c.mission_placement), c.siret, 'placement')}
            ${buildIndicator(c.franchise_tva_prest === 'OUI', c.siret, 'franchise_prest')}
            ${buildIndicator(c.franchise_tva_achrevente === 'OUI', c.siret, 'franchise_achrevente')}
            ${buildIndicator(c.op_prevoyance === 'OUI', c.siret, 'prevoyance')}
            ${buildIndicator(c.arbitrage_remuneration_dirigeant === 'OUI', c.siret, 'arbitrage')}

        </tr>`;
    });
}

// indicateur lecture seule avec tooltip contextuel
function buildIndicator(isChecked, siret, tooltipType) {
    return `<td
        onclick="event.stopPropagation()"
        onmouseenter="showContextTooltip(event, '${siret}', '${tooltipType}')"
        onmouseleave="hideTooltip()"
        style="cursor:default;">
        <input type="checkbox" ${isChecked ? 'checked' : ''} disabled
            style="pointer-events:none; cursor:default; accent-color:#27ae60;">
    </td>`;
}

function val(v) { return (v !== null && v !== undefined && v !== '') ? v : 'Données manquantes'; }

const TOOLTIP_CONTENT = {
    retraite:            c => `<b>${c.nom_client || ''}</b><br>Âge : ${val(c.age)}<br>Anniversaire : ${c.anniversaire ? fmtDate(c.anniversaire) : 'Données manquantes'}`,
    patrimoniale:        c => `<b>${c.nom_client || ''}</b><br>IR (mai) : ${val(c.mai_ir)}`,
    placement:           c => {
        const ratio = (c.ca_r && c.tresorerie_r) ? (c.tresorerie_r * 100 / c.ca_r).toFixed(1) + ' %' : 'Données manquantes';
        return `<b>${c.nom_client || ''}</b><br>CA : ${val(c.ca_r)}<br>Trésorerie : ${val(c.tresorerie_r)}<br>Ratio tréso/CA : ${ratio}`;
    },
    franchise_prest:     c => `<b>${c.nom_client || ''}</b><br>CA : ${val(c.ca_r)}<br>Achat/Revente : ${val(c.achat_revente)}`,
    franchise_achrevente:c => `<b>${c.nom_client || ''}</b><br>CA : ${val(c.ca_r)}<br>Achat/Revente : ${val(c.achat_revente)}`,
    prevoyance:          c => `<b>${c.nom_client || ''}</b><br>Prévoyance : ${val(c.prevoyance)}<br>Structure : ${val(c.structure)}`,
    arbitrage:           c => `<b>${c.nom_client || ''}</b><br>Résultat : ${val(c.resultat_r)}`,
};

function showContextTooltip(event, siret, type) {
    const client = dataGlobal.find(c => String(c.siret) === String(siret));
    if (!client) return;
    const tooltip = document.getElementById("tooltip-client");
    const fn = TOOLTIP_CONTENT[type];
    tooltip.innerHTML = fn ? fn(client) : '';
    tooltip.style.display = "block";
    tooltip.style.left = event.pageX + 15 + "px";
    tooltip.style.top = event.pageY + 15 + "px";
}

// conditions de filtrage par champ
const FIELD_CONDITIONS = {
    mission_retraite:                 c => c.mission_retraite === 'OUI',
    mission_patrimoniale:             c => c.mission_patrimoniale === 'OUI',
    mission_placement:                c => ['OPPORTUNITÉ FORTE','OPPORTUNITÉ MOYENNE'].includes(c.mission_placement),
    franchise_tva_prest:              c => c.franchise_tva_prest === 'OUI',
    franchise_tva_achrevente:         c => c.franchise_tva_achrevente === 'OUI',
    op_prevoyance:                    c => c.op_prevoyance === 'OUI',
    arbitrage_remuneration_dirigeant: c => c.arbitrage_remuneration_dirigeant === 'OUI',
};

function hideTooltip() {
    document.getElementById("tooltip-client").style.display = "none";
}

// filtres
function applyFilters() {

    const assistant = document.getElementById("f-assistant").value.toLowerCase();
    const collab = document.getElementById("f-collab").value.toLowerCase();
    const annee = document.getElementById("f-annee").value.toLowerCase();
    const cloture = document.getElementById("f-cloture").value.toLowerCase();

    const checkedFields = Array.from(
        document.querySelectorAll("#filters-opportunites input:checked")
    ).map(cb => cb.dataset.field);

    const filtered = dataGlobal.filter(c => {

        if (assistant && !(c.assistant || "").toLowerCase().includes(assistant)) return false;
        if (collab && !(c.collaborateur || "").toLowerCase().includes(collab)) return false;
        if (annee && !(String(c.annee)).includes(annee)) return false;
        if (cloture && !(c.date_de_cloture || "").toLowerCase().includes(cloture)) return false;

        return checkedFields.every(f => FIELD_CONDITIONS[f] ? FIELD_CONDITIONS[f](c) : Boolean(c[f]));
    });

    display(filtered);
}

// load
async function load() {
    dataGlobal = await fetchClients();

    applyFilters();

    bindFilterInputs(".filters input");
    bindFilterInputs("#filters-opportunites input", "change");
}

load();
</script>

</body>
</html>
