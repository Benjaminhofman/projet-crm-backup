<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi Déclaratif</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

.counter {
    font-weight: bold;
    margin-bottom: 10px;
    color: #555;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
    font-size: 13px;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #e8f0fe;
}

.name {
    font-weight: bold;
    text-align: left;
}

/* Lien fiche client */
.client-link {
    color: #273c75;
    text-decoration: none;
    font-weight: bold;
}

.client-link:hover {
    text-decoration: underline;
    color: #1a2a5e;
}

.separator {
    background: #c8cfe8;
    width: 3px;
    padding: 0;
}

.filters-top {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

.filter-box select,
.filter-box input {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
    background: white;
}

/* Case à cocher éditable */
.decl-checkbox {
    accent-color: #273c75;
    transform: scale(1.25);
    cursor: pointer;
}

/* Case à cocher lecture seule (dividendes = champ numérique) */
.readonly-checkbox {
    pointer-events: none;
    accent-color: #95a5a6;
    opacity: 0.7;
    transform: scale(1.1);
}

/* En-têtes de colonnes cliquables (navigation vers la page détail) */
.col-link {
    cursor: pointer;
    text-decoration: underline dotted rgba(255,255,255,0.6);
    transition: opacity 0.15s;
}

.col-link:hover {
    opacity: 0.8;
}

/* Skeleton loader */
.skeleton {
    display: inline-block;
    background: linear-gradient(90deg, #e8eaf0 25%, #d4d8e2 50%, #e8eaf0 75%);
    background-size: 200% 100%;
    animation: skeleton-shine 1.4s infinite;
    border-radius: 4px;
    height: 14px;
    width: 70%;
}

.skeleton-row td { padding: 13px 8px; }

@keyframes skeleton-shine {
    0%   { background-position:  200% 0; }
    100% { background-position: -200% 0; }
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>📑 Suivi Déclaratif</h2>
</div>

<div class="counter" id="counter"></div>

<div class="filters-top">
    <div class="filter-box">
        <input type="text" id="search" list="dl-search" placeholder="🔍 Nom client…" autocomplete="off">
        <datalist id="dl-search"></datalist>
    </div>
    <div class="filter-box">
        <input type="text" id="filter-assistant" list="dl-assistant" placeholder="— Assistant —" autocomplete="off">
        <datalist id="dl-assistant"></datalist>
    </div>
    <div class="filter-box">
        <input type="text" id="filter-collab" list="dl-collab" placeholder="— Collaborateur —" autocomplete="off">
        <datalist id="dl-collab"></datalist>
    </div>
    <div class="filter-box">
        <input type="text" id="filter-annee" list="dl-annee" placeholder="— Année —" autocomplete="off">
        <datalist id="dl-annee"></datalist>
    </div>
    <div class="filter-box">
        <input type="text" id="filter-cloture" list="dl-cloture" placeholder="— Clôture —" autocomplete="off">
        <datalist id="dl-cloture"></datalist>
    </div>
    <button onclick="['search','filter-assistant','filter-collab','filter-annee','filter-cloture'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.querySelectorAll('#filter-row input[type=checkbox]').forEach(cb=>cb.checked=false);applyFilters();" style="background:#95a5a6;color:white;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;">🔄 Réinitialiser</button>
    <button id="btn-export" onclick="exportAll()" style="background:#27ae60;color:white;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;">⬇ Exporter tout</button>
</div>

<table>
<thead>
<tr>
    <th>Code</th>
    <th>Nom</th>
    <th>Assistant</th>
    <th>Collaborateur</th>
    <th>Année</th>
    <th>Clôture</th>
    <th class="separator"></th>
    <th class="col-link" onclick="location.href='ca12.html'">CA12</th>
    <th class="col-link" onclick="location.href='tvs.html'">TVS</th>
    <th class="col-link" onclick="location.href='cvae.html'">CVAE</th>
    <th class="col-link" onclick="location.href='ir.html'">IR</th>
    <th class="col-link" onclick="location.href='is.html'">IS</th>
    <th class="col-link" onclick="location.href='liasse.html'">Liasse</th>
    <th class="col-link" onclick="location.href='cfe.html'">CFE</th>
    <th class="col-link" onclick="location.href='dividendes.html'" title="Lecture seule — champ numérique">Dividendes</th>
    <th class="col-link" onclick="location.href='juridique.html'">Juridique</th>
    <th class="col-link" onclick="location.href='situation.html'">Situation</th>
    <th class="col-link" onclick="location.href='tbb.html'">TBB</th>
</tr>
<!-- Ligne de filtres rapides par colonne -->
<tr id="filter-row"></tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>
const API_URL = "/api";

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}

// Score de rentabilité (retourne la valeur numérique brute)
function getRentabiliteScore(val) {
    return parseFloat(val) || 0;
}

// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
<script src="/espace.js?v=9"></script>
<script>

// Définition complète des colonnes déclaratives (ordre = ordre des en-têtes)
const columns = [
    { label: "CA12",       field: "ca12",                            editable: true },
    { label: "TVS",        field: "tvs",                             editable: true },
    { label: "CVAE",       field: "cvae",                            editable: true },
    { label: "IR",         field: "impot_sur_le_revenu",             editable: true },
    { label: "IS",         field: "is",                              editable: true },
    { label: "Liasse",     field: "liasse",                          editable: true },
    { label: "CFE",        field: "cotisation_fonciere_entreprise",  editable: true },
    // Dividendes = champ numérique → lecture seule, cochée si montant > 0
    { label: "Dividendes", field: "dividendes", editable: false, checkedFn: c => parseFloat(c.dividendes) > 0 },
    { label: "Juridique",  field: "juridique",                       editable: true },
    { label: "Situation",  field: "situation",                        editable: true },
    { label: "TBB",        field: "tbb",                             editable: true }
];

// Construction de la ligne de filtres rapides (une case par colonne)
function buildFilterRow() {
    const row = document.getElementById("filter-row");
    const frag = document.createDocumentFragment();

    // Cellule vide pour les 6 colonnes fixes + séparateur
    const empty = document.createElement('td');
    empty.colSpan = 7;
    frag.appendChild(empty);

    columns.forEach(col => {
        const td = document.createElement('td');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.dataset.field = col.field;
        cb.title = `Filtrer : ${col.label} uniquement`;
        cb.style.cursor = 'pointer';
        cb.addEventListener('change', applyFilters);
        td.appendChild(cb);
        frag.appendChild(td);
    });

    row.appendChild(frag);
}

// Affichage du tableau
function display(data) {
    const table = document.getElementById("table");

    if (!data.length) {
        table.innerHTML = `<tr><td colspan="18" style="text-align:center;padding:20px;color:#999;">Aucun résultat</td></tr>`;
        return;
    }

    const frag = document.createDocumentFragment();

    data.forEach(c => {
        const tr = document.createElement('tr');

        // Colonnes fixes — Nom = lien vers fiche client
        tr.innerHTML = `
            <td>${esc(c.code_client)}</td>
            <td class="name"><a href="client.html?siret=${c.siret}" class="client-link">${esc(c.nom_client)}</a></td>
            <td>${esc(c.assistant)}</td>
            <td>${esc(c.collaborateur)}</td>
            <td>${esc(c.annee)}</td>
            <td>${(v => { if (!v) return ''; const p = v.split('-'); return p[2] + '/' + p[1]; })(c.date_de_cloture)}</td>
            <td class="separator"></td>
        `;

        // Colonnes déclaratives (ordre aligné sur les en-têtes)
        columns.forEach(col => {
            const td = document.createElement('td');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            const isTruthy = v => v===true||v==='t'||v==='true'||v===1||v==='1';
            cb.checked = col.checkedFn ? col.checkedFn(c) : isTruthy(c[col.field]);

            if (col.editable) {
                cb.className = 'decl-checkbox';
                // stopPropagation évite toute interférence avec d'autres écouteurs
                cb.onclick = e => e.stopPropagation();
                cb.onchange = function () { updateCheckbox(c.siret, col.field, this.checked, this); };
            } else {
                cb.className = 'readonly-checkbox';
                cb.title = 'Lecture seule — modifier via la page Dividendes';
            }

            td.appendChild(cb);
            tr.appendChild(td);
        });

        frag.appendChild(tr);
    });

    table.innerHTML = '';
    table.appendChild(frag);
}

let _currentPage = 1;
const _LIMIT = 50;

function renderPagination(page, pages, total) {
    let pag = document.getElementById('pagination');
    if (!pag) {
        pag = document.createElement('div');
        pag.id = 'pagination';
        pag.style.cssText = 'display:flex;align-items:center;gap:12px;margin-top:10px;font-size:14px;padding:4px 0;';
        document.querySelector('table').after(pag);
    }
    pag.innerHTML = `
        <button onclick="loadPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}
            style="padding:5px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:white;">
            ◀ Précédent
        </button>
        <span>Page ${page}/${pages} — ${total} dossier${total > 1 ? 's' : ''}</span>
        <button onclick="loadPage(${page + 1})" ${page >= pages ? 'disabled' : ''}
            style="padding:5px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:white;">
            Suivant ▶
        </button>
    `;
}

async function loadPage(page = 1) {
    _currentPage = page;

    // Skeleton loader
    const colCount = 6 + 1 + columns.length;
    document.getElementById("table").innerHTML = Array.from({ length: 8 }, () => `
        <tr class="skeleton-row">
            ${Array.from({ length: colCount }, () => `<td><span class="skeleton"></span></td>`).join('')}
        </tr>
    `).join('');

    const get = id => (document.getElementById(id) || { value: '' }).value.trim();
    const params = new URLSearchParams({ page, limit: _LIMIT });
    const search        = get('search');
    const assistant     = get('filter-assistant');
    const collaborateur = get('filter-collab');
    const annee         = get('filter-annee');
    const cloture       = get('filter-cloture');
    if (search)         params.set('search',              search);
    if (assistant)      params.set('assistant_exact',     assistant);
    if (collaborateur)  params.set('collaborateur_exact', collaborateur);
    if (annee)          params.set('annee',               annee);
    if (cloture) {
        const mm = cloture.match(/\((\d{2})\)$/)?.[1] || cloture;
        params.set('cloture', '-' + mm + '-');
    }

    const activeFields = Array.from(
        document.querySelectorAll("#filter-row input[data-field]:checked")
    ).map(cb => cb.dataset.field);

    // Filtre serveur : une seule case cochée sans checkedFn (pas dividendes)
    const singleServerField = activeFields.length === 1 &&
        !columns.find(c => c.field === activeFields[0])?.checkedFn
        ? activeFields[0] : null;

    if (singleServerField) {
        params.set('filterField', singleServerField);
        params.set('filterValue', 'true');
    }

    // Espace collaborateur : ?collab lu directement dans l'URL, juste avant le
    // fetch → filtre toujours actif si présent, sans action de l'utilisateur.
    const _c = sessionStorage.getItem("espaceCollab");
    if (_c) params.set("collaborateur_exact", _c);

    let response;
    try {
        const res = await fetch(`${API_URL}/clients?${params}`);
        if (!res.ok) throw new Error("HTTP " + res.status);
        response = await res.json();
    } catch (err) {
        console.error("loadPage:", err);
        document.getElementById("table").innerHTML =
            `<tr><td colspan="${6 + 1 + columns.length}" style="color:#e74c3c;padding:20px;text-align:center;">Erreur de chargement</td></tr>`;
        return;
    }

    const data = response.data ?? [];

    // Filtre JS : plusieurs cases cochées, ou dividendes (checkedFn)
    const useJsFilter = !singleServerField && activeFields.length > 0;
    const filtered = useJsFilter
        ? data.filter(c => activeFields.every(f => {
            const col = columns.find(col => col.field === f);
            return col?.checkedFn ? col.checkedFn(c) : !!c[f];
        }))
        : data;

    document.getElementById("counter").textContent =
        "Nombre de dossiers : " + (useJsFilter ? filtered.length : response.total);

    display(filtered);
    renderPagination(response.page, response.pages, response.total);
}

function applyFilters() { loadPage(1); }

async function exportAll() {
    const btn = document.getElementById('btn-export');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Export…'; }

    const get = id => (document.getElementById(id) || { value: '' }).value.trim();
    const params = new URLSearchParams({ limit: 0 });
    const search        = get('search');
    const assistant     = get('filter-assistant');
    const collaborateur = get('filter-collab');
    const annee         = get('filter-annee');
    const cloture       = get('filter-cloture');
    if (search)         params.set('search',              search);
    if (assistant)      params.set('assistant_exact',     assistant);
    if (collaborateur)  params.set('collaborateur_exact', collaborateur);
    if (annee)          params.set('annee',               annee);
    if (cloture) {
        const mm = cloture.match(/\((\d{2})\)$/)?.[1] || cloture;
        params.set('cloture', '-' + mm + '-');
    }

    const activeFields = Array.from(
        document.querySelectorAll('#filter-row input[data-field]:checked')
    ).map(cb => cb.dataset.field);

    const singleServerField = activeFields.length === 1 &&
        !columns.find(c => c.field === activeFields[0])?.checkedFn
        ? activeFields[0] : null;
    if (singleServerField) {
        params.set('filterField', singleServerField);
        params.set('filterValue', 'true');
    }

    try {
        const res = await fetch(`${API_URL}/clients?${params}`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const response = await res.json();
        let data = response.data ?? [];

        const useJsFilter = !singleServerField && activeFields.length > 0;
        if (useJsFilter) {
            data = data.filter(c => activeFields.every(f => {
                const col = columns.find(col => col.field === f);
                return col?.checkedFn ? col.checkedFn(c) : !!c[f];
            }));
        }

        exportCSV(data, 'declaratif.csv', [
            { label: 'Code',          field: 'code_client' },
            { label: 'Nom',           field: 'nom_client' },
            { label: 'Assistant',     field: 'assistant' },
            { label: 'Collaborateur', field: 'collaborateur' },
            { label: 'Année',         field: 'annee' },
            { label: 'Clôture',       field: 'date_de_cloture' },
            { label: 'CA12',          field: 'ca12' },
            { label: 'TVS',           field: 'tvs' },
            { label: 'CVAE',          field: 'cvae' },
            { label: 'IR',            field: 'impot_sur_le_revenu' },
            { label: 'IS',            field: 'is' },
            { label: 'Liasse',        field: 'liasse' },
            { label: 'CFE',           field: 'cotisation_fonciere_entreprise' },
            { label: 'Dividendes',    field: 'dividendes' },
            { label: 'Juridique',     field: 'juridique' },
            { label: 'Situation',     field: 'situation' },
            { label: 'TBB',           field: 'tbb' },
        ]);
    } catch (err) {
        alert('Erreur lors de l\'export : ' + err.message);
    } finally {
        if (btn) { btn.disabled = false; btn.textContent = '⬇ Exporter tout'; }
    }
}

const MOIS_LABELS = {
    '01':'Janvier','02':'Février','03':'Mars','04':'Avril',
    '05':'Mai','06':'Juin','07':'Juillet','08':'Août',
    '09':'Septembre','10':'Octobre','11':'Novembre','12':'Décembre'
};

async function populateSelects() {
    try {
        const res = await fetch(`${API_URL}/clients/filters`);
        const f = await res.json();
        const fill = (id, vals, labelFn) => {
            const dl = document.getElementById(id);
            if (!dl) return;
            vals.forEach(v => {
                if (!v) return;
                const opt = document.createElement('option');
                opt.value = labelFn ? labelFn(v) : v;
                dl.appendChild(opt);
            });
        };
        fill('dl-search',    f.noms,           null);
        fill('dl-assistant', f.assistants,     null);
        fill('dl-collab',    f.collaborateurs,  null);
        fill('dl-annee',     f.annees,         null);
        fill('dl-cloture',   f.mois_cloture,   v => `${MOIS_LABELS[v] || v} (${v})`);
    } catch {}
}

async function load() {
    buildFilterRow();
    await populateSelects();
    document.querySelectorAll('.filters-top input[list]:not(#search)').forEach(inp => {
        inp.addEventListener('input', applyFilters);
    });
    let _st;
    const srch = document.getElementById('search');
    if (srch) srch.addEventListener('input', () => { clearTimeout(_st); _st = setTimeout(applyFilters, 300); });
    injectEspaceCollab(); // défini dans espace.js : pré-remplit l'input + badge
    await loadPage(1);
}

load();
</script>
