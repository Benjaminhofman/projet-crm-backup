<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rendement</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

.filters-top {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.filters-top input {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
    font-size: 13px;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #e8f0fe;
    cursor: pointer;
}

input {
    width: 80px;
    padding: 4px;
    text-align: center;
}

.result {
    font-weight: bold;
}

.skeleton {
    display: inline-block;
    background: linear-gradient(90deg, #e8eaf0 25%, #d4d8e2 50%, #e8eaf0 75%);
    background-size: 200% 100%;
    animation: skeleton-shine 1.4s infinite;
    border-radius: 4px;
    height: 14px;
    width: 75%;
}

@keyframes skeleton-shine {
    0%   { background-position:  200% 0; }
    100% { background-position: -200% 0; }
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>📈 Rendement</h2>
</div>

<!-- FILTRES -->
<div class="filters-top">
    <input id="search" placeholder="🔍 Nom client...">
    <input id="filter-assistant" placeholder="Assistant...">
    <input id="filter-collab" placeholder="Collaborateur...">
    <input id="filter-annee" placeholder="Année...">
    <input id="filter-cloture" placeholder="Clôture...">
</div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Année</th>
<th>Clôture</th>
<th>CA</th>
<th>Résultat</th>
<th>Ancienneté</th>
<th>Temps</th>
<th>Honoraires</th>
<th>€/h</th>
<th>Rendement</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>
const API_URL = "/api";

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}

// Score de rentabilité (retourne la valeur numérique brute)
function getRentabiliteScore(val) {
    return parseFloat(val) || 0;
}

// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>

<script>
let _currentPage = 1;
const _LIMIT = 50;

/* COULEUR RENDEMENT (score 0-100) */
function getColor(val) {
    if (val < 40) return "#e74c3c";
    if (val < 60) return "#f39c12";
    return "#27ae60";
}

/* CALCUL €/h en live */
function calculerLigne(row) {
    const temps = parseFloat(row.querySelector(".temps").value) || 0;
    const honos = parseFloat(row.querySelector(".honos").value) || 0;
    const resultCell = row.querySelector(".result");
    if (temps === 0) { resultCell.innerText = "-"; return; }
    const taux = honos / temps;
    let color = "#27ae60";
    if (taux < 50) color = "#e74c3c";
    else if (taux < 80) color = "#f39c12";
    resultCell.innerHTML = `<span style="color:${color}">${taux.toFixed(2)}</span>`;
}

/* DISPLAY */
function display(data) {
    const table = document.getElementById("table");
    table.innerHTML = "";
    if (!data.length) {
        table.innerHTML = "<tr><td colspan='13'>Aucun résultat</td></tr>";
        return;
    }
    data.forEach(c => {
        const tr = document.createElement("tr");
        const rendement = parseFloat(c.rendement ?? 0);
        tr.innerHTML = `
        <td>${esc(c.code_client)}</td>
        <td><b>${esc(c.nom_client)}</b></td>
        <td>${esc(c.assistant)}</td>
        <td>${esc(c.collaborateur)}</td>
        <td>${esc(c.annee)}</td>
        <td>${(v => { if (!v) return ''; const p = v.split('-'); return p[2]+'/'+p[1]; })(c.date_de_cloture)}</td>
        <td>${c.ca_r || ""}</td>
        <td>${c.resultat_r || ""}</td>
        <td>${c.anciennete || ""}</td>
        <td><input class="temps" value="${c.temps_passe ?? ""}"></td>
        <td><input class="honos" value="${c.honoraires_cpta ?? ""}"></td>
        <td class="result">-</td>
        <td style="font-weight:bold; color:${getColor(rendement)};">
            ${rendement ? Math.round(rendement) : "—"}
        </td>
        `;

        const tempsInput = tr.querySelector(".temps");
        const honosInput = tr.querySelector(".honos");

        tempsInput.addEventListener("input", () => calculerLigne(tr));
        honosInput.addEventListener("input", () => calculerLigne(tr));

        tempsInput.addEventListener("change", (e) => {
            updateField(c.siret, "temps_passe", e.target.value, e.target);
        });
        honosInput.addEventListener("change", (e) => {
            updateField(c.siret, "honoraires_cpta", e.target.value, e.target);
        });

        calculerLigne(tr);

        tr.addEventListener('click', (e) => {
            if (!e.target.closest('input')) {
                window.location.href = 'client.html?siret=' + c.siret;
            }
        });

        table.appendChild(tr);
    });
}

function renderPagination(page, pages, total) {
    let pag = document.getElementById('pagination');
    if (!pag) {
        pag = document.createElement('div');
        pag.id = 'pagination';
        pag.style.cssText = 'display:flex;align-items:center;gap:12px;margin-top:10px;font-size:14px;';
        document.querySelector('table').after(pag);
    }
    pag.innerHTML = `
        <button onclick="loadPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}
            style="padding:5px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:white;">
            ◀ Précédent
        </button>
        <span>Page ${page}/${pages} — ${total} dossier${total > 1 ? 's' : ''}</span>
        <button onclick="loadPage(${page + 1})" ${page >= pages ? 'disabled' : ''}
            style="padding:5px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:white;">
            Suivant ▶
        </button>
    `;
}

async function loadPage(page = 1) {
    _currentPage = page;

    document.getElementById("table").innerHTML = Array.from({ length: 8 }, () => `
        <tr>
            ${Array.from({ length: 13 }, () => `<td><span class="skeleton"></span></td>`).join('')}
        </tr>
    `).join('');

    const get = id => (document.getElementById(id) || {value: ''}).value.trim();
    const search       = get("search");
    const assistant    = get("filter-assistant");
    const collaborateur = get("filter-collab");
    const annee        = get("filter-annee");
    const cloture      = get("filter-cloture");

    const params = new URLSearchParams({ page, limit: _LIMIT });
    if (search)        params.set("search", search);
    if (assistant)     params.set("assistant", assistant);
    if (collaborateur) params.set("collaborateur", collaborateur);
    if (annee)         params.set("annee", annee);
    if (cloture)       params.set("cloture", cloture);

    try {
        const res = await fetch(`${API_URL}/clients?${params}`);
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        const response = await res.json();
        display(response.data ?? []);
        renderPagination(response.page, response.pages, response.total);
    } catch (err) {
        console.error("Erreur loadPage:", err);
        document.getElementById("table").innerHTML =
            `<tr><td colspan="13" style="color:#e74c3c;padding:20px;">Erreur de chargement</td></tr>`;
    }
}

function applyFilters() {
    loadPage(1);
}

document.querySelectorAll(".filters-top input").forEach(el => {
    el.addEventListener("input", applyFilters);
});

loadPage(1);
</script>

</body>
