<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rendement</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

.filters-top {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.filters-top input {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
    font-size: 13px;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #e8f0fe;
    cursor: pointer;
}

input {
    width: 80px;
    padding: 4px;
    text-align: center;
}

.result {
    font-weight: bold;
}

.badge-rendement {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: bold;
    color: white;
}
.badge-excellent { background: #27ae60; }
.badge-bon       { background: #2980b9; }
.badge-moyen     { background: #f39c12; }
.badge-faible    { background: #e74c3c; }

.td-rendement {
    cursor: pointer;
}
.td-rendement:hover .badge-rendement {
    opacity: 0.85;
    transform: scale(1.05);
    transition: all .15s;
}

/* ── Modal Rendement ── */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal-box {
    background: white;
    border-radius: 14px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
    animation: modal-in .2s ease;
}
@keyframes modal-in {
    from { transform: translateY(18px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 20px 14px;
    border-bottom: 2px solid #f0f2f5;
    position: sticky;
    top: 0;
    background: white;
    z-index: 1;
}
.modal-header h3 {
    color: #273c75;
    font-size: 1rem;
    font-weight: 700;
    margin: 0;
}
.modal-close {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #777;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s;
}
.modal-close:hover { background: #f0f2f5; color: #2c3e50; }

.modal-body {
    padding: 20px;
}

/* Score global */
.modal-score-global {
    text-align: center;
    margin-bottom: 22px;
    padding: 18px;
    background: #f8f9fc;
    border-radius: 12px;
}
.modal-score-number {
    font-size: 3rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 8px;
}
.modal-score-badge {
    display: inline-block;
    padding: 5px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    color: white;
}

/* Grille 4 cartes */
.modal-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
}
@media (max-width: 480px) {
    .modal-cards { grid-template-columns: 1fr; }
}

.modal-card {
    background: #f8f9fc;
    border-radius: 10px;
    padding: 14px;
    border-left: 4px solid #273c75;
}
.modal-card.non-renseigne {
    border-left-color: #ccc;
    opacity: .7;
}
.modal-card-title {
    font-size: 12px;
    font-weight: 700;
    color: #273c75;
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.modal-card-poids {
    font-size: 11px;
    color: #888;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
}
.modal-card-valeur {
    font-size: 1.1rem;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 6px;
}
.modal-card-pts {
    font-size: 12px;
    color: #555;
    margin-bottom: 8px;
}

/* Barre de progression */
.progress-bar-wrap {
    background: #e0e0e0;
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 6px;
}
.progress-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width .4s ease;
}
.fill-excellent { background: #27ae60; }
.fill-bon       { background: #2980b9; }
.fill-moyen     { background: #f39c12; }
.fill-faible    { background: #e74c3c; }
.fill-vide      { background: #ccc; width: 0 !important; }

.modal-card-seuil {
    font-size: 11px;
    color: #888;
    font-style: italic;
}

/* Message plafond / complet */
.modal-score-msg {
    margin-top: 10px;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    display: inline-block;
}
.modal-score-msg--plafond {
    background: #fff3cd;
    color: #856404;
    border: 1px solid #ffc107;
}
.modal-score-msg--complet {
    background: #d1e7dd;
    color: #0a5c36;
    border: 1px solid #a3cfbb;
}

/* Footer */
.modal-footer {
    text-align: center;
    font-size: 12px;
    color: #888;
    padding-top: 14px;
    border-top: 1px solid #f0f2f5;
    margin-top: 4px;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>📈 Rendement</h2>
</div>

<!-- FILTRES -->
<div class="filters-top">
    <input id="search" placeholder="🔍 Nom client...">
    <input id="filter-assistant" placeholder="Assistant...">
    <input id="filter-collab" placeholder="Collaborateur...">
    <input id="filter-annee" placeholder="Année...">
    <input id="filter-cloture" placeholder="Clôture...">
    <select id="filter-tranche" style="padding:6px;border-radius:6px;border:1px solid #ccc;">
        <option value="">Toutes tranches</option>
        <option value="excellent">⭐ Excellent (≥80)</option>
        <option value="bon">👍 Bon (60-79)</option>
        <option value="moyen">⚠️ Moyen (40-59)</option>
        <option value="faible">🔴 Faible (&lt;40)</option>
    </select>
</div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Année</th>
<th>Clôture</th>
<th>CA</th>
<th>Résultat</th>
<th>Ancienneté</th>
<th>Temps</th>
<th>Honoraires</th>
<th>€/h</th>
<th>Rendement</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<!-- MODAL DÉTAIL RENDEMENT -->
<div class="modal-overlay" id="modal-rendement" role="dialog" aria-modal="true">
    <div class="modal-box" id="modal-box">
        <div class="modal-header">
            <h3 id="modal-title">Détail du rendement</h3>
            <button class="modal-close" id="modal-close" aria-label="Fermer">×</button>
        </div>
        <div class="modal-body" id="modal-body">
            <p style="text-align:center;color:#888">Chargement…</p>
        </div>
    </div>
</div>

<script>
const API_URL = "/api";

function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

function fmtDate(d){if(!d)return"";const p=String(d).split("-");return p.length>=3?p[2].substring(0,2)+"/"+p[1]:d;}

async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}
</script>

<script>
(function(){

let dataGlobal = [];

/* ── LOAD DATA ── */
async function load() {
    const res = await fetch(API_URL + "/clients");
    const data = await res.json();
    dataGlobal = data.sort((a, b) => (parseFloat(b.rendement) || 0) - (parseFloat(a.rendement) || 0));
    display(dataGlobal);
    bindFilters();
}

/* ── BADGE RENDEMENT ── */
function badgeRendement(val) {
    const n = parseFloat(val);
    if (isNaN(n) || val === null || val === "") return "<span style='color:#aaa'>—</span>";
    let cls, label;
    if      (n >= 80) { cls = "badge-excellent"; label = "Excellent"; }
    else if (n >= 60) { cls = "badge-bon";       label = "Bon"; }
    else if (n >= 40) { cls = "badge-moyen";     label = "Moyen"; }
    else              { cls = "badge-faible";     label = "Faible"; }
    return `<span class="badge-rendement ${cls}">${Math.round(n)} — ${label}</span>`;
}

function getTranche(val) {
    const n = parseFloat(val);
    if (isNaN(n)) return "faible";
    if (n >= 80) return "excellent";
    if (n >= 60) return "bon";
    if (n >= 40) return "moyen";
    return "faible";
}

/* ── COULEUR €/h ── */
function getColor(val) {
    if (val < 50) return "#e74c3c";
    if (val < 80) return "#f39c12";
    return "#27ae60";
}

/* ── CALCUL €/h ── */
function calculerLigne(row) {
    const temps = parseFloat(row.querySelector(".temps").value) || 0;
    const honos = parseFloat(row.querySelector(".honos").value) || 0;
    const resultCell = row.querySelector(".result");
    if (temps === 0) { resultCell.innerText = "-"; return; }
    const taux = honos / temps;
    resultCell.innerHTML = `<span style="color:${getColor(taux)}">${taux.toFixed(2)}</span>`;
}

/* ── DISPLAY ── */
function display(data) {
    const table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(c => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
        <td>${esc(c.code_client || "")}</td>
        <td><b>${esc(c.nom_client || "")}</b></td>
        <td>${esc(c.assistant || "")}</td>
        <td>${esc(c.collaborateur || "")}</td>
        <td>${esc(c.annee || "")}</td>
        <td>${fmtDate(c.date_de_cloture)}</td>
        <td>${esc(c.ca_r || "")}</td>
        <td>${esc(c.resultat_r || "")}</td>
        <td>${esc(c.anciennete || "")}</td>
        <td><input class="temps" value="${c.temps_passe ?? ""}"></td>
        <td><input class="honos" value="${c.honoraires_cpta ?? ""}"></td>
        <td class="result">-</td>
        <td class="td-rendement" title="Voir le détail">${badgeRendement(c.rendement)}</td>
        `;

        const tempsInput = tr.querySelector(".temps");
        const honosInput = tr.querySelector(".honos");

        tempsInput.addEventListener("input",  () => calculerLigne(tr));
        honosInput.addEventListener("input",  () => calculerLigne(tr));
        tempsInput.addEventListener("change", (e) => updateField(c.siret, "temps_passe",      e.target.value, e.target));
        honosInput.addEventListener("change", (e) => updateField(c.siret, "honoraires_cpta",  e.target.value, e.target));

        calculerLigne(tr);

        /* Clic ligne → fiche client sauf input ou cellule rendement */
        tr.addEventListener('click', (e) => {
            if (e.target.closest('input')) return;
            if (e.target.closest('.td-rendement')) {
                openRendementModal(c.siret, c.nom_client);
                return;
            }
            window.location.href = 'client.html?siret=' + c.siret;
        });

        table.appendChild(tr);
    });
}

/* ── FILTRES ── */
function applyFilters() {
    const search    = document.getElementById("search").value.toLowerCase();
    const assistant = document.getElementById("filter-assistant").value.toLowerCase();
    const collab    = document.getElementById("filter-collab").value.toLowerCase();
    const annee     = document.getElementById("filter-annee").value.toLowerCase();
    const cloture   = document.getElementById("filter-cloture").value.toLowerCase();
    const tranche   = document.getElementById("filter-tranche").value;

    const filtered = dataGlobal.filter(c => {
        if (search    && !(c.nom_client    || "").toLowerCase().includes(search))     return false;
        if (assistant && !(c.assistant     || "").toLowerCase().includes(assistant))  return false;
        if (collab    && !(c.collaborateur || "").toLowerCase().includes(collab))     return false;
        if (annee     && !(String(c.annee  || "")).includes(annee))                   return false;
        if (cloture   && !(c.date_de_cloture || "").toLowerCase().includes(cloture)) return false;
        if (tranche   && getTranche(c.rendement) !== tranche)                         return false;
        return true;
    });

    display(filtered);
}

function bindFilters() {
    document.querySelectorAll(".filters-top input, .filters-top select").forEach(el => {
        el.addEventListener("input",  applyFilters);
        el.addEventListener("change", applyFilters);
    });
}

/* ══════════════════════════════════════
   MODAL DÉTAIL RENDEMENT
══════════════════════════════════════ */

const overlay   = document.getElementById("modal-rendement");
const modalBody = document.getElementById("modal-body");
const modalTitle = document.getElementById("modal-title");

function openModal() {
    overlay.classList.add("open");
    document.addEventListener("keydown", onEscape);
}

function closeModal() {
    overlay.classList.remove("open");
    document.removeEventListener("keydown", onEscape);
}

function onEscape(e) { if (e.key === "Escape") closeModal(); }

document.getElementById("modal-close").addEventListener("click", closeModal);
overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });

async function openRendementModal(siret, nomClient) {
    modalTitle.textContent = "Détail du rendement — " + (nomClient || siret);
    modalBody.innerHTML = '<p style="text-align:center;color:#888;padding:20px">Chargement…</p>';
    openModal();

    try {
        const res = await fetch(API_URL + "/rendement_detail/" + encodeURIComponent(siret));
        if (!res.ok) throw new Error("HTTP " + res.status);
        const d = await res.json();
        renderModalBody(d);
    } catch(err) {
        modalBody.innerHTML = `<p style="color:#e74c3c;text-align:center">Erreur : ${esc(err.message)}</p>`;
    }
}

/* Couleur + classe fill selon pct */
function fillClass(pct) {
    if (pct >= 80) return "fill-excellent";
    if (pct >= 60) return "fill-bon";
    if (pct >= 40) return "fill-moyen";
    return "fill-faible";
}

/* Config affichage des 4 facteurs */
const FACTEURS_CONFIG = [
    { key: "taux_horaire", label: "Taux horaire", icon: "⏱" },
    { key: "anciennete",   label: "Ancienneté",   icon: "📅" },
    { key: "ca",           label: "CA",            icon: "💰" },
    { key: "resultat",     label: "Résultat",      icon: "📊" },
];

function renderModalBody(d) {
    const score = d.score_global;
    const nb    = d.nb_facteurs_renseignes ?? 0;

    /* Score global */
    let scoreCls = "badge-faible", scoreColor = "#e74c3c";
    let scoreLabel = "Faible";
    if (score === null || score === undefined) {
        scoreColor = "#aaa";
    } else if (score >= 80) { scoreCls = "badge-excellent"; scoreColor = "#27ae60"; scoreLabel = "Excellent"; }
    else if (score >= 60)   { scoreCls = "badge-bon";       scoreColor = "#2980b9"; scoreLabel = "Bon"; }
    else if (score >= 40)   { scoreCls = "badge-moyen";     scoreColor = "#f39c12"; scoreLabel = "Moyen"; }

    const scoreDisplay = score !== null && score !== undefined ? Math.round(score) : "—";
    const plafond      = d.plafond_applique ?? null;

    /* Message sous le score */
    let msgPlafond = "";
    if (score !== null) {
        if (nb === 4) {
            msgPlafond = `<div class="modal-score-msg modal-score-msg--complet">✅ Score complet (4 facteurs sur 4)</div>`;
        } else if (plafond !== null) {
            msgPlafond = `<div class="modal-score-msg modal-score-msg--plafond">⚠️ Score plafonné à ${plafond} (calculé sur ${nb} facteur${nb > 1 ? 's' : ''} sur 4)</div>`;
        }
    }

    let html = `
    <div class="modal-score-global">
        <div class="modal-score-number" style="color:${scoreColor}">${scoreDisplay}</div>
        <span class="modal-score-badge ${score !== null ? scoreCls : ''}"
              style="${score === null ? 'background:#aaa' : ''}">
            ${score !== null ? scoreLabel : 'Données insuffisantes'}
        </span>
        ${msgPlafond}
    </div>
    <div class="modal-cards">`;

    FACTEURS_CONFIG.forEach(cfg => {
        const f = d.facteurs?.[cfg.key];
        if (!f) return;

        const renseigne = f.renseigne;
        const pct       = f.points_max > 0 ? Math.round((f.points_obtenus / f.points_max) * 100) : 0;
        const barFill   = renseigne ? fillClass(pct) : "fill-vide";
        const barWidth  = renseigne ? pct : 0;

        html += `
        <div class="modal-card ${renseigne ? '' : 'non-renseigne'}">
            <div class="modal-card-title">
                <span>${cfg.icon} ${cfg.label}</span>
                <span class="modal-card-poids">Poids ${f.poids_pct}%</span>
            </div>
            <div class="modal-card-valeur">${esc(f.valeur_affichee)}</div>
            <div class="modal-card-pts">${f.points_obtenus} / ${f.points_max} pts</div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill ${barFill}" style="width:${barWidth}%"></div>
            </div>
            <div class="modal-card-seuil">${esc(f.libelle_seuil)}</div>
        </div>`;
    });

    html += `</div>
    <div class="modal-footer">Calculé sur ${nb} facteur${nb > 1 ? 's' : ''} / 4</div>`;

    modalBody.innerHTML = html;
}

/* ── INIT ── */
load();

})();
</script>

</body>
</html>
