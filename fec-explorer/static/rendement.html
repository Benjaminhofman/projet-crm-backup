<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rendement</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

.filters-top {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.filters-top input,
.filters-top select {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: white;
    min-width: 140px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
    font-size: 13px;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #e8f0fe;
    cursor: pointer;
}

input {
    width: 80px;
    padding: 4px;
    text-align: center;
}

.result {
    font-weight: bold;
}

.skeleton {
    display: inline-block;
    background: linear-gradient(90deg, #e8eaf0 25%, #d4d8e2 50%, #e8eaf0 75%);
    background-size: 200% 100%;
    animation: skeleton-shine 1.4s infinite;
    border-radius: 4px;
    height: 14px;
    width: 75%;
}

@keyframes skeleton-shine {
    0%   { background-position:  200% 0; }
    100% { background-position: -200% 0; }
}

/* ── Modal rendement ── */
#modal-rendement-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(27,39,75,.52);
    z-index: 9999;
    align-items: center;
    justify-content: center;
}
#modal-rendement-overlay.open { display: flex; }

.mr-box {
    background: white;
    border-radius: 14px;
    max-width: 460px;
    width: 94%;
    box-shadow: 0 16px 48px rgba(0,0,0,.24);
    overflow: hidden;
    animation: mrPop .18s cubic-bezier(.34,1.56,.64,1);
}
@keyframes mrPop {
    from { transform: scale(.88); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
}

.mr-header {
    background: #273c75;
    color: white;
    padding: 16px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}
.mr-title  { font-size: 1rem; font-weight: 700; }
.mr-score  { font-size: 1.6rem; font-weight: 800; line-height: 1; }
.mr-close  {
    background: rgba(255,255,255,.18);
    border: none;
    border-radius: 50%;
    width: 28px; height: 28px;
    color: white;
    font-size: .9rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .13s;
}
.mr-close:hover { background: rgba(255,255,255,.32); }

.mr-body { padding: 16px 20px 20px; }

.mr-facteur {
    margin-bottom: 14px;
}
.mr-facteur-header {
    display: flex;
    justify-content: space-between;
    font-size: .84rem;
    margin-bottom: 5px;
}
.mr-facteur-label { font-weight: 600; color: #2c3e50; }
.mr-facteur-val   { color: #7f8c8d; }
.mr-facteur-pts   { font-weight: 700; }

.mr-bar-track {
    background: #edf0f7;
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
}
.mr-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width .4s ease;
}

.mr-seuil {
    font-size: .76rem;
    color: #95a5a6;
    margin-top: 3px;
}

.mr-plafond {
    margin-top: 12px;
    background: #fff8e1;
    border-left: 3px solid #f39c12;
    padding: 8px 12px;
    border-radius: 0 6px 6px 0;
    font-size: .82rem;
    color: #856404;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>📈 Rendement</h2>
</div>

<!-- FILTRES -->
<div class="filters-top">
    <input id="search" list="dl-search" placeholder="🔍 Nom client…" autocomplete="off">
    <datalist id="dl-search"></datalist>
    <input type="text" id="filter-assistant" list="dl-assistant" placeholder="— Assistant —" autocomplete="off">

    <datalist id="dl-collab"></datalist>
    <input type="text" id="filter-annee" list="dl-annee" placeholder="— Année —" autocomplete="off">
    <datalist id="dl-annee"></datalist>
    <input type="text" id="filter-cloture" list="dl-cloture" placeholder="— Clôture —" autocomplete="off">
    <datalist id="dl-cloture"></datalist>
    <button onclick="document.querySelectorAll('.filters-top input,.filters-top select').forEach(el=>el.value='');applyFilters();" style="background:#95a5a6;color:white;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;">🔄 Réinitialiser</button>
    <button onclick="exportAll()" style="background:#27ae60;color:white;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;">⬇ Exporter tout</button>
</div>

<table>

<tr>
<th>Code</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Année</th>
<th>Clôture</th>
<th>CA</th>
<th>Résultat</th>
<th>Ancienneté</th>

</tr>

<tbody id="table"></tbody>
</table>

<script>
const API_URL = "/api";

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}

// Score de rentabilité (retourne la valeur numérique brute)
function getRentabiliteScore(val) {
    return parseFloat(val) || 0;
}

// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>

<script src="/espace.js?v=10"></script>
<script>
let _currentPage = 1;
const _LIMIT = 50;

/* COULEUR RENDEMENT (score 0-100) */
function getColor(val) {
    if (val < 40) return "#e74c3c";
    if (val < 60) return "#f39c12";
    return "#27ae60";
}

/* CALCUL €/h en live */
function calculerLigne(row) {
    const temps = parseFloat(row.querySelector(".temps").value) || 0;
    const honos = parseFloat(row.querySelector(".honos").value) || 0;
    const resultCell = row.querySelector(".result");
    if (temps === 0) { resultCell.innerText = "-"; return; }
    const taux = honos / temps;
    let color = "#27ae60";
    if (taux < 50) color = "#e74c3c";
    else if (taux < 80) color = "#f39c12";
    resultCell.innerHTML = `<span style="color:${color}">${taux.toFixed(2)}</span>`;
}

/* DISPLAY */
function display(data) {
    const table = document.getElementById("table");
    table.innerHTML = "";
    if (!data.length) {
        table.innerHTML = "<tr><td colspan='13'>Aucun résultat</td></tr>";
        return;
    }
    data.forEach(c => {
        const tr = document.createElement("tr");
        const rendement = parseFloat(c.rendement ?? 0);
        tr.innerHTML = `
        <td>${esc(c.code_client)}</td>
        <td><b>${esc(c.nom_client)}</b></td>
        <td>${esc(c.assistant)}</td>
        <td>${esc(c.collaborateur)}</td>
        <td>${esc(c.annee)}</td>
        <td>${(v => { if (!v) return ''; const p = v.split('-'); return p[2]+'/'+p[1]; })(c.date_de_cloture)}</td>
        <td>${c.ca_r || ""}</td>
        <td>${c.resultat_r || ""}</td>
        <td>${c.anciennete || ""}</td>
        <td><input class="temps" value="${c.temps_passe ?? ""}"></td>
        <td><input class="honos" value="${c.honoraires_cpta ?? ""}"></td>
        <td class="result">-</td>
        <td onclick="event.stopPropagation(); showRendementModal('${c.siret}')"
            title="Voir le détail du score"
            style="font-weight:bold; color:${getColor(rendement)}; cursor:pointer; text-decoration:underline dotted;">
            ${rendement ? Math.round(rendement) : "—"}
        </td>
        `;

        const tempsInput = tr.querySelector(".temps");
        const honosInput = tr.querySelector(".honos");

        tempsInput.addEventListener("input", () => calculerLigne(tr));
        honosInput.addEventListener("input", () => calculerLigne(tr));

        tempsInput.addEventListener("change", (e) => {
            updateField(c.siret, "temps_passe", e.target.value, e.target);
        });
        honosInput.addEventListener("change", (e) => {
            updateField(c.siret, "honoraires_cpta", e.target.value, e.target);
        });

        calculerLigne(tr);

        tr.addEventListener('click', (e) => {
            if (!e.target.closest('input')) {
                window.location.href = 'client.html?siret=' + c.siret;
            }
        });

        table.appendChild(tr);
    });
}

function renderPagination(page, pages, total) {
    let pag = document.getElementById('pagination');
    if (!pag) {
        pag = document.createElement('div');
        pag.id = 'pagination';
        pag.style.cssText = 'display:flex;align-items:center;gap:12px;margin-top:10px;font-size:14px;';
        document.querySelector('table').after(pag);
    }
    pag.innerHTML = `
        <button onclick="loadPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}
            style="padding:5px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:white;">
            ◀ Précédent
        </button>
        <span>Page ${page}/${pages} — ${total} dossier${total > 1 ? 's' : ''}</span>
        <button onclick="loadPage(${page + 1})" ${page >= pages ? 'disabled' : ''}
            style="padding:5px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:white;">
            Suivant ▶
        </button>
    `;
}

async function loadPage(page = 1) {
    _currentPage = page;

    document.getElementById("table").innerHTML = Array.from({ length: 8 }, () => `
        <tr>
            ${Array.from({ length: 13 }, () => `<td><span class="skeleton"></span></td>`).join('')}
        </tr>
    `).join('');

    const get = id => (document.getElementById(id) || {value: ''}).value.trim();
    const search       = get("search");
    const assistant    = get("filter-assistant");
    const collaborateur = get("filter-collab");
    const annee        = get("filter-annee");
    const cloture      = get("filter-cloture");

    const params = new URLSearchParams({ page, limit: _LIMIT });

    if (search)        params.set("search",              search);
    if (assistant)     params.set("assistant_exact",     assistant);
    if (collaborateur) params.set("collaborateur_exact", collaborateur);
    if (annee)         params.set("annee",               annee);
    if (cloture) {
        const mm = cloture.match(/\((\d{2})\)$/)?.[1] || cloture;
        params.set("cloture", "-" + mm + "-");
    }

    // Espace collaborateur : ?collab lu directement dans l'URL, juste avant le
    // fetch → filtre toujours actif si présent, sans action de l'utilisateur.
    const _c = sessionStorage.getItem("espaceCollab");
    if (_c) params.set("collaborateur_exact", _c);

    try {
        const res = await fetch(`${API_URL}/clients?${params}`);
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        const response = await res.json();
        display(response.data ?? []);
        renderPagination(response.page, response.pages, response.total);
    } catch (err) {
        console.error("Erreur loadPage:", err);
        document.getElementById("table").innerHTML =
            `<tr><td colspan="13" style="color:#e74c3c;padding:20px;">Erreur de chargement</td></tr>`;
    }
}

function applyFilters() {
    loadPage(1);
}

async function exportAll() {
    const get = id => (document.getElementById(id) || {value: ''}).value.trim();
    const params = new URLSearchParams({ limit: 0 });
    const search        = get("search");
    const assistant     = get("filter-assistant");
    const collaborateur = get("filter-collab");
    const annee         = get("filter-annee");
    const cloture       = get("filter-cloture");
    if (search)        params.set("search",              search);
    if (assistant)     params.set("assistant_exact",     assistant);
    if (collaborateur) params.set("collaborateur_exact", collaborateur);
    if (annee)         params.set("annee",               annee);
    if (cloture) {
        const mm = cloture.match(/\((\d{2})\)$/)?.[1] || cloture;
        params.set("cloture", "-" + mm + "-");
    }
    try {
        const res = await fetch(`${API_URL}/clients?${params}`);
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        const response = await res.json();
        exportCSV(response.data ?? [], 'rendement.csv', [
            { label: 'Code',          field: 'code_client' },
            { label: 'Nom',           field: 'nom_client' },
            { label: 'Assistant',     field: 'assistant' },
            { label: 'Collaborateur', field: 'collaborateur' },
            { label: 'Année',         field: 'annee' },
            { label: 'Clôture',       field: 'date_de_cloture' },
            { label: 'CA',            field: 'ca_r' },
            { label: 'Résultat',      field: 'resultat_r' },
            { label: 'Ancienneté',    field: 'anciennete' },
            { label: 'Temps (h)',     field: 'temps_passe' },
            { label: 'Honoraires',    field: 'honoraires_cpta' },
            { label: 'Rendement',     field: 'rendement' },
        ]);
    } catch (err) {
        console.error("Erreur exportAll:", err);
        alert("Erreur lors de l'export.");
    }
}

let _st;
document.getElementById("search").addEventListener("input", () => { clearTimeout(_st); _st = setTimeout(applyFilters, 300); });

const MOIS_LABELS = {
    '01':'Janvier','02':'Février','03':'Mars','04':'Avril',
    '05':'Mai','06':'Juin','07':'Juillet','08':'Août',
    '09':'Septembre','10':'Octobre','11':'Novembre','12':'Décembre'
};
async function populateSelects() {
    try {
        const res = await fetch(`${API_URL}/clients/filters`);
        const f = await res.json();
        const fill = (id, vals, labelFn) => {
            const dl = document.getElementById(id);
            if (!dl) return;
            vals.forEach(v => {
                if (!v) return;
                const opt = document.createElement('option');
                opt.value = labelFn ? labelFn(v) : v;
                dl.appendChild(opt);
            });
        };
        fill('dl-search',    f.noms,           null);
        fill('dl-assistant', f.assistants,     null);
        fill('dl-collab',    f.collaborateurs,  null);
        fill('dl-annee',     f.annees,         null);
        fill('dl-cloture',   f.mois_cloture,   v => `${MOIS_LABELS[v] || v} (${v})`);
    } catch {}
}
populateSelects().then(() => {
    document.querySelectorAll('.filters-top input[list]:not(#search)').forEach(inp => {
        inp.addEventListener('input', applyFilters);
    });
});

injectEspaceCollab(); // défini dans espace.js
loadPage(1);
</script>

<!-- Modal détail rendement -->
<div id="modal-rendement-overlay">
    <div class="mr-box">
        <div class="mr-header">

                <div class="mr-title" id="mr-title"></div>
                <div class="mr-score" id="mr-score"></div>
            </div>
            <button class="mr-close" onclick="closeRendementModal()">✕</button>
        </div>
        <div class="mr-body" id="mr-body"></div>

</div>

<script>
function closeRendementModal() {
    document.getElementById('modal-rendement-overlay').classList.remove('open');
}
document.getElementById('modal-rendement-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeRendementModal();
});

async function showRendementModal(siret) {
    const overlay = document.getElementById('modal-rendement-overlay');
    document.getElementById('mr-title').textContent = 'Chargement…';
    document.getElementById('mr-score').textContent = '';
    document.getElementById('mr-body').innerHTML = '';
    overlay.classList.add('open');

    let d;
    try {
        const r = await fetch(`/api/rendement_detail/${siret}`);
        if (!r.ok) throw new Error();
        d = await r.json();
    } catch {
        document.getElementById('mr-body').innerHTML =
            '<p style="color:#e74c3c;text-align:center;padding:20px;">Erreur de chargement</p>';
        return;
    }

    const scoreGlobal = d.score_global;
    const scoreColor  = scoreGlobal === null ? '#95a5a6'
                      : scoreGlobal < 40     ? '#e74c3c'
                      : scoreGlobal < 60     ? '#f39c12'
                      :                        '#27ae60';

    document.getElementById('mr-title').textContent = 'Score rendement';
    document.getElementById('mr-score').innerHTML =
        scoreGlobal !== null
            ? `<span style="color:${scoreColor}">${scoreGlobal}</span><span style="font-size:.9rem;font-weight:400;opacity:.8"> / 100</span>`
            : '<span style="font-size:1rem;font-weight:400;opacity:.8">Données insuffisantes</span>';

    const LABELS = {
        taux_horaire: { label: 'Taux horaire', poids: '50 %', color: '#3498db' },
        anciennete:   { label: 'Ancienneté',   poids: '20 %', color: '#9b59b6' },
        ca:           { label: 'CA',            poids: '15 %', color: '#27ae60' },
        resultat:     { label: 'Résultat',  poids: '15 %', color: '#e67e22' },
    };

    let html = '';
    for (const [key, meta] of Object.entries(LABELS)) {
        const f   = d.facteurs[key];
        const pct = f.points_max > 0 ? Math.round(f.points_obtenus * 100 / f.points_max) : 0;
        const dim = !f.renseigne;
        html += `
        <div class="mr-facteur">
            <div class="mr-facteur-header">
                <span class="mr-facteur-label">${esc(meta.label)}
                    <span style="font-weight:400;color:#aaa;font-size:.78rem">(${meta.poids})</span>
                </span>
                <span>
                    <span class="mr-facteur-val">${esc(f.valeur_affichee)}</span>
                    &nbsp;
                    <span class="mr-facteur-pts" style="color:${dim ? '#bbb' : meta.color}">
                        ${f.points_obtenus}&thinsp;/&thinsp;${f.points_max} pts
                    </span>
                </span>
            </div>
            <div class="mr-bar-track">
                <div class="mr-bar-fill" style="width:${dim ? 0 : pct}%;background:${meta.color};"></div>
            </div>
            <div class="mr-seuil">${esc(f.libelle_seuil)}</div>
        </div>`;
    }

    if (d.plafond_applique !== null) {
        html += `<div class="mr-plafond">
            ⚠️ Plafond appliqué : score brut&nbsp;${d.score_brut}
            → plafonné à&nbsp;${d.plafond_applique}
            (${d.nb_facteurs_renseignes}&nbsp;facteurs renseignés sur&nbsp;4)
        </div>`;
    }

    document.getElementById('mr-body').innerHTML = html;
}
</script>
