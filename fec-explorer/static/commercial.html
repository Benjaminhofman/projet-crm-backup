<body>

    <a href="index.html" class="back">⬅ Retour</a>
    <h2>💰 Suivi Commercial</h2>
</div>

<div class="counter" id="counter"></div>

<div class="filters">
    <select id="f-assistant"><option value="" disabled selected>— Assistant —</option></select>
    <select id="f-collab"><option value="" disabled selected>— Collaborateur —</option></select>
    <select id="f-annee"><option value="" disabled selected>— Année —</option></select>
    <select id="f-cloture"><option value="" disabled selected>— Clôture —</option></select>

    <select id="f-retraite"><option value="">Retraite</option></select>
    <select id="f-patrimoine"><option value="">Patrimoniale</option></select>
    <select id="f-placement"><option value="">Placement</option></select>
    <select id="f-prevoyance"><option value="">Prévoyance</option></select>
</div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Année</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Clôture</th>
<th>Retraite</th>
<th>Patrimoniale</th>
<th>Placement</th>
<th>Prévoyance</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>
const API_URL = "/api";

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}

// Score de rentabilité (retourne la valeur numérique brute)
function getRentabiliteScore(val) {
    return parseFloat(val) || 0;
}


// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
<script>


const STATUTS = [
    "détecté",
    "en cours",
    "proposé",
    "accepté",
    "refusé",
    "non applicable"
];

// init filtres select
function initSelectFilters() {
    ["f-retraite","f-patrimoine","f-placement","f-prevoyance"].forEach(id => {
        const select = document.getElementById(id);
        STATUTS.forEach(s => {
            const opt = document.createElement("option");
            opt.value = s;
            opt.textContent = s;
            select.appendChild(opt);
        });
    });
}

// affichage
function display(data) {

    const table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(c => {

        table.innerHTML += `
        <tr onclick="openClient('${c.siret}')">

            <td>${c.code_client || ""}</td>
            <td>${c.annee || ""}</td>
            <td>${c.nom_client || ""}</td>
            <td>${c.assistant || ""}</td>
            <td>${c.collaborateur || ""}</td>
            <td>${(v => { if(!v) return ''; const p=v.split('-'); return p[2].substring(0,2)+'/'+p[1]; })(c.date_de_cloture)}</td>
            ${buildSelect(c, "suivi_mission_retraite")}
            ${buildSelect(c, "suivi_mission_patrimoniale")}
            ${buildSelect(c, "suivi_mission_placement")}
            ${buildSelect(c, "suivi_mission_prevoyance")}

        </tr>`;
    });
}

// select (empêche le clic ligne)
function buildSelect(c, field) {

    const value = c[field] || "";

    return `
    <td onclick="event.stopPropagation()">
        <select onchange="updateField('${c.siret}', '${field}', this.value)">

            <option value="" ${value === "" ? "selected" : ""}></option>

            ${STATUTS.map(s => `
                <option value="${s}" ${value === s ? "selected" : ""}>
                    ${s}
                </option>
            `).join("")}

        </select>
    </td>`;
}

// navigation (comme opportunités)
function openClient(id) {
    window.location.href = "client.html?siret=" + id;
}

let _currentPage = 1;
const _LIMIT = 50;

function renderPagination(page, pages, total) {
    let pag = document.getElementById('pagination');
    if (!pag) {
        pag = document.createElement('div');
        pag.id = 'pagination';
        pag.style.cssText = 'display:flex;align-items:center;gap:12px;margin-top:10px;font-size:14px;padding:4px 0;';
        document.querySelector('table').after(pag);
    }
    pag.innerHTML = `
        <button onclick="loadPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}
            style="padding:5px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:white;">
            ◀ Précédent
        </button>
        <span>Page ${page}/${pages} — ${total} dossier${total > 1 ? 's' : ''}</span>
        <button onclick="loadPage(${page + 1})" ${page >= pages ? 'disabled' : ''}
            style="padding:5px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:white;">
            Suivant ▶
        </button>
    `;
}

async function loadPage(page = 1) {
    _currentPage = page;

    const get = id => (document.getElementById(id) || { value: '' }).value.trim();
    const params = new URLSearchParams({ page, limit: _LIMIT });
    const assistant     = get('f-assistant');
    const collaborateur = get('f-collab');
    const annee         = get('f-annee');
    const cloture       = get('f-cloture');
    if (assistant)     params.set('assistant_exact',     assistant);
    if (collaborateur) params.set('collaborateur_exact', collaborateur);
    if (annee)         params.set('annee',         annee);
    if (cloture)       params.set('cloture', '-' + cloture + '-');

    let response;
    try {
        const res = await fetch(`${API_URL}/clients?${params}`);
        if (!res.ok) throw new Error("HTTP " + res.status);
        response = await res.json();
    } catch (err) {
        console.error("loadPage:", err);
        document.getElementById("table").innerHTML =
            `<tr><td colspan="10" style="color:#e74c3c;padding:20px;text-align:center;">Erreur de chargement</td></tr>`;
        return;
    }

    // Filtrage JS pour les selects de statut (non pris en charge côté serveur)
    const retraite  = get('f-retraite');
    const patrimoine = get('f-patrimoine');
    const placement = get('f-placement');
    const prevoyance = get('f-prevoyance');

    let data = response.data ?? [];
    if (retraite)  data = data.filter(c => c.suivi_mission_retraite     === retraite);
    if (patrimoine) data = data.filter(c => c.suivi_mission_patrimoniale === patrimoine);
    if (placement) data = data.filter(c => c.suivi_mission_placement    === placement);
    if (prevoyance) data = data.filter(c => c.suivi_mission_prevoyance  === prevoyance);

    const hasSelectFilter = retraite || patrimoine || placement || prevoyance;
    document.getElementById("counter").innerText =
        "Nombre de dossiers : " + (hasSelectFilter ? data.length : response.total);

    display(data);
    renderPagination(response.page, response.pages, response.total);
}

function applyFilters() { loadPage(1); }

const MOIS_LABELS = {
    '01':'Janvier','02':'Février','03':'Mars','04':'Avril',
    '05':'Mai','06':'Juin','07':'Juillet','08':'Août',
    '09':'Septembre','10':'Octobre','11':'Novembre','12':'Décembre'
};

async function populateSelects() {
    const fill = async (id, field, labelFn) => {
        const sel = document.getElementById(id);
        try {
            const res = await fetch(`${API_URL}/clients/distinct?field=${field}`);
            const vals = await res.json();
            vals.forEach(v => {
                if (!v) return;
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = labelFn ? labelFn(v) : v;
                sel.appendChild(opt);
            });
        } catch {}
    };
    await Promise.all([
        fill('f-assistant', 'assistant'),
        fill('f-collab',    'collaborateur'),
        fill('f-annee',     'annee'),
        fill('f-cloture',   'mois_cloture', v => `${MOIS_LABELS[v] || v} (${v})`),
    ]);
}

async function load() {
    initSelectFilters();
    await populateSelects();
    document.querySelectorAll('.filters select').forEach(sel => {
        sel.addEventListener('change', applyFilters);
    });
    await loadPage(1);
}

load();
</script>
