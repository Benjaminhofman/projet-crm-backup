<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi Commercial</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

.counter {
    font-weight: bold;
    margin-bottom: 10px;
}

.filters {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

.filters input, .filters select {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #dfe6ff;
    cursor: pointer;
}

select {
    padding: 4px;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>💰 Suivi Commercial</h2>
</div>

<div class="counter" id="counter"></div>

<div class="filters">
    <input id="f-assistant" placeholder="Assistant">
    <input id="f-collab" placeholder="Collaborateur">
    <input id="f-annee" placeholder="Année">
    <input id="f-cloture" placeholder="Clôture">

    <select id="f-retraite"><option value="">Retraite</option></select>
    <select id="f-patrimoine"><option value="">Patrimoniale</option></select>
    <select id="f-placement"><option value="">Placement</option></select>
    <select id="f-prevoyance"><option value="">Prévoyance</option></select>
</div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Année</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Clôture</th>
<th>Retraite</th>
<th>Patrimoniale</th>
<th>Placement</th>
<th>Prévoyance</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>
const API_URL = "/api";

// Variable globale partagée entre toutes les pages déclaratives
let dataGlobal = [];

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}

// Score de rentabilité (retourne la valeur numérique brute)
function getRentabiliteScore(val) {
    return parseFloat(val) || 0;
}

// Chargement des clients depuis l'API avec gestion d'erreur
async function fetchClients() {
    try {
        const res = await fetch(API_URL + "/clients");
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        return await res.json();
    } catch (err) {
        console.error("Erreur fetchClients:", err);
        return { data: [], total: 0 };
    }
}

// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
<script>


const STATUTS = [
    "détecté",
    "en cours",
    "proposé",
    "accepté",
    "refusé",
    "non applicable"
];

// init filtres select
function initSelectFilters() {
    ["f-retraite","f-patrimoine","f-placement","f-prevoyance"].forEach(id => {
        const select = document.getElementById(id);
        STATUTS.forEach(s => {
            const opt = document.createElement("option");
            opt.value = s;
            opt.textContent = s;
            select.appendChild(opt);
        });
    });
}

// affichage
function display(data) {

    const table = document.getElementById("table");
    table.innerHTML = "";

    document.getElementById("counter").innerText =
        "Nombre de dossiers : " + data.length;

    data.forEach(c => {

        table.innerHTML += `
        <tr onclick="openClient('${c.siret}')">

            <td>${c.code_client || ""}</td>
            <td>${c.annee || ""}</td>
            <td>${c.nom_client || ""}</td>
            <td>${c.assistant || ""}</td>
            <td>${c.collaborateur || ""}</td>
            <td>${c.date_de_cloture || ""}</td>
            ${buildSelect(c, "suivi_mission_retraite")}
            ${buildSelect(c, "suivi_mission_patrimoniale")}
            ${buildSelect(c, "suivi_mission_placement")}
            ${buildSelect(c, "suivi_mission_prevoyance")}

        </tr>`;
    });
}

// select (empêche le clic ligne)
function buildSelect(c, field) {

    const value = c[field] || "";

    return `
    <td onclick="event.stopPropagation()">
        <select onchange="updateField('${c.siret}', '${field}', this.value)">

            <option value="" ${value === "" ? "selected" : ""}></option>

            ${STATUTS.map(s => `
                <option value="${s}" ${value === s ? "selected" : ""}>
                    ${s}
                </option>
            `).join("")}

        </select>
    </td>`;
}

// navigation (comme opportunités)
function openClient(id) {
    window.location.href = "client.html?siret=" + id;
}

// filtres
function applyFilters() {

    const assistant = document.getElementById("f-assistant").value.toLowerCase();
    const collab = document.getElementById("f-collab").value.toLowerCase();
    const annee = document.getElementById("f-annee").value.toLowerCase();
    const cloture = document.getElementById("f-cloture").value.toLowerCase();

    const retraite = document.getElementById("f-retraite").value;
    const patrimoine = document.getElementById("f-patrimoine").value;
    const placement = document.getElementById("f-placement").value;
    const prevoyance = document.getElementById("f-prevoyance").value;

    const filtered = dataGlobal.filter(c => {

        if (assistant && !(c.assistant || "").toLowerCase().includes(assistant)) return false;
        if (collab && !(c.collaborateur || "").toLowerCase().includes(collab)) return false;
        if (annee && !(String(c.annee)).includes(annee)) return false;
        if (cloture && !(c.date_de_cloture || "").toLowerCase().includes(cloture)) return false;

        if (retraite && c.suivi_mission_retraite !== retraite) return false;
        if (patrimoine && c.suivi_mission_patrimoniale !== patrimoine) return false;
        if (placement && c.suivi_mission_placement !== placement) return false;
        if (prevoyance && c.suivi_mission_prevoyance !== prevoyance) return false;

        return true;
    });

    display(filtered);
}

// load
async function load() {
    initSelectFilters();

    const response = await fetchClients();
    dataGlobal = response.data ?? response;

    applyFilters();

    bindFilterInputs(".filters input, .filters select");
}

load();
</script>

</body>
</html>
