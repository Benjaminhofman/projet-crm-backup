<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calendrier Anniversaires</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

#calendar {
    margin-top: 20px;
    background: white;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>🎂 Calendrier des anniversaires</h2>
</div>

<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script>
const API_URL = "/api";

// Variable globale partagée entre toutes les pages déclaratives
let dataGlobal = [];

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}

// Score de rentabilité (retourne la valeur numérique brute)
function getRentabiliteScore(val) {
    return parseFloat(val) || 0;
}

// Chargement des clients depuis l'API avec gestion d'erreur
async function fetchClients() {
    try {
        const res = await fetch(API_URL + "/clients");
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        return await res.json();
    } catch (err) {
        console.error("Erreur fetchClients:", err);
        return [];
    }
}

// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
<script>

async function loadCalendar() {

    const data = await fetchClients();

    const aujourd_hui = new Date();
    aujourd_hui.setHours(0, 0, 0, 0);

    const events = data
        .filter(c => c["anniversaire"])
        .map(c => {
            // Parsing manuel pour éviter le décalage UTC→local de new Date("yyyy-mm-dd")
            const [anneeNaissance, moisRaw, jourRaw] = c["anniversaire"].split('-').map(Number);
            const mois = moisRaw - 1; // 0-based pour le constructeur Date
            const jour = jourRaw;

            // Prochain anniversaire : année courante, ou suivante si déjà passé
            let prochainAnniv = new Date(aujourd_hui.getFullYear(), mois, jour);
            if (prochainAnniv < aujourd_hui) {
                prochainAnniv = new Date(aujourd_hui.getFullYear() + 1, mois, jour);
            }

            // Âge qu'aura le client à son prochain anniversaire
            const ageFutur = prochainAnniv.getFullYear() - anneeNaissance;
            const labelAge = anneeNaissance > 1900 ? ` (${ageFutur} ans)` : "";

            // Construction depuis les parties locales pour éviter la reconversion UTC de toISOString()
            const yyyy = prochainAnniv.getFullYear();
            const mm   = String(prochainAnniv.getMonth() + 1).padStart(2, '0');
            const dd   = String(prochainAnniv.getDate()).padStart(2, '0');
            const dateStr = `${yyyy}-${mm}-${dd}T00:00:00`; // T00:00:00 sans Z → interprétation locale par FullCalendar

            return {
                title: `${c.nom_client} 🎂${labelAge}`,
                start: dateStr,
                allDay: true
            };
        });

    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        locale: 'fr',
        height: "auto",
        events: events
    });

    calendar.render();
}

loadCalendar();
</script>

</body>
</html>
