<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>🎂 Calendrier des anniversaires</h2>
</div>

<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script>
const API_URL = "/api";

// Variable globale partagée entre toutes les pages déclaratives
let dataGlobal = [];

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}

// Score de rentabilité (retourne la valeur numérique brute)
function getRentabiliteScore(val) {
    return parseFloat(val) || 0;
}

// Chargement des clients depuis l'API avec gestion d'erreur
async function fetchClients() {
    try {
        const res = await fetch(API_URL + "/clients");
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        return await res.json();
    } catch (err) {
        console.error("Erreur fetchClients:", err);
        return [];
    }
}

// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ siret, field, value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
<script>

async function loadCalendar() {

    const data = await fetchClients();

    const aujourd_hui = new Date();
    aujourd_hui.setHours(0, 0, 0, 0);

    const events = data
        .filter(c => c["anniversaire"])
        .map(c => {
            // Parsing manuel pour éviter le décalage UTC→local de new Date("yyyy-mm-dd")
            const [anneeNaissance, moisRaw, jourRaw] = c["anniversaire"].split('-').map(Number);
            const mois = moisRaw - 1; // 0-based pour le constructeur Date
            const jour = jourRaw;

            // Prochain anniversaire : année courante, ou suivante si déjà passé
            let prochainAnniv = new Date(aujourd_hui.getFullYear(), mois, jour);
            if (prochainAnniv < aujourd_hui) {
                prochainAnniv = new Date(aujourd_hui.getFullYear() + 1, mois, jour);
            }

            // Âge qu'aura le client à son prochain anniversaire
            const ageFutur = prochainAnniv.getFullYear() - anneeNaissance;
            const labelAge = anneeNaissance > 1900 ? ` (${ageFutur} ans)` : "";

            // Construction depuis les parties locales pour éviter la reconversion UTC de toISOString()
            const yyyy = prochainAnniv.getFullYear();
            const mm   = String(prochainAnniv.getMonth() + 1).padStart(2, '0');
            const dd   = String(prochainAnniv.getDate()).padStart(2, '0');
            const dateStr = `${yyyy}-${mm}-${dd}T00:00:00`; // T00:00:00 sans Z → interprétation locale par FullCalendar

            return {
                title: `${c.nom_client} 🎂${labelAge}`,
                start: dateStr,
                allDay: true
            };
        });

    const fiscalEvents = computeFiscalEvents(data);

    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        locale: 'fr',
        height: "auto",
        events: [...events, ...fiscalEvents]
    });

    calendar.render();
}

// Génère les événements fiscaux fixes et groupés
function computeFiscalEvents(clients) {
    const aujourd_hui = new Date();
    aujourd_hui.setHours(0, 0, 0, 0);

    // Calcule la prochaine occurrence d'une date fixe (mois 1-based, jour)
    function prochaineFecheFixe(mois, jour) {
        let d = new Date(aujourd_hui.getFullYear(), mois - 1, jour);
        if (d < aujourd_hui) d = new Date(aujourd_hui.getFullYear() + 1, mois - 1, jour);
        const yyyy = d.getFullYear();
        const mm   = String(d.getMonth() + 1).padStart(2, '0');
        const dd   = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}T00:00:00`;
    }

    const events = [];

    // 2561 — 16 février — 1 événement groupé pour les clients avec dividendes > 1
    const clients2561 = clients.filter(c => parseFloat(c.dividendes) > 1);
    if (clients2561.length > 0) {
        events.push({
            title: `📋 2561 (${clients2561.length} client${clients2561.length > 1 ? 's' : ''})`,
            start: prochaineFecheFixe(2, 16),
            allDay: true,
            backgroundColor: '#f39c12',
            borderColor: '#f39c12'
        });
    }

    // DAS2 — 5 mai
    events.push({
        title: '📋 DAS2',
        start: prochaineFecheFixe(5, 5),
        allDay: true,
        backgroundColor: '#95a5a6',
        borderColor: '#95a5a6'
    });

    // DECLOYER — 20 mai
    events.push({
        title: '📋 DECLOYER',
        start: prochaineFecheFixe(5, 20),
        allDay: true,
        backgroundColor: '#95a5a6',
        borderColor: '#95a5a6'
    });

    // Liasse — 1 événement par client où is=true ou liasse=true
    // Deadline : 20 mai si clôture 31/12, sinon clôture + 3 mois + 15j
    function isTruthy(val) {
        return val === true || val === 'true' || val === 't';
    }

    function toLocalDateStr(d) {
        const yyyy = d.getFullYear();
        const mm   = String(d.getMonth() + 1).padStart(2, '0');
        const dd   = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}T00:00:00`;
    }

    clients
        .filter(c => (isTruthy(c.is) || isTruthy(c.liasse)) && c.date_de_cloture)
        .forEach(c => {
            const parts = c.date_de_cloture.split('-').map(Number);
            const moisCloture = parts[1];
            const jourCloture = parts[2];

            let deadline;
            if (moisCloture === 12 && jourCloture === 31) {
                // Clôture 31/12 → deadline fixe 20 mai
                deadline = new Date(aujourd_hui.getFullYear(), 4, 20);
                if (deadline < aujourd_hui) deadline = new Date(aujourd_hui.getFullYear() + 1, 4, 20);
            } else {
                // Autre clôture → prochaine occurrence + 3 mois + 15j
                let cloture = new Date(aujourd_hui.getFullYear(), moisCloture - 1, jourCloture);
                deadline = new Date(cloture.getFullYear(), cloture.getMonth() + 3, cloture.getDate() + 15);
                if (deadline < aujourd_hui) {
                    cloture = new Date(aujourd_hui.getFullYear() + 1, moisCloture - 1, jourCloture);
                    deadline = new Date(cloture.getFullYear(), cloture.getMonth() + 3, cloture.getDate() + 15);
                }
            }

            events.push({
                title: `📊 Liasse — ${c.nom_client}`,
                start: toLocalDateStr(deadline),
                allDay: true,
                backgroundColor: '#e74c3c',
                borderColor: '#e74c3c'
            });
        });

    // IS — Solde et acomptes
    clients
        .filter(c => isTruthy(c.is) && c.date_de_cloture)
        .forEach(c => {
            const parts = c.date_de_cloture.split('-').map(Number);
            const moisCloture = parts[1];
            const jourCloture = parts[2];

            // Solde IS — 15 mai, prochaine occurrence
            const solde = new Date(aujourd_hui.getFullYear(), 4, 15);
            if (solde < aujourd_hui) solde.setFullYear(aujourd_hui.getFullYear() + 1);
            events.push({
                title: `💰 Solde IS — ${c.nom_client}`,
                start: toLocalDateStr(solde),
                allDay: true,
                backgroundColor: '#e67e22',
                borderColor: '#e67e22'
            });

            // Acomptes IS — uniquement clôture 31/12 : 15 mars, juin, sept, déc
            if (moisCloture === 12 && jourCloture === 31) {
                [[3, 15], [6, 15], [9, 15], [12, 15]].forEach(([mois, jour]) => {
                    const acompte = new Date(aujourd_hui.getFullYear(), mois - 1, jour);
                    if (acompte < aujourd_hui) acompte.setFullYear(aujourd_hui.getFullYear() + 1);
                    events.push({
                        title: `💰 Acompte IS — ${c.nom_client}`,
                        start: toLocalDateStr(acompte),
                        allDay: true,
                        backgroundColor: '#e67e22',
                        borderColor: '#e67e22'
                    });
                });
            }
        });

    return events;
}

loadCalendar();
</script>
