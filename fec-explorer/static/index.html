<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CRM Clients</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
}

.header {
    background: #273c75;
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    width: 250px;
}

.container {
    padding: 20px;
}

#alert-anniv {
    display:none;
    background:#ffeaa7;
    border-left:6px solid #e17055;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    font-weight:bold;
}

.dashboard {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    min-width: 180px;
    text-align: center;
}

.filters-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-bottom: 20px;
}

.filter-group {
    background: white;
    padding: 10px;
    border-radius: 8px;
}

.checkbox-list {
    height: 120px;
    overflow-y: auto;
    background: #f1f2f6;
    padding: 5px;
    border-radius: 5px;
}

.checkbox-list label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    padding: 4px;
}

.sortable {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.arrow {
    margin-left: 5px;
    font-size: 12px;
}

/* Menu déroulant navigation */
.nav-dropdown {
    position: relative;
}

.nav-btn {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s;
    white-space: nowrap;
}

.nav-btn:hover {
    background: rgba(255,255,255,0.25);
}

.nav-arrow {
    font-size: 11px;
    transition: transform 0.2s;
    display: inline-block;
}

.nav-btn.open .nav-arrow {
    transform: rotate(180deg);
}

.nav-menu {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: white;
    border-radius: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
    min-width: 230px;
    z-index: 200;
    overflow: hidden;
    animation: fadeDown 0.15s ease;
}

.nav-menu.open {
    display: block;
}

@keyframes fadeDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
}

.nav-menu a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 18px;
    color: #2c3e50;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.12s;
    border-bottom: 1px solid #f0f2f5;
}

.nav-menu a:last-child {
    border-bottom: none;
}

.nav-menu a:hover {
    background: #f4f6fb;
    color: #273c75;
    padding-left: 22px;
}

table {
    border-collapse: collapse;
    width: 100%;
    background: white;
}

th {
    background: #273c75;
    color: white;
    padding: 10px;
    cursor: pointer;
}

td {
    padding: 10px;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #e8f0fe;
    cursor: pointer;
}

.btn {
    background: #44bd32;
    border: none;
    padding: 6px 10px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.btn:hover {
    background: #2ecc71;
}

.alert {
    color: #e74c3c;
    font-weight: bold;
    margin-left: 5px;
}

.alert-badge {
    background: #ffeaea;
    color: #e74c3c;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 11px;
    margin-left: 5px;
}
.badge-rendement { display:inline-block; padding:3px 8px; border-radius:12px; font-size:11px; font-weight:bold; color:white; }
.badge-excellent { background:#27ae60; }
.badge-bon       { background:#2980b9; }
.badge-moyen     { background:#f39c12; }
.badge-faible    { background:#e74c3c; }

/* Skeleton loader */
.skeleton {
    display: inline-block;
    background: linear-gradient(90deg, #e8eaf0 25%, #d4d8e2 50%, #e8eaf0 75%);
    background-size: 200% 100%;
    animation: skeleton-shine 1.4s infinite;
    border-radius: 4px;
    height: 14px;
    width: 75%;
}

.skeleton-row td {
    padding: 13px 10px;
}

.skeleton-card {
    display: inline-block;
    background: linear-gradient(90deg, #e8eaf0 25%, #d4d8e2 50%, #e8eaf0 75%);
    background-size: 200% 100%;
    animation: skeleton-shine 1.4s infinite;
    border-radius: 6px;
    height: 22px;
    width: 60px;
    vertical-align: middle;
}

@keyframes skeleton-shine {
    0%   { background-position:  200% 0; }
    100% { background-position: -200% 0; }
}
</style>
</head>

<body>

<div class="header">
    <h2>📊 CRM Clients</h2>

    <div style="display:flex; gap:10px; align-items:center;">

        <!-- Menu déroulant navigation -->
        <div class="nav-dropdown">
            <button class="nav-btn" id="nav-btn" onclick="toggleNavMenu()">
                ☰ Navigation <span class="nav-arrow">▾</span>
            </button>
            <div class="nav-menu" id="nav-menu">
                <a href="declaratif.html">📑 Déclaratif</a>
                <a href="missions.html">🚀 Missions exceptionnelles</a>
                <a href="opportunites.html">🎯 Suivi opportunités</a>
                <a href="commercial.html">💰 Suivi commercial</a>
                <a href="rendement.html">📈 Rendement</a>
                <a href="anniversaires.html">📅 Calendrier intelligent</a>
                <a href="gestion-clients.html">⚙️ Gestion clients</a>

        </div>

        <input type="text" id="search" placeholder="🔍 Rechercher un client...">

            <option value="">Toutes tranches</option>

            <option value="bon">👍 Bon (60-79)</option>

        <button onclick="exportIndexCSV()" style="background:#27ae60;color:white;padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:14px;">⬇ Export CSV</button>
    </div>
</div>

<div class="container">

<div id="alert-anniv"></div>

<div class="dashboard">
    <div class="card">
        <h4>👥 Clients</h4>
        <p id="total-clients">0</p>
    </div>

    <div class="card">
        <h4>💰 Honos moyen</h4>
        <p id="avg-honos">0 €</p>
    </div>

    <div class="card">
        <button class="btn" onclick="sortByHonos()">📊 Top honoraires</button>

</div>

<div class="filters-container" id="filters"></div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Nom</th>
<th>Clôture</th>
<th>Structure</th>
<th>Ancienneté</th>
<th onclick="sortByRendement()" style="cursor:pointer;">Rendement 🔽</th>
<th>Honos</th>
<th>Collab</th>
<th>Assistant</th>
<th onclick="sortByCA()">CA 🔽</th>

<th onclick="sortByResultat()">
    Résultat <span class="arrow">🔽</span>
</th>

<th>Activité</th>

<th>Action</th>
</tr>
</thead>

<tbody id="clients-table"></tbody>
</table>

</div>

<script>
const API_URL = "/api";

// Échappement HTML pour prévenir les injections XSS
function esc(val) {
    const div = document.createElement('div');
    div.textContent = val ?? '';
    return div.innerHTML;
}

// Formatage date ISO → YYYY-MM-DD
function formatDate(dateStr) {
    if (!dateStr) return "";
    return dateStr.substring(0, 10);
}

function formatDateEU(d) {
    if (!d) return "";
    const p = d.split("-");
    if (p.length !== 3) return d;
    return p[2] + "/" + p[1];
}


// Attache applyFilters() sur tous les inputs correspondant au sélecteur CSS
function bindFilterInputs(selector) {
    document.querySelectorAll(selector).forEach(el => {
        el.addEventListener("input", applyFilters);
    });
}

// Mise à jour d'un champ texte/date/nombre dans PostgreSQL
async function updateField(siret, field, value, el) {
    if (el) el.style.background = "#fff3cd";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.background = "#d4edda";
        setTimeout(() => { if (el) el.style.background = ""; }, 2000);
    } catch {
        if (el) el.style.background = "#f8d7da";
    }
}

// Mise à jour d'une case à cocher dans PostgreSQL
async function updateCheckbox(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Mise à jour d'un select dans PostgreSQL
async function updateSelect(siret, field, value, el) {
    if (el) el.style.outline = "2px solid orange";
    try {
        const res = await fetch(`${API_URL}/client/${siret}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [field]: value })
        });
        if (!res.ok) throw new Error();
        if (el) el.style.outline = "2px solid green";
        setTimeout(() => { if (el) el.style.outline = ""; }, 2000);
    } catch {
        if (el) el.style.outline = "2px solid red";
    }
}

// Export CSV — séparateur point-virgule, BOM UTF-8 pour compatibilité Excel
// columns (optionnel) : [{label, field}, ...] — si absent, exporte toutes les clés
function exportCSV(data, filename, columns) {
    if (!data || !data.length) {
        alert("Aucune donnée à exporter.");
        return;
    }

    let headers, rows;

    if (columns) {
        headers = columns.map(c => c.label);
        rows = data.map(row =>
            columns.map(c => '"' + String(row[c.field] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    } else {
        const keys = [...new Set(data.flatMap(r => Object.keys(r)))].filter(k => k !== 'id');
        headers = keys;
        rows = data.map(row =>
            keys.map(k => '"' + String(row[k] ?? '').replace(/"/g, '""') + '"').join(';')
        );
    }

    const csv = '﻿' + [
        headers.map(h => '"' + h.replace(/"/g, '""') + '"').join(';'),
        ...rows
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename || 'export.csv';
    a.click();
    URL.revokeObjectURL(url);
}
</script>
<script>
let _currentPage = 1;
const _LIMIT = 50;
let _currentData = []; // données de la page courante (tri, export)

function badgeRendement(val) {
    const n = parseFloat(val);
    if (isNaN(n) || val === null || val === "") return "<span style=’color:#aaa’>—</span>";
    let cls, label;
    if      (n >= 80) { cls = "badge-excellent"; label = "Excellent"; }
    else if (n >= 60) { cls = "badge-bon";       label = "Bon"; }
    else if (n >= 40) { cls = "badge-moyen";     label = "Moyen"; }
    else              { cls = "badge-faible";     label = "Faible"; }
    return `<span class="badge-rendement ${cls}">${Math.round(n)} — ${label}</span>`;
}

function getTranche(val) {
    const n = parseFloat(val);
    if (isNaN(n)) return "faible";
    if (n >= 80) return "excellent";
    if (n >= 60) return "bon";
    if (n >= 40) return "moyen";
    return "faible";
}

function checkAnniversaires(data) {
    const today = new Date();
    const j = String(today.getDate()).padStart(2, ‘0’);
    const m = String(today.getMonth() + 1).padStart(2, ‘0’);
    const annivs = data.filter(c => {
        if (!c["anniversaire"]) return false;
        const d = new Date(c["anniversaire"]);
        return String(d.getDate()).padStart(2, ‘0’) === j &&
               String(d.getMonth() + 1).padStart(2, ‘0’) === m;
    });
    if (annivs.length > 0) {
        const div = document.getElementById("alert-anniv");
        div.style.display = "block";
        div.innerHTML = "🎂 Anniversaire aujourd’hui : " +
            annivs.map(a => a.nom_client).join(", ");
    }
}

let filtersConfig = [
    { field: "collaborateur",   label: "Collaborateur" },
    { field: "assistant",       label: "Assistant" },
    { field: "date_de_cloture", label: "Date de clôture", type: "text" }
];

function buildFilters(data) {
    const container = document.getElementById("filters");
    container.innerHTML = "";
    filtersConfig.forEach(f => {
        const group = document.createElement("div");
        group.className = "filter-group";
        if (f.type === "text") {
            group.innerHTML = `
                <strong>${f.label}</strong>
                <input type="text" placeholder=’Ex : "03" pour mars...’ data-field="${f.field}" id="text-filter-${f.field}" style="margin-top:6px;width:100%;box-sizing:border-box;">
            `;
            container.appendChild(group);
            group.querySelector("input").addEventListener("input", applyFilters);
        } else {
            const values = [...new Set(data.map(c => c[f.field]).filter(Boolean))].sort();
            group.innerHTML = `
                <strong>${f.label}</strong>
                <input type="text" placeholder="Rechercher..." data-field="${f.field}">
                <div class="checkbox-list" id="list-${f.field}"></div>
            `;
            container.appendChild(group);
            renderCheckboxList(f.field, values);
            group.querySelector("input").addEventListener("input", (e) => {
                const val = e.target.value.toLowerCase();
                const filtered = values.filter(v => v.toLowerCase().includes(val));
                renderCheckboxList(f.field, filtered);
            });
        }
    });
}

function renderCheckboxList(field, values) {
    const container = document.getElementById("list-" + field);
    container.innerHTML = "";
    values.forEach(val => {
        container.innerHTML += `
            <label>
                <input type="checkbox" value="${val}" data-field="${field}">
                ${val}
            </label>
        `;
    });
    container.querySelectorAll("input").forEach(cb => {
        cb.addEventListener("change", applyFilters);
    });
}

function applyFilters() {
    loadPage(1);
}

async function loadPage(page = 1) {
    _currentPage = page;

    const tbody = document.getElementById("clients-table");
    tbody.innerHTML = Array.from({ length: 10 }, () => `
        <tr class="skeleton-row">
            ${Array.from({ length: 13 }, () => `<td><span class="skeleton"></span></td>`).join(‘’)}
        </tr>
    `).join(‘’);
    document.getElementById("total-clients").innerHTML = ‘<span class="skeleton-card"></span>’;
    document.getElementById("avg-honos").innerHTML     = ‘<span class="skeleton-card" style="width:90px;"></span>’;

    const get = id => (document.getElementById(id) || {value: ‘’}).value.trim();
    const search       = get("search");
    const tranche      = get("filter-tranche");
    const cloture      = get("text-filter-date_de_cloture");
    const collaborateur = [...document.querySelectorAll(‘input[type=checkbox][data-field="collaborateur"]:checked’)].map(c => c.value)[0] || ‘’;
    const assistant     = [...document.querySelectorAll(‘input[type=checkbox][data-field="assistant"]:checked’)].map(c => c.value)[0] || ‘’;

    const params = new URLSearchParams({ page, limit: _LIMIT });
    if (search)        params.set("search", search);
    if (collaborateur) params.set("collaborateur", collaborateur);
    if (assistant)     params.set("assistant", assistant);
    if (cloture)       params.set("cloture", cloture);

    try {
        const res = await fetch(`${API_URL}/clients?${params}`);
        if (!res.ok) throw new Error("Erreur HTTP " + res.status);
        const response = await res.json();
        let data = response.data ?? [];
        if (tranche) data = data.filter(c => getTranche(c.rendement) === tranche);
        displayClients(data);
        renderPagination(response.page, response.pages, response.total);
        checkAnniversaires(data);
        if (page === 1) buildFilters(response.data ?? []);
    } catch (err) {
        console.error("Erreur loadPage:", err);
        tbody.innerHTML = `<tr><td colspan="13" style="color:#e74c3c;padding:20px;">Erreur de chargement</td></tr>`;
    }
}

function renderPagination(page, pages, total) {
    let pag = document.getElementById(‘pagination’);
    if (!pag) {
        pag = document.createElement(‘div’);
        pag.id = ‘pagination’;
        pag.style.cssText = ‘display:flex;align-items:center;gap:12px;margin-top:10px;font-size:14px;padding:10px 0;’;
        document.querySelector(‘table’).after(pag);
    }
    pag.innerHTML = `
        <button onclick="loadPage(${page - 1})" ${page <= 1 ? ‘disabled’ : ‘’}
            style="padding:5px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:white;">
            ◀ Précédent
        </button>
        <span>Page ${page}/${pages} — ${total} dossier${total > 1 ? ‘s’ : ‘’}</span>
        <button onclick="loadPage(${page + 1})" ${page >= pages ? ‘disabled’ : ‘’}
            style="padding:5px 12px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:white;">
            Suivant ▶
        </button>
    `;
}

function displayClients(data) {
    _currentData = data;
    updateDashboard(data);

    const table = document.getElementById("clients-table");
    table.innerHTML = "";

    if (!data.length) {
        table.innerHTML = "<tr><td colspan=’13’>Aucun résultat</td></tr>";
        return;
    }

    data.forEach(c => {
        table.innerHTML += `
        <tr onclick="viewClient(‘${c.siret}’)">
            <td>${c.code_client || ""}</td>
            <td><strong>${c.nom_client || ""}</strong></td>
            <td>${formatDateEU(c.date_de_cloture)}</td>
            <td>${c.structure || ""}</td>
            <td>${c.anciennete > 0 ? c.anciennete + ‘ an’ + (c.anciennete > 1 ? ‘s’ : ‘’) : ‘—‘}</td>
            <td>${badgeRendement(c.rendement)}</td>
            <td>${c.honoraires_cpta || ""}</td>
            <td>${c.collaborateur || ""}</td>
            <td>${c.assistant || ""}</td>
            <td>${c.ca_r || ""}</td>
            <td>${c.resultat_r || ""}</td>
            <td>${c.activite_r || ""}</td>
            <td>
                <button class="btn" onclick="event.stopPropagation(); viewClient(‘${c.siret}’)">
                    Voir
                </button>
            </td>
        </tr>`;
    });
}

function sortByRendement() {
    displayClients([..._currentData].sort((a, b) =>
        (parseFloat(b.rendement) || 0) - (parseFloat(a.rendement) || 0)));
}

function sortByHonos() {
    displayClients([..._currentData].sort((a, b) =>
        (parseFloat(b.honoraires_cpta) || 0) - (parseFloat(a.honoraires_cpta) || 0)));
}

function sortByCA() {
    displayClients([..._currentData].sort((a, b) =>
        (parseFloat(b.ca_r) || 0) - (parseFloat(a.ca_r) || 0)));
}

function sortByResultat() {
    displayClients([..._currentData].sort((a, b) =>
        (parseFloat(b.resultat_r) || 0) - (parseFloat(a.resultat_r) || 0)));
}

function viewClient(siret) {
    window.location.href = "client.html?siret=" + siret;
}

function exportIndexCSV() {
    exportCSV(_currentData, ‘clients.csv’, [
        { label: "Code",          field: "code_client" },
        { label: "Nom",           field: "nom_client" },
        { label: "Clôture",       field: "date_de_cloture" },
        { label: "Structure",     field: "structure" },
        { label: "Ancienneté",    field: "anciennete" },
        { label: "Honoraires",    field: "honoraires_cpta" },
        { label: "Collaborateur", field: "collaborateur" },
        { label: "Assistant",     field: "assistant" },
        { label: "CA",            field: "ca_r" },
        { label: "Résultat",      field: "resultat_r" },
        { label: "Activité",      field: "activite_r" }
    ]);
}

function updateDashboard(data) {
    const total = data.length;
    const totalHonos = data.reduce((sum, c) => sum + (parseFloat(c.honoraires_cpta) || 0), 0);
    const avg = total ? totalHonos / total : 0;
    document.getElementById("total-clients").innerText = total;
    document.getElementById("avg-honos").innerText =
        new Intl.NumberFormat(‘fr-FR’, { style: ‘currency’, currency: ‘EUR’ }).format(avg);
}

document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("filter-tranche").addEventListener("change", applyFilters);

loadPage(1);
setInterval(() => loadPage(_currentPage), 5 * 60 * 1000);

/* Menu déroulant navigation */
function toggleNavMenu() {
    const menu = document.getElementById(‘nav-menu’);
    const btn  = document.getElementById(‘nav-btn’);
    menu.classList.toggle(‘open’);
    btn.classList.toggle(‘open’);
}

document.addEventListener(‘click’, function(e) {
    const dropdown = document.querySelector(‘.nav-dropdown’);
    if (dropdown && !dropdown.contains(e.target)) {
        document.getElementById(‘nav-menu’).classList.remove(‘open’);
        document.getElementById(‘nav-btn’).classList.remove(‘open’);
    }
});
</script>
