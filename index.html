<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CRM Clients</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
}

.header {
    background: #273c75;
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    width: 250px;
}

.container {
    padding: 20px;
}

#alert-anniv {
    display:none;
    background:#ffeaa7;
    border-left:6px solid #e17055;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    font-weight:bold;
}

.dashboard {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    min-width: 180px;
    text-align: center;
}

.filters-container {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
    margin-bottom: 20px;
}

.filter-group {
    background: white;
    padding: 10px;
    border-radius: 8px;
}

.checkbox-list {
    height: 120px;
    overflow-y: auto;
    background: #f1f2f6;
    padding: 5px;
    border-radius: 5px;
}

.checkbox-list label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    padding: 4px;
}

.sortable {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.arrow {
    margin-left: 5px;
    font-size: 12px;
}

/* Menu déroulant navigation */
.nav-dropdown {
    position: relative;
}

.nav-btn {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s;
    white-space: nowrap;
}

.nav-btn:hover {
    background: rgba(255,255,255,0.25);
}

.nav-arrow {
    font-size: 11px;
    transition: transform 0.2s;
    display: inline-block;
}

.nav-btn.open .nav-arrow {
    transform: rotate(180deg);
}

.nav-menu {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: white;
    border-radius: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
    min-width: 230px;
    z-index: 200;
    overflow: hidden;
    animation: fadeDown 0.15s ease;
}

.nav-menu.open {
    display: block;
}

@keyframes fadeDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
}

.nav-menu a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 18px;
    color: #2c3e50;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.12s;
    border-bottom: 1px solid #f0f2f5;
}

.nav-menu a:last-child {
    border-bottom: none;
}

.nav-menu a:hover {
    background: #f4f6fb;
    color: #273c75;
    padding-left: 22px;
}

table {
    border-collapse: collapse;
    width: 100%;
    background: white;
}

th {
    background: #273c75;
    color: white;
    padding: 10px;
    cursor: pointer;
}

td {
    padding: 10px;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #e8f0fe;
    cursor: pointer;
}

.btn {
    background: #44bd32;
    border: none;
    padding: 6px 10px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.btn:hover {
    background: #2ecc71;
}

.alert {
    color: #e74c3c;
    font-weight: bold;
    margin-left: 5px;
}

.alert-badge {
    background: #ffeaea;
    color: #e74c3c;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 11px;
    margin-left: 5px;
}

/* Skeleton loader */
.skeleton {
    display: inline-block;
    background: linear-gradient(90deg, #e8eaf0 25%, #d4d8e2 50%, #e8eaf0 75%);
    background-size: 200% 100%;
    animation: skeleton-shine 1.4s infinite;
    border-radius: 4px;
    height: 14px;
    width: 75%;
}

.skeleton-row td {
    padding: 13px 10px;
}

.skeleton-card {
    display: inline-block;
    background: linear-gradient(90deg, #e8eaf0 25%, #d4d8e2 50%, #e8eaf0 75%);
    background-size: 200% 100%;
    animation: skeleton-shine 1.4s infinite;
    border-radius: 6px;
    height: 22px;
    width: 60px;
    vertical-align: middle;
}

@keyframes skeleton-shine {
    0%   { background-position:  200% 0; }
    100% { background-position: -200% 0; }
}
</style>
</head>

<body>

<div class="header">
    <h2>📊 CRM Clients</h2>

    <div style="display:flex; gap:10px; align-items:center;">

        <!-- Menu déroulant navigation -->
        <div class="nav-dropdown">
            <button class="nav-btn" id="nav-btn" onclick="toggleNavMenu()">
                ☰ Navigation <span class="nav-arrow">▾</span>
            </button>
            <div class="nav-menu" id="nav-menu">
                <a href="declaratif.html">📑 Déclaratif</a>
                <a href="missions.html">🚀 Missions exceptionnelles</a>
                <a href="opportunites.html">🎯 Suivi opportunités</a>
                <a href="commercial.html">💰 Suivi commercial</a>
                <a href="rendement.html">📈 Rendement</a>
                <a href="anniversaires.html">🎂 Anniversaires</a>
            </div>
        </div>

        <input type="text" id="search" placeholder="🔍 Rechercher un client...">
        <input type="number" id="filter-renta" placeholder="Min /10" style="width:120px;">
        <button onclick="exportIndexCSV()" style="background:#27ae60;color:white;padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:14px;">⬇ Export CSV</button>
    </div>
</div>

<div class="container">

<div id="alert-anniv"></div>

<div class="dashboard">
    <div class="card">
        <h4>👥 Clients</h4>
        <p id="total-clients">0</p>
    </div>

    <div class="card">
        <h4>💰 Honos moyen</h4>
        <p id="avg-honos">0 €</p>
    </div>

    <div class="card">
        <button class="btn" onclick="sortByHonos()">📊 Top honoraires</button>
    </div>
</div>

<div class="filters-container" id="filters"></div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Nom</th>
<th>Clôture</th>
<th>Structure</th>
<th>Ancienneté</th>
<th>Honos</th>
<th>Collab</th>
<th>Assistant</th>
<th onclick="sortByCA()">CA 🔽</th>

<th onclick="sortByResultat()">
    Résultat <span class="arrow">🔽</span>
</th>

<th>Activité</th>

<th onclick="sortByRentabilite()">Rentabilité 🔽</th>

<th>Action</th>
</tr>
</thead>

<tbody id="clients-table"></tbody>
</table>

</div>

<script src="utils.js"></script>
<script>
let clientsData = [];
let displayedClients = [];

/* 🔥 RENTABILITE */

function getColor(score) {
    if (score < 4) return "#e74c3c";
    if (score < 7) return "#f39c12";
    return "#27ae60";
}

/* 🔥 EXISTANT */
function checkAnniversaires(data) {
    const today = new Date();
    const j = String(today.getDate()).padStart(2, '0');
    const m = String(today.getMonth() + 1).padStart(2, '0');

    const annivs = data.filter(c => {
        if (!c["anniversaire"]) return false;
        const d = new Date(c["anniversaire"]);
        return String(d.getDate()).padStart(2, '0') === j &&
               String(d.getMonth() + 1).padStart(2, '0') === m;
    });

    if (annivs.length > 0) {
        const div = document.getElementById("alert-anniv");
        div.style.display = "block";
        div.innerHTML = "🎂 Anniversaire aujourd’hui : " +
            annivs.map(a => a["nom client"]).join(", ");
    }
}

/* 🔥 FILTRES (inchangé) */
let filtersConfig = [
    { field: "collaborateur", label: "Collaborateur" },
    { field: "structure", label: "Structure" },
    { field: "activite R", label: "Activité" },
    { field: "assistant", label: "Assistant" },
    { field: "date de cloture", label: "Date de clôture" }
];

function buildFilters() {
    const container = document.getElementById("filters");
    container.innerHTML = "";

    filtersConfig.forEach(f => {
        const values = [...new Set(clientsData.map(c => c[f.field]).filter(Boolean))].sort();

        const group = document.createElement("div");
        group.className = "filter-group";

        group.innerHTML = `
            <strong>${f.label}</strong>
            <input type="text" placeholder="Rechercher..." data-field="${f.field}">
            <div class="checkbox-list" id="list-${f.field}"></div>
        `;

        container.appendChild(group);
        renderCheckboxList(f.field, values);

        group.querySelector("input").addEventListener("input", (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = values.filter(v => v.toLowerCase().includes(val));
            renderCheckboxList(f.field, filtered);
        });
    });
}

function renderCheckboxList(field, values) {
    const container = document.getElementById("list-" + field);
    container.innerHTML = "";

    values.forEach(val => {
        container.innerHTML += `
            <label>
                <input type="checkbox" value="${val}" data-field="${field}">
                ${val}
            </label>
        `;
    });

    container.querySelectorAll("input").forEach(cb => {
        cb.addEventListener("change", applyFilters);
    });
}

function applyFilters() {
    const checkboxes = document.querySelectorAll("input[type=checkbox]:checked");

    const filters = {};
    checkboxes.forEach(cb => {
        if (!filters[cb.dataset.field]) filters[cb.dataset.field] = [];
        filters[cb.dataset.field].push(cb.value);
    });

    const filtered = clientsData.filter(c =>
        Object.keys(filters).every(field =>
            filters[field].includes(c[field])
        )
    );

    displayClients(filtered);
}

/* 🔥 LOAD */
async function loadClients() {

    // Skeleton loader — tableau
    const tbody = document.getElementById("clients-table");
    tbody.innerHTML = Array.from({ length: 10 }, () => `
        <tr class="skeleton-row">
            ${Array.from({ length: 13 }, () => `<td><span class="skeleton"></span></td>`).join('')}
        </tr>
    `).join('');

    // Skeleton loader — cards
    document.getElementById("total-clients").innerHTML = '<span class="skeleton-card"></span>';
    document.getElementById("avg-honos").innerHTML     = '<span class="skeleton-card" style="width:90px;"></span>';

    const res = await fetch(API_URL + "/clients");
    clientsData = await res.json();

    buildFilters();
    displayClients(clientsData);
    checkAnniversaires(clientsData);
}

function displayClients(data) {

    displayedClients = data;
    updateDashboard(data);

    const table = document.getElementById("clients-table");
    table.innerHTML = "";

    if (!data.length) {
        table.innerHTML = "<tr><td colspan='13'>Aucun résultat</td></tr>";
        return;
    }

    data.forEach(c => {

        const anciennete = parseFloat(c["ancienneté"]) || 0;
        const score = parseFloat(c["rentabilite"]) || 0;

        table.innerHTML += `
        <tr onclick="viewClient('${c.id}')">

            <td>${c["code client"] || ""}</td>
            <td><strong>${c["nom client"] || ""}</strong></td>
            <td>${c["date de cloture"] || ""}</td>
            <td>${c["structure"] || ""}</td>

            <td>
                ${anciennete}
                ${anciennete < 1 ? '<span class="alert">⚠️</span><span class="alert-badge">Nouveau</span>' : ''}
            </td>

            <td>${c["honoraires cpta"] || ""}</td>
            <td>${c["collaborateur"] || ""}</td>
            <td>${c["assistant"] || ""}</td>

            <td>${c["CA R"] || ""}</td>
            <td>${c["resultat R"] || ""}</td>
            <td>${c["activite R"] || ""}</td>

            <td style="font-weight:bold; color:${getColor(score)};">
                ${score.toFixed(2)}
            </td>

            <td>
                <button class="btn" onclick="event.stopPropagation(); viewClient('${c.id}')">
                    Voir
                </button>
            </td>

        </tr>`;
    });
}

/* 🔥 TRI */
function sortByRentabilite() {
    const sorted = [...clientsData].sort((a, b) =>
        (parseFloat(b["rentabilite"]) || 0) -
        (parseFloat(a["rentabilite"]) || 0)
    );
    displayClients(sorted);
}

/* 🔥 FILTRE RENTABILITE */
document.getElementById("filter-renta").addEventListener("input", function(e) {
    const min = parseFloat(e.target.value) || 0;

    const filtered = clientsData.filter(c => {
        const score = getRentabiliteScore(c["rentabilite"]);
        return score >= min;
    });

    displayClients(filtered);
});

/* 🔎 SEARCH */
document.getElementById("search").addEventListener("input", function(e) {
    const value = e.target.value.toLowerCase();

    const filtered = clientsData.filter(c =>
        (c["nom client"] || "").toLowerCase().includes(value)
    );

    displayClients(filtered);
});

function sortByHonos() {
    const sorted = [...clientsData].sort((a, b) =>
        (parseFloat(b["honoraires cpta"]) || 0) -
        (parseFloat(a["honoraires cpta"]) || 0)
    );
    displayClients(sorted);
}

function sortByCA() {
    const sorted = [...clientsData].sort((a, b) =>
        (parseFloat(b["CA R"]) || 0) -
        (parseFloat(a["CA R"]) || 0)
    );
    displayClients(sorted);
}

function sortByResultat() {
    const sorted = [...clientsData].sort((a, b) =>
        (parseFloat(b["resultat R"]) || 0) -
        (parseFloat(a["resultat R"]) || 0)
    );
    displayClients(sorted);
}

function viewClient(id) {
    window.location.href = "client.html?id=" + id;
}

function exportIndexCSV() {
    exportCSV(displayedClients, 'clients.csv', [
        { label: "Code",          field: "code client" },
        { label: "Nom",           field: "nom client" },
        { label: "Clôture",       field: "date de cloture" },
        { label: "Structure",     field: "structure" },
        { label: "Ancienneté",    field: "ancienneté" },
        { label: "Honoraires",    field: "honoraires cpta" },
        { label: "Collaborateur", field: "collaborateur" },
        { label: "Assistant",     field: "assistant" },
        { label: "CA",            field: "CA R" },
        { label: "Résultat",      field: "resultat R" },
        { label: "Activité",      field: "activite R" },
        { label: "Rentabilité",   field: "rentabilite" }
    ]);
}

function updateDashboard(data) {
    const total = data.length;

    const totalHonos = data.reduce((sum, c) => {
        return sum + (parseFloat(c["honoraires cpta"]) || 0);
    }, 0);

    const avg = total ? totalHonos / total : 0;

    document.getElementById("total-clients").innerText = total;
    document.getElementById("avg-honos").innerText =
        new Intl.NumberFormat('fr-FR', {
            style: 'currency',
            currency: 'EUR'
        }).format(avg);
}

loadClients();

/* Menu déroulant navigation */
function toggleNavMenu() {
    const menu = document.getElementById('nav-menu');
    const btn  = document.getElementById('nav-btn');
    menu.classList.toggle('open');
    btn.classList.toggle('open');
}

document.addEventListener('click', function(e) {
    const dropdown = document.querySelector('.nav-dropdown');
    if (dropdown && !dropdown.contains(e.target)) {
        document.getElementById('nav-menu').classList.remove('open');
        document.getElementById('nav-btn').classList.remove('open');
    }
});
</script>

</body>
</html>
