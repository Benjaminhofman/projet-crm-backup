<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CRM Clients</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
}

.header {
    background: #273c75;
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    width: 250px;
}

.container {
    padding: 20px;
}

#alert-anniv {
    display:none;
    background:#ffeaa7;
    border-left:6px solid #e17055;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    font-weight:bold;
}

.dashboard {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    min-width: 180px;
    text-align: center;
}

.filters-container {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
    margin-bottom: 20px;
}

.filter-group {
    background: white;
    padding: 10px;
    border-radius: 8px;
}

.checkbox-list {
    height: 120px;
    overflow-y: auto;
    background: #f1f2f6;
    padding: 5px;
    border-radius: 5px;
}

.checkbox-list label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    padding: 4px;
}

.arrow {
    margin-left: 5px;
    font-size: 12px;
}

.btn-anniv {
    background: #e67e22;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.2s;
}

.btn-anniv:hover {
    background: #d35400;
}

table {
    border-collapse: collapse;
    width: 100%;
    background: white;
}

th {
    background: #273c75;
    color: white;
    padding: 10px;
    cursor: pointer;
}

td { padding: 10px; }

tr:nth-child(even) { background: #f8f9fc; }

tr:hover {
    background: #e8f0fe;
    cursor: pointer;
}

.btn {
    background: #44bd32;
    border: none;
    padding: 6px 10px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.btn:hover { background: #2ecc71; }

.alert {
    color: #e74c3c;
    font-weight: bold;
    margin-left: 5px;
}

.alert-badge {
    background: #ffeaea;
    color: #e74c3c;
    padding: 2px 6px;
    border-radius: 6px;
    font-size: 11px;
    margin-left: 5px;
}

/* Modale rendement */
.renta-click {
    background: none;
    border: none;
    padding: 0;
    font: inherit;
    font-weight: bold;
    cursor: pointer;
    text-decoration: underline;
}

dialog {
    border: none;
    border-radius: 10px;
    width: min(760px, 95vw);
    padding: 20px;
}

.modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 12px 0;
}

.modal-grid label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 14px;
}

.modal-grid input {
    padding: 8px;
    border: 1px solid #dcdde1;
    border-radius: 6px;
}

.calc-box {
    background: #f1f7ff;
    border: 1px solid #cfe3ff;
    border-radius: 8px;
    padding: 10px;
    margin: 12px 0;
    white-space: pre-line;
    font-size: 14px;
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}
</style>
</head>

<body>

<div class="header">
    <h2>📊 CRM Clients</h2>
    <div style="display:flex; gap:10px; align-items:center;">
        <a href="declaratif.html" class="btn" style="background:#e67e22;">📑 Déclaratif</a>
        <a href="missions.html" class="btn" style="background:#8e44ad;">🚀 Missions exceptionnelles</a>
        <a href="opportunites.html" class="btn" style="background:#2980b9;">🎯 Suivi opportunités</a>
        <a href="commercial.html" class="btn" style="background:#16a085;">💰 Suivi commercial</a>
        <a href="anniversaires.html" class="btn-anniv">🎂 Anniversaires</a>

        <input type="text" id="search" placeholder="🔍 Rechercher un client...">
        <input type="number" id="filter-renta" placeholder="Min /100" style="width:120px;">
    </div>
</div>

<div class="container">
<div id="alert-anniv"></div>

<div class="dashboard">
    <div class="card"><h4>👥 Clients</h4><p id="total-clients">0</p></div>
    <div class="card"><h4>💰 Honos moyen</h4><p id="avg-honos">0 €</p></div>
    <div class="card"><button class="btn" onclick="sortByHonos()">📊 Top honoraires</button></div>
</div>

<div class="filters-container" id="filters"></div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Nom</th>
<th>Clôture</th>
<th>Structure</th>
<th>Ancienneté</th>
<th>Temps passé</th>
<th>Honos</th>
<th>Collab</th>
<th>Assistant</th>
<th onclick="sortByCA()">CA 🔽</th>
<th onclick="sortByResultat()">Résultat 🔽</th>
<th>Activité</th>
<th onclick="sortByRentabilite()">Rentabilité 🔽</th>
<th>Action</th>
</tr>
</thead>
<tbody id="clients-table"></tbody>
</table>
</div>

<dialog id="edit-renta-dialog">
    <h3 id="edit-renta-title">Modifier le rendement</h3>
    <div class="modal-grid">
        <label>Temps passé (h)<input id="edit-temps-passe" type="number" min="0" step="0.01"></label>
        <label>Honoraires cpta (€)<input id="edit-honos" type="number" step="0.01"></label>
        <label>Résultat R (€)<input id="edit-resultat" type="number" step="0.01"></label>
        <label>Ancienneté (ans)<input id="edit-anciennete" type="number" min="0" step="0.01"></label>
    </div>
    <div id="edit-renta-info" class="calc-box"></div>
    <div class="modal-actions">
        <button class="btn" style="background:#7f8c8d" onclick="closeRentaModal()">Annuler</button>
        <button class="btn" onclick="saveRentaEdit()">Enregistrer</button>
    </div>
</dialog>

<script src="utils.js"></script>
<script>
let clientsData = [];
let editingClientId = null;

/* CONFIG AIRTABLE */
const AIRTABLE_API_KEY = "PASTE_YOUR_TOKEN_HERE";
const AIRTABLE_BASE_ID = "PASTE_BASE_ID_HERE";
const AIRTABLE_TABLE_NAME = "PASTE_TABLE_NAME_HERE";

function parseNum(v) {
    if (v === null || v === undefined || v === "") return 0;
    const n = parseFloat(String(v).replace(",", "."));
    return isNaN(n) ? 0 : n;
}

/* CALCUL EXACT DEMANDÉ (score /100) */
function calculateRendement(fields) {
    const temps = parseNum(fields["temps passé"]);
    const honos = parseNum(fields["honoraires cpta"]);
    const ca = parseNum(fields["CA R"]);
    const resultat = parseNum(fields["resultat R"]);
    const anciennete = parseNum(fields["ancienneté"]);

    const part1 = Math.min((temps > 0 ? honos / temps : 0) / 100, 1) * 40;
    const part2 = Math.min((ca + resultat) / 100000, 1) * 30;

    const bonusAnciennete = anciennete > 10 ? 10 : (anciennete > 5 ? 5 : (anciennete < 1 ? -10 : 0));
    const malusResultat = resultat < 0 ? 15 : 0;
    const part3 = 30 + bonusAnciennete - malusResultat;

    return Math.round(part1 + part2 + part3);
}

function getColor(score) {
    if (score < 40) return "#e74c3c";
    if (score < 70) return "#f39c12";
    return "#27ae60";
}

function refreshRentaInfo() {
    const client = clientsData.find(c => String(c.id) === String(editingClientId)) || {};

    const fields = {
        "temps passé": parseNum(document.getElementById("edit-temps-passe").value),
        "honoraires cpta": parseNum(document.getElementById("edit-honos").value),
        "resultat R": parseNum(document.getElementById("edit-resultat").value),
        "ancienneté": parseNum(document.getElementById("edit-anciennete").value),
        "CA R": parseNum(client["CA R"])
    };

    const score = calculateRendement(fields);

    const part1 = Math.min((fields["temps passé"] > 0 ? fields["honoraires cpta"] / fields["temps passé"] : 0) / 100, 1) * 40;
    const part2 = Math.min((fields["CA R"] + fields["resultat R"]) / 100000, 1) * 30;
    const bonusAnciennete = fields["ancienneté"] > 10 ? 10 : (fields["ancienneté"] > 5 ? 5 : (fields["ancienneté"] < 1 ? -10 : 0));
    const malusResultat = fields["resultat R"] < 0 ? 15 : 0;
    const part3 = 30 + bonusAnciennete - malusResultat;

    document.getElementById("edit-renta-info").textContent =
`Caractéristiques :
- Temps passé : ${fields["temps passé"]}
- Honoraires cpta : ${fields["honoraires cpta"]} €
- CA R : ${fields["CA R"]} €
- Résultat R : ${fields["resultat R"]} €
- Ancienneté : ${fields["ancienneté"]} ans

Calcul du rendement :
1) MIN(IF(temps>0, honos/temps,0)/100,1) * 40 = ${part1.toFixed(2)}
2) MIN((CA R + resultat R)/100000,1) * 30 = ${part2.toFixed(2)}
3) 30 + bonus ancienneté (${bonusAnciennete}) - malus résultat (${malusResultat}) = ${part3.toFixed(2)}

Total = ROUND(1 + 2 + 3, 0) = ${score}/100`;
}

function openRentaEditor(id) {
    const client = clientsData.find(c => String(c.id) === String(id));
    if (!client) return;

    editingClientId = id;
    document.getElementById("edit-renta-title").textContent = `Modifier rendement - ${client["nom client"] || ""}`;
    document.getElementById("edit-temps-passe").value = parseNum(client["temps passé"]);
    document.getElementById("edit-honos").value = parseNum(client["honoraires cpta"]);
    document.getElementById("edit-resultat").value = parseNum(client["resultat R"]);
    document.getElementById("edit-anciennete").value = parseNum(client["ancienneté"]);

    refreshRentaInfo();
    document.getElementById("edit-renta-dialog").showModal();
}

function closeRentaModal() {
    document.getElementById("edit-renta-dialog").close();
    editingClientId = null;
}

async function updateAirtableRecord(recordId, fieldsToUpdate) {
    const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}/${recordId}`;
    const res = await fetch(url, {
        method: "PATCH",
        headers: {
            "Authorization": `Bearer ${AIRTABLE_API_KEY}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ fields: fieldsToUpdate })
    });

    if (!res.ok) {
        const txt = await res.text();
        throw new Error(`Erreur Airtable: ${res.status} ${txt}`);
    }
    return res.json();
}

async function saveRentaEdit() {
    const client = clientsData.find(c => String(c.id) === String(editingClientId));
    if (!client) return;

    const newFields = {
        "temps passé": parseNum(document.getElementById("edit-temps-passe").value),
        "honoraires cpta": parseNum(document.getElementById("edit-honos").value),
        "resultat R": parseNum(document.getElementById("edit-resultat").value),
        "ancienneté": parseNum(document.getElementById("edit-anciennete").value)
    };

    const localUpdated = { ...client, ...newFields };
    const newScore = calculateRendement(localUpdated);
    newFields["rentabilite"] = newScore;

    try {
        if (!AIRTABLE_API_KEY || AIRTABLE_API_KEY.includes("PASTE_")) {
            throw new Error("Configuration Airtable manquante (API key/base/table).");
        }

        // recordId = client.id
        await updateAirtableRecord(client.id, newFields);

        Object.assign(client, newFields);
        closeRentaModal();
        displayClients(clientsData);
        alert("✅ Modifications enregistrées dans Airtable.");
    } catch (e) {
        console.error(e);
        alert("❌ Erreur lors de la sauvegarde Airtable : " + e.message);
    }
}

["edit-temps-passe", "edit-honos", "edit-resultat", "edit-anciennete"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("input", refreshRentaInfo);
});

/* EXISTANT */
function checkAnniversaires(data) {
    const today = new Date();
    const j = String(today.getDate()).padStart(2, '0');
    const m = String(today.getMonth() + 1).padStart(2, '0');

    const annivs = data.filter(c => {
        if (!c["anniversaire"]) return false;
        const d = new Date(c["anniversaire"]);
        return String(d.getDate()).padStart(2, '0') === j &&
               String(d.getMonth() + 1).padStart(2, '0') === m;
    });

    if (annivs.length > 0) {
        const div = document.getElementById("alert-anniv");
        div.style.display = "block";
        div.innerHTML = "🎂 Anniversaire aujourd’hui : " + annivs.map(a => a["nom client"]).join(", ");
    }
}

let filtersConfig = [
    { field: "collaborateur", label: "Collaborateur" },
    { field: "structure", label: "Structure" },
    { field: "activite R", label: "Activité" },
    { field: "assistant", label: "Assistant" },
    { field: "date de cloture", label: "Date de clôture" }
];

function buildFilters() {
    const container = document.getElementById("filters");
    container.innerHTML = "";

    filtersConfig.forEach(f => {
        const values = [...new Set(clientsData.map(c => c[f.field]).filter(Boolean))].sort();
        const group = document.createElement("div");
        group.className = "filter-group";
        group.innerHTML = `
            <strong>${f.label}</strong>
            <input type="text" placeholder="Rechercher..." data-field="${f.field}">
            <div class="checkbox-list" id="list-${f.field}"></div>
        `;
        container.appendChild(group);
        renderCheckboxList(f.field, values);

        group.querySelector("input").addEventListener("input", (e) => {
            const val = e.target.value.toLowerCase();
            renderCheckboxList(f.field, values.filter(v => v.toLowerCase().includes(val)));
        });
    });
}

function renderCheckboxList(field, values) {
    const container = document.getElementById("list-" + field);
    container.innerHTML = "";
    values.forEach(val => {
        container.innerHTML += `<label><input type="checkbox" value="${val}" data-field="${field}">${val}</label>`;
    });
    container.querySelectorAll("input").forEach(cb => cb.addEventListener("change", applyFilters));
}

function applyFilters() {
    const checkboxes = document.querySelectorAll("input[type=checkbox]:checked");
    const filters = {};
    checkboxes.forEach(cb => {
        if (!filters[cb.dataset.field]) filters[cb.dataset.field] = [];
        filters[cb.dataset.field].push(cb.value);
    });

    const filtered = clientsData.filter(c =>
        Object.keys(filters).every(field => filters[field].includes(c[field]))
    );
    displayClients(filtered);
}

async function loadClients() {
    clientsData = await fetchClients();

    // initialise rentabilité si absente
    clientsData = clientsData.map(c => {
        if (c["rentabilite"] === undefined || c["rentabilite"] === null || c["rentabilite"] === "") {
            c["rentabilite"] = calculateRendement(c);
        }
        return c;
    });

    buildFilters();
    displayClients(clientsData);
    checkAnniversaires(clientsData);
}

function displayClients(data) {
    updateDashboard(data);
    const table = document.getElementById("clients-table");
    table.innerHTML = "";

    if (!data.length) {
        table.innerHTML = "<tr><td colspan='14'>Aucun résultat</td></tr>";
        return;
    }

    data.forEach(c => {
        const anciennete = parseFloat(c["ancienneté"]) || 0;
        const score = parseNum(c["rentabilite"]);

        table.innerHTML += `
        <tr onclick="viewClient('${c.id}')">
            <td>${c["code client"] || ""}</td>
            <td><strong>${c["nom client"] || ""}</strong></td>
            <td>${c["date de cloture"] || ""}</td>
            <td>${c["structure"] || ""}</td>
            <td>
                ${anciennete}
                ${anciennete < 1 ? '<span class="alert">⚠️</span><span class="alert-badge">Nouveau</span>' : ''}
            </td>
            <td>${c["temps passé"] || ""}</td>
            <td>${c["honoraires cpta"] || ""}</td>
            <td>${c["collaborateur"] || ""}</td>
            <td>${c["assistant"] || ""}</td>
            <td>${c["CA R"] || ""}</td>
            <td>${c["resultat R"] || ""}</td>
            <td>${c["activite R"] || ""}</td>
            <td>
                <button class="renta-click" style="color:${getColor(score)};"
                    onclick="event.stopPropagation(); openRentaEditor('${c.id}')">
                    ${score}/100
                </button>
            </td>
            <td><button class="btn" onclick="event.stopPropagation(); viewClient('${c.id}')">Voir</button></td>
        </tr>`;
    });
}

function sortByRentabilite() {
    const sorted = [...clientsData].sort((a, b) => parseNum(b["rentabilite"]) - parseNum(a["rentabilite"]));
    displayClients(sorted);
}

document.getElementById("filter-renta").addEventListener("input", function(e) {
    const min = parseFloat(e.target.value) || 0;
    displayClients(clientsData.filter(c => parseNum(c["rentabilite"]) >= min));
});

document.getElementById("search").addEventListener("input", function(e) {
    const value = e.target.value.toLowerCase();
    displayClients(clientsData.filter(c => (c["nom client"] || "").toLowerCase().includes(value)));
});

function sortByHonos() {
    displayClients([...clientsData].sort((a, b) => parseNum(b["honoraires cpta"]) - parseNum(a["honoraires cpta"])));
}
function sortByCA() {
    displayClients([...clientsData].sort((a, b) => parseNum(b["CA R"]) - parseNum(a["CA R"])));
}
function sortByResultat() {
    displayClients([...clientsData].sort((a, b) => parseNum(b["resultat R"]) - parseNum(a["resultat R"])));
}
function viewClient(id) { window.location.href = "client.html?id=" + id; }

function updateDashboard(data) {
    const total = data.length;
    const totalHonos = data.reduce((sum, c) => sum + parseNum(c["honoraires cpta"]), 0);
    const avg = total ? totalHonos / total : 0;
    document.getElementById("total-clients").innerText = total;
    document.getElementById("avg-honos").innerText = new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(avg);
}

loadClients();
</script>
</body>
</html>
