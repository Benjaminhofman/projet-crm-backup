<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi Déclaratif</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    margin: 0;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
    font-size: 13px;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

tr:hover {
    background: #e8f0fe;
    cursor: pointer;
}

.name {
    font-weight: bold;
}

.separator {
    background: #ddd;
    width: 2px;
}

/* 🔥 filtres */
.filters-top {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.filter-box {
    display: flex;
    flex-direction: column;
}

.filter-box input {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.checkbox-filter {
    display: flex;
    justify-content: center;
}
</style>
</head>

<body>

<div class="header">
    <a href="index.html" class="back">⬅ Retour</a>
    <h2>📑 Suivi Déclaratif</h2>
</div>

<!-- 🔥 FILTRES -->
<div class="filters-top">
    <div class="filter-box">
        <input id="filter-assistant" placeholder="Assistant...">
    </div>
    <div class="filter-box">
        <input id="filter-collab" placeholder="Collaborateur...">
    </div>
    <div class="filter-box">
        <input id="filter-annee" placeholder="Année...">
    </div>
    <div class="filter-box">
        <input id="filter-cloture" placeholder="Clôture...">
    </div>
</div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Année</th>
<th>Clôture</th>

<th class="separator"></th>

<th>CA12</th>
<th>TVS</th>
<th>CVAE</th>
<th>IR</th>
<th>IS</th>
<th>Liasse</th>
<th>CFE</th>
<th>Juridique</th>
<th>Situation</th>
<th>TBB</th>
</tr>

<tr id="filters"></tr>

</thead>

<tbody id="table"></tbody>
</table>

<script>
const API_URL = "https://projet-crm-m0o3.onrender.com";

let dataGlobal = [];

const fields = [
    "CA12",
    "TVS",
    "CVAE",
    "impot sur le revenu",
    "IS",
    "liasse",
    "Cotisation foncière des entreprises",
    "juridique exceptionnel",
    "situation",
    "tbb"
];

// 🔥 filtres déclaratifs (✔ = TRUE)
function buildFilters() {
    const row = document.getElementById("filters");

    row.innerHTML = `<td colspan="6"></td><td></td>`;

    fields.forEach(f => {
        row.innerHTML += `
        <td>
            <div class="checkbox-filter">
                <input type="checkbox" data-field="${f}">
            </div>
        </td>`;
    });

    document.querySelectorAll("#filters input").forEach(cb => {
        cb.addEventListener("change", applyFilters);
    });
}

// 🔥 filtrage global
function applyFilters() {

    const checkedFields = Array.from(document.querySelectorAll("#filters input:checked"))
        .map(cb => cb.dataset.field);

    const assistant = document.getElementById("filter-assistant").value.toLowerCase();
    const collab = document.getElementById("filter-collab").value.toLowerCase();
    const annee = document.getElementById("filter-annee").value.toLowerCase();
    const cloture = document.getElementById("filter-cloture").value.toLowerCase();

    const filtered = dataGlobal.filter(c => {

        // 🔎 filtres texte
        if (assistant && !(c["assistant"] || "").toLowerCase().includes(assistant)) return false;
        if (collab && !(c["collaborateur"] || "").toLowerCase().includes(collab)) return false;
        if (annee && !(String(c["année"])).includes(annee)) return false;
        if (cloture && !(c["date de cloture"] || "").toLowerCase().includes(cloture)) return false;

        // ✅ filtres déclaratifs (TRUE uniquement)
        return checkedFields.every(f => Boolean(c[f]) === true);
    });

    display(filtered);
}

// 🔥 affichage
function display(data) {

    const table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(c => {

        table.innerHTML += `
        <tr onclick="window.location.href='client.html?id=${c.id}'">

            <td>${c["code client"] || ""}</td>
            <td class="name">${c["nom client"] || ""}</td>
            <td>${c["assistant"] || ""}</td>
            <td>${c["collaborateur"] || ""}</td>
            <td>${c["année"] || ""}</td>
            <td>${c["date de cloture"] || ""}</td>

            <td class="separator"></td>

            ${fields.map(f => `
                <td>
                    <input type="checkbox" disabled ${c[f] ? "checked" : ""}>
                </td>
            `).join("")}

        </tr>`;
    });
}

// 🔥 load
async function load() {
    const res = await fetch(API_URL + "/clients");
    dataGlobal = await res.json();

    buildFilters();
    display(dataGlobal);

    document.querySelectorAll(".filters-top input").forEach(input => {
        input.addEventListener("input", applyFilters);
    });
}

load();
</script>

</body>
</html>
