<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi CFE</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6fb;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.back {
    background: #273c75;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
}

.counter {
    margin: 10px 0;
    font-weight: bold;
}

.filters-top {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.filters-top input {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 8px;
    text-align: center;
}

th {
    background: #273c75;
    color: white;
}

tr:nth-child(even) {
    background: #f8f9fc;
}

.name {
    font-weight: bold;
}

select {
    padding: 5px;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="header">
    <a href="declaratif.html" class="back">⬅ Retour</a>
    <h2>📊 Suivi CFE</h2>
</div>

<div class="counter" id="counter"></div>

<div class="filters-top">
    <input id="filter-assistant" placeholder="Assistant...">
    <input id="filter-collab" placeholder="Collaborateur...">
    <input id="filter-annee" placeholder="Année...">
    <input id="filter-cloture" placeholder="Clôture...">
</div>

<table>
<thead>
<tr>
<th>Code</th>
<th>Nom</th>
<th>Assistant</th>
<th>Collaborateur</th>
<th>Année</th>
<th>Clôture</th>
<th>Prélèvement CFE</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script src="utils.js"></script>
<script>


// 🔥 update select
async function updateSelect(id, field, value, el) {

    el.style.outline = "2px solid orange";

    try {
        await fetch(API_URL + "/update-airtable", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ id, field, value })
        });

        el.style.outline = "2px solid green";

    } catch (error) {
        el.style.outline = "2px solid red";
    }
}


// affichage
function display(data) {

    const table = document.getElementById("table");
    table.innerHTML = "";

    document.getElementById("counter").innerText =
        "Nombre de dossiers : " + data.length;

    data.forEach(c => {

        const current = c["prel cfe"] || "";

        table.innerHTML += `
        <tr>

            <td>${c["code client"] || ""}</td>
            <td class="name">${c["nom client"] || ""}</td>
            <td>${c["assistant"] || ""}</td>
            <td>${c["collaborateur"] || ""}</td>
            <td>${c["année"] || ""}</td>
            <td>${c["date de cloture"] || ""}</td>

            <td>
                <select onchange="updateSelect('${c.id}','prel cfe', this.value, this)">
                    <option value="">--</option>
                    <option value="prel echeance" ${current==="prel echeance" ? "selected" : ""}>Prél. échéance</option>
                    <option value="prel mensuel" ${current==="prel mensuel" ? "selected" : ""}>Prél. mensuel</option>
                    <option value="pas de prel" ${current==="pas de prel" ? "selected" : ""}>Pas de prél.</option>
                </select>
            </td>

        </tr>`;
    });
}


// filtres
function applyFilters() {

    const assistant = document.getElementById("filter-assistant").value.toLowerCase();
    const collab = document.getElementById("filter-collab").value.toLowerCase();
    const annee = document.getElementById("filter-annee").value.toLowerCase();
    const cloture = document.getElementById("filter-cloture").value.toLowerCase();

    const filtered = dataGlobal.filter(c => {

        if (assistant && !(c["assistant"] || "").toLowerCase().includes(assistant)) return false;
        if (collab && !(c["collaborateur"] || "").toLowerCase().includes(collab)) return false;
        if (annee && !(String(c["année"])).includes(annee)) return false;
        if (cloture && !(c["date de cloture"] || "").toLowerCase().includes(cloture)) return false;

        return true;
    });

    display(filtered);
}


// load
async function load() {

    const data = await fetchClients();

    // 🔥 uniquement dossiers CFE cochés
    dataGlobal = data.filter(c => c["Cotisation foncière entreprise"] === true);

    display(dataGlobal);

    bindFilterInputs(".filters-top input");
}

load();
</script>

</body>
</html>
